# =============================================================================
# 5-Inch FPV Freestyle Quadcopter Airframe Preset
# =============================================================================
# A high-performance 5" freestyle build optimized for aggressive acrobatic
# flying with solid punch and fast recovery. Based on popular 2024/2025
# component selections for competitive freestyle.
# =============================================================================

name: "5-Inch FPV Freestyle"
description: >
  Typical 5-inch freestyle quadcopter built for aggressive acrobatic maneuvers,
  fast rolls, quick recovery, and high throttle punch. Uses premium 2306 motors
  on a true-X carbon fiber frame with 6S power for extreme power-to-weight.
  Digital HD video via DJI O3 Air Unit for immersive FPV experience. Tuned for
  Betaflight 4.5+ with RPM filtering and dynamic idle enabled.

category: fpv_freestyle
icon: quad_x_freestyle

# -----------------------------------------------------------------------------
# Frame Configuration
# -----------------------------------------------------------------------------
frame:
  type: quad_x
  manufacturer: "ImpulseRC"
  model: "Apex 5 HD"
  material: "3K carbon fiber"
  arm_thickness_mm: 5.0
  top_plate_thickness_mm: 2.0
  bottom_plate_thickness_mm: 2.5
  standoff_height_mm: 25.0
  wheelbase_mm: 225
  weight_g: 108
  motor_mount_pattern_mm: 16x19
  stack_mount_mm: 30.5x30.5
  camera_mount: "standard_fpv_19mm"
  antenna_mount: "sma_rear"
  arm_angle_deg: 45.0
  deadcat: false
  unibody: false
  prop_guard: false

# -----------------------------------------------------------------------------
# Motor Configuration (x4)
# -----------------------------------------------------------------------------
motors:
  count: 4
  manufacturer: "T-Motor"
  model: "Velox V2306 V2"
  kv: 2400
  stator_diameter_mm: 23
  stator_height_mm: 6
  shaft_diameter_mm: 5.0 # M5
  weight_g: 33.5
  max_current_a: 38.6
  idle_current_a: 0.8
  resistance_mohm: 52
  kt_nm_per_a: 0.00398
  max_rpm: 50400 # 2400 KV * 21V (6S nominal)
  efficiency_peak_percent: 83.5
  bearing_type: "EZO ceramic hybrid"
  magnet_count: 14
  pole_pairs: 7
  mounting_pattern_mm: "16x19"
  rotation_directions: ["CW", "CCW", "CW", "CCW"] # BF default props-in
  motor_timing_deg: 22.5
  thermal_limit_c: 120

# -----------------------------------------------------------------------------
# Propeller Configuration
# -----------------------------------------------------------------------------
propellers:
  count: 4
  manufacturer: "HQProp"
  model: "Ethix S5 5.1x3.1x3"
  diameter_in: 5.1
  pitch_in: 3.1
  blades: 3
  material: "polycarbonate"
  weight_g: 4.8
  hub_bore_mm: 5.0
  max_rpm: 52000
  static_thrust_g_per_motor: 1480 # at full throttle 6S
  efficiency_g_per_w: 5.2 # at hover
  noise_db_at_1m: 82

# -----------------------------------------------------------------------------
# Battery Configuration
# -----------------------------------------------------------------------------
battery:
  chemistry: "LiPo"
  manufacturer: "CNHL"
  model: "Black Series 1300mAh 6S 100C"
  cells_series: 6
  cells_parallel: 1
  capacity_mah: 1300
  voltage_nominal_v: 22.2
  voltage_full_v: 25.2
  voltage_empty_v: 19.8 # 3.3V per cell under load
  max_continuous_discharge_c: 100
  max_burst_discharge_c: 200
  internal_resistance_mohm: 3.8 # per cell
  weight_g: 215
  dimensions_mm: [75, 36, 42]
  connector: "XT60"
  balance_connector: "JST-XH 7-pin"

# -----------------------------------------------------------------------------
# Electronics Configuration
# -----------------------------------------------------------------------------
electronics:
  flight_controller:
    manufacturer: "SpeedyBee"
    model: "F405 V4"
    mcu: "STM32F405RGT6"
    clock_mhz: 168
    flash_kb: 1024
    firmware: "Betaflight"
    firmware_version: "4.5.1"
    gyro_bus: "SPI"
    osd_chip: "AT7456E"
    barometer: true
    blackbox: "16MB onboard flash"
    uart_count: 6
    mounting_pattern_mm: "30.5x30.5"
    weight_g: 9.2
    current_sensor: true
    voltage_sensor: true
    sd_card_slot: false
    usb_type: "USB-C"
    beeper_pad: true
    led_pad: true

  esc:
    manufacturer: "SpeedyBee"
    model: "BLS 55A 4-in-1"
    type: "4-in-1"
    protocol: "DShot600"
    continuous_current_a: 55
    burst_current_a: 65
    voltage_range: "3S-6S"
    mcu: "BL32 ARM"
    firmware: "BlueJay"
    firmware_version: "0.20.0"
    current_sensor: true
    telemetry: "bidirectional DShot"
    mounting_pattern_mm: "30.5x30.5"
    weight_g: 13.5
    mosfet_type: "NMOS"
    pwm_frequency_khz: 48
    rpm_telemetry: true

  receiver:
    manufacturer: "BetaFPV"
    model: "SuperP ELRS 2.4GHz"
    protocol: "ExpressLRS"
    frequency_ghz: 2.4
    max_power_mw: 100
    antenna_type: "ceramic SMD"
    channels: 16
    latency_ms: 2 # at 500Hz
    packet_rate_hz: 500
    weight_g: 1.8
    firmware_version: "3.4.2"

  vtx:
    manufacturer: "DJI"
    model: "O3 Air Unit"
    type: "digital_hd"
    power_levels_mw: [25, 200, 500, 1200]
    frequency: "5.8GHz"
    resolution: "1080p"
    framerate: 100
    latency_ms: 30
    recording: "4K 60fps onboard"
    antenna_count: 2
    antenna_type: "LHCP"
    weight_g: 36.1
    dimensions_mm: [30.5, 30.5, 16.8]
    input_voltage: "7-26V"

  camera:
    manufacturer: "DJI"
    model: "O3 Camera Module"
    sensor: "1/2 inch CMOS"
    fov_deg: 155
    resolution: "4K"
    framerate_max: 120
    lens_mm: 2.1
    weight_g: 0 # included in O3 Air Unit weight
    stabilization: "electronic (Rocksteady)"
    wdr: true

# -----------------------------------------------------------------------------
# Sensor Configuration
# -----------------------------------------------------------------------------
sensors:
  imu:
    manufacturer: "Bosch"
    model: "BMI270"
    gyro_range_dps: 2000
    accel_range_g: 16
    gyro_noise_density_dps_hz: 0.007
    accel_noise_density_ug_hz: 160
    sample_rate_hz: 6400
    bus: "SPI"
    temperature_compensation: true

  barometer:
    manufacturer: "Bosch"
    model: "BMP388"
    pressure_range_pa: [30000, 110000]
    pressure_resolution_pa: 0.016
    altitude_noise_m: 0.12
    sample_rate_hz: 200
    bus: "I2C"
    temperature_sensor: true

  gps:
    manufacturer: "BN"
    model: "BN-880"
    chipset: "u-blox M8N"
    constellation: ["GPS", "GLONASS", "Galileo", "BeiDou"]
    channels: 72
    update_rate_hz: 10
    horizontal_accuracy_m: 2.0
    vertical_accuracy_m: 3.5
    ttff_cold_s: 26
    ttff_hot_s: 1
    compass: true
    compass_model: "HMC5883L"
    weight_g: 10.2
    antenna: "ceramic patch"

  magnetometer:
    manufacturer: "Honeywell"
    model: "HMC5883L"
    range_gauss: 8.1
    resolution_mgauss: 2.0
    sample_rate_hz: 75
    bus: "I2C"
    integrated_in: "GPS module"

# -----------------------------------------------------------------------------
# Thermal Model
# -----------------------------------------------------------------------------
thermal:
  motor_thermal_resistance_c_per_w: 8.5
  motor_thermal_capacitance_j_per_c: 12.0
  esc_thermal_resistance_c_per_w: 15.0
  battery_thermal_resistance_c_per_w: 6.0
  ambient_temp_range_c: [-10, 50]
  motor_max_temp_c: 120
  esc_max_temp_c: 85
  battery_max_temp_c: 60
  derating_start_temp_c: 100 # motors begin derating

# -----------------------------------------------------------------------------
# Electrical Model
# -----------------------------------------------------------------------------
electrical:
  wiring_resistance_mohm: 12
  connector_resistance_mohm: 3
  total_system_resistance_mohm: 15
  voltage_sag_model:
    method: "linear_resistance"
    internal_resistance_mohm: 22.8 # 6 cells * 3.8 mohm
  power_distribution:
    type: "esc_integrated" # 4-in-1 ESC handles PDB
    main_bus_current_a: 150
    bec_5v_current_a: 3.0
    bec_9v_current_a: 2.5
  quiescent_draw_ma:
    flight_controller: 280
    receiver: 40
    gps: 65
    vtx_idle: 450
    vtx_transmit: 2800 # at 1200mW
    total_idle: 835

# -----------------------------------------------------------------------------
# Compatibility Constraints
# -----------------------------------------------------------------------------
compatibility:
  firmware:
    - "Betaflight >= 4.4"
    - "Betaflight >= 4.5 (recommended)"
  propeller_clearance_mm: 3.0
  max_prop_diameter_in: 5.1
  min_battery_cells: 4
  max_battery_cells: 6
  max_battery_weight_g: 250
  max_auw_g: 800
  regulations:
    faa_class: "sub-250g exempt (without battery)" # frame+electronics < 250g
    requires_registration: true # with battery exceeds 250g
    requires_remote_id: true

# -----------------------------------------------------------------------------
# Mechanical Properties
# -----------------------------------------------------------------------------
mechanical:
  center_of_gravity_mm: [0, 0, -8] # relative to geometric center, Z-down
  moments_of_inertia_kg_m2:
    Ixx: 0.00285
    Iyy: 0.00285
    Izz: 0.00465
  drag_coefficient:
    frontal: 0.45
    lateral: 0.50
    vertical: 1.10
  frontal_area_m2: 0.012
  prop_wash_factor: 0.15
  vibration_damping:
    fc_mount: "soft silicone grommets"
    gyro_notch_filters: [145, 290] # Hz, fundamental and harmonic
  build_notes: >
    Mount FC and ESC stack with 4x M3x25 standoffs and silicone grommets for
    vibration isolation. Route motor wires cleanly under arms. DJI O3 camera
    mounts at 25-35 degree uptilt using TPU printed mount. Ensure antenna exits
    rearward and is protected from prop strikes. Zip-tie battery with
    rubberized non-slip pad. Apply conformal coating to ESC and FC for moisture
    protection. Balance props before first flight. Use Loc-Tite on motor
    mounting bolts. Recommended idle throttle: 6.5%. Enable RPM filtering in
    Betaflight for clean gyro signal. Flash bidirectional DShot on ESC for RPM
    telemetry. Recommended rates: 800 deg/s on all axes.

# -----------------------------------------------------------------------------
# Computed / Derived Values
# -----------------------------------------------------------------------------
computed:
  dry_weight_g: 416 # frame(108)+motors(134)+props(19.2)+electronics(60.6)+GPS(10.2)+wiring(15)+hardware(12)+TPU(5)+O3(36.1)+antenna(3)
  all_up_weight_g: 631 # dry + battery(215)
  all_up_weight_kg: 0.631
  wing_loading: null # N/A for multirotor
  total_static_thrust_g: 5920 # 4 * 1480g
  thrust_to_weight_ratio: 9.38 # 5920 / 631
  hover_throttle_percent: 10.7 # 1/(T:W) * 100
  max_tilt_angle_deg: 80
  max_speed_ms: 45 # ~162 km/h in level flight
  max_vertical_speed_ms: 30
  estimated_flight_time_min: 4.2 # at aggressive mixed flying
  estimated_hover_time_min: 7.8 # theoretical hover only
  hover_current_a: 8.5
  max_current_a: 130 # full throttle
  hover_power_w: 188.7 # 8.5A * 22.2V
  max_power_w: 2886 # 130A * 22.2V
  power_loading_w_per_kg: 299 # hover power / mass
  disc_loading_g_per_cm2: 1.23 # AUW / (4 * pi * (5.1*2.54/2)^2)
  pid_loop_rate_khz: 8
  motor_response_time_ms: 12
  settling_time_ms: 45
