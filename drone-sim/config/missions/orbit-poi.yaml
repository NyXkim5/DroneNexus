# =============================================================================
# Orbit Around Point of Interest Mission
# =============================================================================
# Circular orbit around a specified point of interest with the camera
# continuously pointing at the target. Useful for inspection, cinematic
# footage, and 3D reconstruction of structures.
# =============================================================================

mission:
  name: "Orbit Point of Interest"
  description: >
    Automated circular orbit around a defined point of interest. The drone
    maintains a constant radius and altitude while continuously yawing to
    keep the camera or nose pointed at the target. Supports variable orbit
    speed, radius, altitude, and number of revolutions. Useful for building
    inspection, cinematic orbits, cell tower inspection, and 3D structure
    reconstruction. Can optionally descend or ascend during orbit for
    spiral inspection patterns.
  version: "1.0"
  author: "NEXUS Drone Sim"
  created: "2025-10-01"

# -----------------------------------------------------------------------------
# Mission Parameters
# -----------------------------------------------------------------------------
parameters:
  coordinate_frame: "local_ENU"
  home_position:
    latitude_deg: 37.7749
    longitude_deg: -122.4194
    altitude_msl_m: 10.0
    heading_deg: 0.0

  orbit:
    center_position:
      x_m: 100.0 # 100m east of home
      y_m: 50.0 # 50m north of home
      z_m: 0.0 # ground level of POI
    poi_height_m: 25.0 # height of the point of interest structure
    radius_m: 40.0
    altitude_agl_m: 35.0 # fly 10m above POI top
    direction: "clockwise"
    speed_ms: 4.0 # tangential speed
    revolutions: 2.0
    yaw_behavior: "poi" # always face the POI center
    orbit_resolution_deg: 15 # waypoint every 15 degrees
    entry_angle_deg: 0.0 # enter orbit from the north side (0 = north of POI)
    spiral:
      enabled: false
      altitude_change_per_revolution_m: 0.0

  camera:
    gimbal_pitch_deg: -35.0 # angle down toward POI
    trigger_mode: "interval"
    trigger_interval_s: 2.0
    auto_gimbal_tracking: true

  defaults:
    speed_ms: 4.0
    acceptance_radius_m: 3.0
    loiter_time_s: 0.0

  safety:
    max_altitude_m: 80.0
    geofence_radius_m: 200.0
    geofence_action: "RTL"
    min_battery_percent: 20
    failsafe_action: "RTL"
    wind_abort_speed_ms: 10.0
    min_clearance_from_poi_m: 10.0 # never closer than this to POI

# -----------------------------------------------------------------------------
# Waypoints
# -----------------------------------------------------------------------------
# Orbit center is at (100, 50). Radius = 40m. Altitude = 35m.
# Waypoints placed every 15 degrees = 24 waypoints per revolution.
# 2 revolutions = 48 orbit waypoints.
# Yaw at each point is calculated to face (100, 50).

waypoints:
  - id: 1
    name: "Takeoff"
    type: "takeoff"
    position:
      x_m: 0.0
      y_m: 0.0
      z_m: 35.0
    speed_ms: 3.0
    heading_deg: 0.0
    hold_time_s: 5.0
    notes: "Climb to orbit altitude"

  - id: 2
    name: "Transit to Orbit Entry"
    type: "waypoint"
    position:
      x_m: 100.0 # directly north of POI center
      y_m: 90.0 # center_y(50) + radius(40)
      z_m: 35.0
    speed_ms: 6.0
    heading_deg: 180.0 # facing south toward POI
    hold_time_s: 3.0
    notes: "Arrive at orbit entry point, stabilize, point at POI"

  # --- Revolution 1: 24 waypoints, every 15 degrees, CW ---
  # Angle 0 = North of POI. CW means angle increases: 0, 15, 30, ...
  # Position: x = cx + r*sin(angle), y = cy + r*cos(angle)
  # Yaw: atan2(cx - x, cy - y) -- face toward center

  - id: 3
    name: "Orbit R1 - 0 deg"
    type: "orbit"
    position: { x_m: 100.0, y_m: 90.0, z_m: 35.0 }
    heading_deg: 180.0
    camera_trigger: "start"

  - id: 4
