# -----------------------------------------------------------------------------
# Mission Geometry Summary
# -----------------------------------------------------------------------------
geometry:
  pattern: "circular_orbit"
  poi_location_m: [100.0, 50.0, 0.0]
  orbit_radius_m: 40.0
  orbit_altitude_agl_m: 35.0
  orbit_circumference_m: 251.3 # 2 * pi * 40
  revolutions: 2
  total_orbit_distance_m: 502.7
  transit_distance_m: 230.0 # to/from orbit
  total_distance_m: 732.7
  estimated_duration_s: 195.0 # orbit(126s) + transit(40s) + holds(29s)
  waypoints_per_revolution: 24
  angular_resolution_deg: 15

# -----------------------------------------------------------------------------
# POI Details
# -----------------------------------------------------------------------------
poi:
  name: "Target Structure"
  type: "building"
  position_m: [100.0, 50.0, 0.0]
  height_m: 25.0
  estimated_width_m: 15.0
  notes: >
    The point of interest is a building approximately 25m tall and 15m wide.
    The orbit altitude of 35m provides a slight downward viewing angle.
    Camera gimbal pitched to -35 degrees for optimal coverage of the
    structure facade.

# -----------------------------------------------------------------------------
# Expected Performance
# -----------------------------------------------------------------------------
expected_performance:
  radius_accuracy_m: 2.0
  altitude_accuracy_m: 0.5
  speed_consistency_percent: 90
  heading_tracking_accuracy_deg: 5.0
  poi_centering_accuracy_deg: 3.0
  estimated_photos: 96 # 2 revolutions * 48 photos at 2s interval
  structure_coverage_percent: 100 # full 360-degree coverage
  total_energy_wh: 12.0
  compatible_airframes:
    - "5inch-fpv-freestyle"
    - "7inch-long-range"
    - "mapping-quad"
    - "hex-heavy-lift"
