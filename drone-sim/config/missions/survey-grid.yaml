# -----------------------------------------------------------------------------
# Mission Geometry Summary
# -----------------------------------------------------------------------------
geometry:
  pattern: "lawn_mower_boustrophedon"
  survey_area_m2: 30000.0 # 200m x 150m
  survey_area_ha: 3.0
  flight_line_count: 9
  flight_line_length_m: 240.0 # including overshoot
  flight_line_spacing_m: 18.0
  total_survey_distance_m: 2160.0 # 9 lines * 240m
  total_distance_with_turns_m: 2460.0 # + turns + transit
  estimated_duration_s: 380.0 # ~6.3 min
  estimated_photo_count: 162 # 9 lines * 18 photos per line
  ground_sample_distance_cm: 0.95

# -----------------------------------------------------------------------------
# Camera Configuration (for trigger calculations)
# -----------------------------------------------------------------------------
camera_config:
  sensor_width_mm: 35.7
  sensor_height_mm: 23.8
  focal_length_mm: 35.0
  image_width_px: 9504
  image_height_px: 6336
  trigger_type: "distance"
  trigger_distance_m: 12.0

# -----------------------------------------------------------------------------
# Expected Performance
# -----------------------------------------------------------------------------
expected_performance:
  position_accuracy_m: 0.02 # with RTK
  track_following_accuracy_m: 1.0
  altitude_accuracy_m: 0.3
  speed_consistency_percent: 95
  image_overlap_achieved_percent:
    forward: 70
    side: 65
  total_energy_wh: 35.0
  compatible_airframes:
    - "mapping-quad"
    - "hex-heavy-lift"
