# =============================================================================
# Survey Grid (Lawn-Mower) Mission
# =============================================================================
# Systematic lawn-mower survey pattern for photogrammetry and mapping.
# Parallel flight lines with consistent overlap ensure complete coverage.
# Designed for the mapping-quad airframe with downward-facing camera.
# =============================================================================

mission:
  name: "Survey Grid"
  description: >
    Lawn-mower (boustrophedon) survey pattern for aerial photogrammetry and
    orthomosaic generation. Flies parallel lines at constant altitude with
    consistent forward and lateral overlap for the mapping camera. Alternating
    flight direction on each line minimizes turn radius and time. Optimized
    for 70% forward overlap and 65% side overlap at 80m AGL with a 61MP
    camera and 35mm lens (GSD approximately 0.95 cm/pixel).
  version: "1.0"
  author: "NEXUS Drone Sim"
  created: "2025-10-01"

# -----------------------------------------------------------------------------
# Mission Parameters
# -----------------------------------------------------------------------------
parameters:
  coordinate_frame: "local_ENU"
  home_position:
    latitude_deg: 37.7749
    longitude_deg: -122.4194
    altitude_msl_m: 10.0
    heading_deg: 0.0

  survey:
    altitude_agl_m: 80.0
    ground_speed_ms: 8.0
    forward_overlap_percent: 70
    side_overlap_percent: 65
    camera_trigger_mode: "distance" # trigger by distance along track
    camera_trigger_distance_m: 12.0 # = GSD * image_width * (1 - overlap)
    camera_trigger_shutter_ms: 2 # shutter pulse duration
    flight_line_direction_deg: 90.0 # East-West lines
    flight_line_spacing_m: 18.0 # based on side overlap at altitude
    survey_area:
      type: "rectangle"
      origin_m: [0, 0] # SW corner relative to home
      width_m: 200.0 # East-West extent
      height_m: 150.0 # North-South extent
    line_overshoot_m: 20.0 # fly past survey boundary for turns
    entry_point: "SW" # start from southwest corner

  defaults:
    speed_ms: 8.0
    acceptance_radius_m: 3.0
    yaw_behavior: "fixed_heading" # maintain survey heading
    loiter_time_s: 0.0

  safety:
    max_altitude_m: 120.0
    geofence_margin_m: 50.0
    geofence_action: "RTL"
    min_battery_percent: 25
    failsafe_action: "RTL"
    wind_abort_speed_ms: 10.0

# -----------------------------------------------------------------------------
# Waypoints
# -----------------------------------------------------------------------------
# Flight lines run East-West. 9 parallel lines with 18m spacing cover 150m N-S.
# Alternating direction (boustrophedon) for efficiency.
# Line overshoot of 20m on each end for turn stabilization.

waypoints:
  - id: 1
    name: "Takeoff"
    type: "takeoff"
    position:
      x_m: 0.0
      y_m: 0.0
      z_m: 80.0
    speed_ms: 3.0
    heading_deg: 0.0
    hold_time_s: 5.0
    notes: "Climb to survey altitude, stabilize"

  - id: 2
    name: "Transit to Survey Start"
    type: "waypoint"
    position:
      x_m: -20.0 # 20m overshoot west of survey area
      y_m: 0.0
      z_m: 80.0
    speed_ms: 8.0
    heading_deg: 90.0 # facing east
    hold_time_s: 0.0

  # --- Flight Line 1: West to East, Y=0m ---
  - id: 3
    name: "Line 1 Start"
    type: "survey_start"
    position:
      x_m: -20.0
      y_m: 0.0
      z_m: 80.0
    speed_ms: 8.0
    heading_deg: 90.0
    camera_trigger: "start"

  - id: 4
    name: "Line 1 End"
    type: "survey_end"
    position:
      x_m: 220.0
      y_m: 0.0
      z_m: 80.0
    speed_ms: 8.0
    heading_deg: 90.0
    camera_trigger: "stop"

  # --- Flight Line 2: East to West, Y=18m ---
  - id: 5
    name: "Line 2 Start"
    type: "survey_start"
    position:
      x_m: 220.0
      y_m: 18.0
      z_m: 80.0
    speed_ms: 8.0
    heading_deg: 270.0
    camera_trigger: "start"

  - id: 6
