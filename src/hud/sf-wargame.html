<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>OVERWATCH - San Francisco Drone Swarm</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #0a0c10; overflow: hidden; font-family: 'JetBrains Mono', 'SF Mono', monospace; }
canvas { display: block; }
#hud-top {
  position: fixed; top: 0; left: 0; right: 0; height: 32px; z-index: 10;
  display: flex; align-items: center; padding: 0 14px; gap: 14px;
  background: rgba(0,0,0,0.85); border-bottom: 1px solid rgba(255,255,255,0.05);
}
.brand { font-size: 10px; letter-spacing: 3px; color: rgba(255,255,255,0.3); }
.sep { color: rgba(255,255,255,0.08); }
.sc-name { font-size: 10px; letter-spacing: 2px; color: rgba(60,130,200,0.6); }
.ctrls { display: flex; gap: 5px; margin-left: auto; }
.ctrls button {
  background: transparent; border: 1px solid rgba(255,255,255,0.1); color: rgba(255,255,255,0.25);
  font-family: inherit; font-size: 8px; letter-spacing: 1.5px; padding: 3px 9px; cursor: pointer; text-transform: uppercase;
}
.ctrls button:hover, .ctrls button.on { border-color: rgba(255,255,255,0.3); color: rgba(255,255,255,0.6); }
#stats {
  position: fixed; top: 40px; left: 12px; z-index: 10; font-size: 9px;
  color: rgba(255,255,255,0.2); letter-spacing: 1.5px; line-height: 2.2;
}
#stats .v { color: rgba(255,255,255,0.5); }
#stats .r { color: rgba(220,80,80,0.7); }
#stats .b { color: rgba(80,150,230,0.7); }
#stats .g { color: rgba(80,210,110,0.6); }
#clock {
  position: fixed; top: 42px; right: 12px; z-index: 10;
  font-size: 32px; font-weight: 100; letter-spacing: 5px; color: rgba(255,255,255,0.08);
}
#tgt-lbl {
  position: fixed; bottom: 36px; left: 50%; transform: translateX(-50%); z-index: 10;
  font-size: 8px; letter-spacing: 3px; color: rgba(200,70,70,0.35); text-transform: uppercase;
}
</style>
</head>
<body>
<div id="hud-top">
  <div class="brand">OVERWATCH</div>
  <span class="sep">|</span>
  <div class="sc-name" id="sc-name">VAN DEPLOY -- SALESFORCE TOWER</div>
  <div class="ctrls">
    <button id="b-play" class="on">PAUSE</button>
    <button id="b-reset">RESET</button>
    <button id="b-next">NEXT</button>
    <button id="b-cam">TRACK</button>
  </div>
</div>
<div id="stats">
  <div>LAUNCH <span class="v">WHITE VAN -- MISSION ST</span></div>
  <div>TARGET <span class="r" id="s-tgt">SALESFORCE TOWER</span></div>
  <div>DEPLOYED <span class="b" id="s-dep">0</span></div>
  <div>IN FLIGHT <span class="b" id="s-fly">0</span></div>
  <div>ON TARGET <span class="g" id="s-on">0</span></div>
</div>
<div id="clock">00:00</div>
<div id="tgt-lbl">TARGET: SALESFORCE TOWER -- 415 MISSION ST</div>

<script src="js/three.min.js"></script>
<script src="js/OrbitControls.js"></script>
<script>
"use strict";

// ---- SCENE ----
var scene = new THREE.Scene();
scene.background = new THREE.Color(0x080a12);
scene.fog = new THREE.Fog(0x080a12, 600, 1800);

var camera = new THREE.PerspectiveCamera(55, innerWidth / innerHeight, 1, 5000);
camera.position.set(300, 200, 400);

var renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(innerWidth, innerHeight);
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
document.body.appendChild(renderer.domElement);

var orbitCtrl = new THREE.OrbitControls(camera, renderer.domElement);
orbitCtrl.enableDamping = true;
orbitCtrl.dampingFactor = 0.05;
orbitCtrl.target.set(0, 80, 0);
orbitCtrl.autoRotate = true;
orbitCtrl.autoRotateSpeed = 0.2;

// ---- LIGHTS ----
scene.add(new THREE.AmbientLight(0x334466, 0.8));
var dir = new THREE.DirectionalLight(0xaabbcc, 0.6);
dir.position.set(200, 500, 300);
scene.add(dir);
var dir2 = new THREE.DirectionalLight(0x6677aa, 0.3);
dir2.position.set(-200, 300, -100);
scene.add(dir2);

// ---- GROUND ----
var ground = new THREE.Mesh(
  new THREE.PlaneGeometry(2000, 2000),
  new THREE.MeshBasicMaterial({ color: 0x0c0e14 })
);
ground.rotation.x = -Math.PI / 2;
scene.add(ground);

// Street grid
for (var gx = -500; gx <= 500; gx += 50) {
  var g1 = new THREE.BufferGeometry().setFromPoints([
    new THREE.Vector3(gx, 0.3, -500), new THREE.Vector3(gx, 0.3, 500)
  ]);
  scene.add(new THREE.Line(g1, new THREE.LineBasicMaterial({ color: 0x1a1e28 })));
}
for (var gz = -500; gz <= 500; gz += 50) {
  var g2 = new THREE.BufferGeometry().setFromPoints([
    new THREE.Vector3(-500, 0.3, gz), new THREE.Vector3(500, 0.3, gz)
  ]);
  scene.add(new THREE.Line(g2, new THREE.LineBasicMaterial({ color: 0x1a1e28 })));
}

// ---- BUILDING HELPER ----
function addBuilding(x, z, w, d, h) {
  // Solid building - visible gray/blue
  var geo = new THREE.BoxGeometry(w, h, d);
  var hue = 0.58 + Math.random() * 0.08;
  var sat = 0.15 + Math.random() * 0.1;
  var light = 0.12 + Math.random() * 0.06 + (h / 1500);
  var color = new THREE.Color().setHSL(hue, sat, light);
  var mat = new THREE.MeshStandardMaterial({ color: color, metalness: 0.7, roughness: 0.3 });
  var mesh = new THREE.Mesh(geo, mat);
  mesh.position.set(x, h / 2, z);
  scene.add(mesh);

  // White edge lines so you can see the shape
  var edgeMat = new THREE.LineBasicMaterial({ color: 0xffffff, transparent: true, opacity: 0.08 });
  var edges = new THREE.LineSegments(new THREE.EdgesGeometry(geo), edgeMat);
  edges.position.copy(mesh.position);
  scene.add(edges);

  // Lit windows -- bright yellow/white dots
  if (h > 40) {
    var winMat = new THREE.MeshBasicMaterial({ color: 0xffeeaa, transparent: true, opacity: 0.3 });
    for (var wy = 8; wy < h - 4; wy += 6) {
      for (var face = 0; face < 4; face++) {
        if (Math.random() > 0.3) continue;
        var wm = new THREE.Mesh(new THREE.PlaneGeometry(2, 2.5), winMat);
        var wo = (Math.random() - 0.5) * (face < 2 ? w * 0.7 : d * 0.7);
        if (face === 0) { wm.position.set(x + wo, wy, z + d/2 + 0.5); }
        else if (face === 1) { wm.position.set(x + wo, wy, z - d/2 - 0.5); }
        else if (face === 2) { wm.position.set(x + w/2 + 0.5, wy, z + wo); wm.rotation.y = Math.PI/2; }
        else { wm.position.set(x - w/2 - 0.5, wy, z + wo); wm.rotation.y = Math.PI/2; }
        scene.add(wm);
      }
    }
  }
}

// ---- SALESFORCE TOWER ----
(function() {
  var h = 326;
  var geo = new THREE.CylinderGeometry(14, 20, h, 20);
  var mat = new THREE.MeshStandardMaterial({ color: 0x2a3555, metalness: 0.9, roughness: 0.1 });
  var mesh = new THREE.Mesh(geo, mat);
  mesh.position.set(0, h/2, 0);
  scene.add(mesh);
  // Edges
  scene.add(new THREE.LineSegments(
    new THREE.EdgesGeometry(geo),
    new THREE.LineBasicMaterial({ color: 0x4466aa, transparent: true, opacity: 0.15 })
  ).translateY(h/2));
  // Crown glow
  scene.add(new THREE.PointLight(0x4488ff, 1, 80).translateY(h + 5));
  // Target ring
  var rPts = [];
  for (var i = 0; i <= 64; i++) { var a = i/64*Math.PI*2; rPts.push(new THREE.Vector3(Math.cos(a)*28, 0, Math.sin(a)*28)); }
  var ring = new THREE.Line(new THREE.BufferGeometry().setFromPoints(rPts),
    new THREE.LineBasicMaterial({ color: 0xff3333, transparent: true, opacity: 0.5 }));
  ring.position.y = h + 15;
  ring.userData.pulse = true;
  scene.add(ring);
  // Red beam
  var beam = new THREE.Mesh(
    new THREE.CylinderGeometry(0.5, 0.5, 500, 4),
    new THREE.MeshBasicMaterial({ color: 0xff3333, transparent: true, opacity: 0.04 })
  );
  beam.position.y = 250;
  scene.add(beam);
})();

// ---- TRANSAMERICA PYRAMID ----
(function() {
  var geo = new THREE.ConeGeometry(22, 260, 4);
  var mesh = new THREE.Mesh(geo, new THREE.MeshStandardMaterial({ color: 0x334455, metalness: 0.7, roughness: 0.3 }));
  mesh.position.set(-250, 130, 180);
  mesh.rotation.y = Math.PI/4;
  scene.add(mesh);
  var edges = new THREE.LineSegments(new THREE.EdgesGeometry(geo),
    new THREE.LineBasicMaterial({ color: 0xffffff, transparent: true, opacity: 0.1 }));
  edges.position.copy(mesh.position);
  edges.rotation.copy(mesh.rotation);
  scene.add(edges);
})();

// ---- NAMED BUILDINGS ----
addBuilding(60, -50, 28, 28, 244);
addBuilding(-80, -90, 30, 30, 197);
addBuilding(-200, 100, 45, 35, 237);
addBuilding(150, -200, 25, 25, 195);
addBuilding(-40, 60, 35, 30, 183);
addBuilding(-180, 50, 40, 30, 212);
addBuilding(-120, 200, 35, 25, 174);
addBuilding(30, 80, 30, 28, 148);
addBuilding(80, 100, 35, 30, 160);

// ---- FILL CITY ----
for (var bx = -350; bx <= 350; bx += 55) {
  for (var bz = -300; bz <= 350; bz += 55) {
    if (Math.random() < 0.2) continue;
    if (Math.abs(bx) < 40 && Math.abs(bz) < 40) continue;
    addBuilding(
      bx + (Math.random()-0.5)*15, bz + (Math.random()-0.5)*15,
      14 + Math.random()*20, 14 + Math.random()*20,
      25 + Math.random()*100
    );
  }
}

// ---- WHITE VAN ----
var vanGroup = new THREE.Group();
(function() {
  // Body -- BRIGHT WHITE so you can see it
  var body = new THREE.Mesh(
    new THREE.BoxGeometry(6, 4.5, 14),
    new THREE.MeshBasicMaterial({ color: 0xeeeeee })
  );
  body.position.y = 3.5;
  vanGroup.add(body);
  // Cab
  var cab = new THREE.Mesh(
    new THREE.BoxGeometry(5.5, 3, 4),
    new THREE.MeshBasicMaterial({ color: 0xdddddd })
  );
  cab.position.set(0, 5.5, -5);
  vanGroup.add(cab);
  // Windshield
  var ws = new THREE.Mesh(
    new THREE.PlaneGeometry(4.5, 2.5),
    new THREE.MeshBasicMaterial({ color: 0x224466 })
  );
  ws.position.set(0, 6, -7.1);
  vanGroup.add(ws);
  // Wheels
  var wGeo = new THREE.CylinderGeometry(1.2, 1.2, 0.6, 8);
  var wMat = new THREE.MeshBasicMaterial({ color: 0x222222 });
  [[-3.2,1.2,-4],[3.2,1.2,-4],[-3.2,1.2,4],[3.2,1.2,4]].forEach(function(p) {
    var w = new THREE.Mesh(wGeo, wMat);
    w.position.set(p[0],p[1],p[2]);
    w.rotation.z = Math.PI/2;
    vanGroup.add(w);
  });
  // Open rear doors
  var dMat = new THREE.MeshBasicMaterial({ color: 0xcccccc });
  var ld = new THREE.Mesh(new THREE.BoxGeometry(0.3, 3.5, 3), dMat);
  ld.position.set(-3.3, 3.5, 8); ld.rotation.y = -0.8;
  vanGroup.add(ld);
  var rd = new THREE.Mesh(new THREE.BoxGeometry(0.3, 3.5, 3), dMat);
  rd.position.set(3.3, 3.5, 8); rd.rotation.y = 0.8;
  vanGroup.add(rd);
  // Blue interior glow
  vanGroup.add(new THREE.PointLight(0x3388ff, 2, 30).translateY(3));
  // Spotlight on van
  vanGroup.add(new THREE.PointLight(0xffffff, 0.5, 40).translateY(12));
})();
var VAN_X = 180, VAN_Z = 220;
vanGroup.position.set(VAN_X, 0, VAN_Z);
vanGroup.rotation.y = Math.atan2(-VAN_X, -VAN_Z);
scene.add(vanGroup);

// ---- DRONES ----
var TOTAL = 24;
var drones = [];
var deployed = 0, onTarget = 0, tick = 0, playing = true, trackCam = false;

function spawnDrone() {
  var mesh = new THREE.Mesh(
    new THREE.OctahedronGeometry(2.5, 0),
    new THREE.MeshBasicMaterial({ color: 0x44aaff, wireframe: true })
  );
  mesh.position.set(VAN_X, 4, VAN_Z);
  scene.add(mesh);
  // Bright glow so you can see it
  var light = new THREE.PointLight(0x4488ff, 0.4, 30);
  mesh.add(light);
  var trail = [];
  var trailLine = new THREE.Line(
    new THREE.BufferGeometry(),
    new THREE.LineBasicMaterial({ color: 0x2244aa, transparent: true, opacity: 0.3 })
  );
  scene.add(trailLine);
  return {
    mesh: mesh, trail: trail, trailLine: trailLine,
    launched: false, arrived: false,
    alt: 50 + Math.random() * 220,
    phase: "wait",
    pathOff: Math.random() * Math.PI * 2,
    spd: 3 + Math.random() * 2,
    orbitA: Math.random() * Math.PI * 2
  };
}
for (var di = 0; di < TOTAL; di++) drones.push(spawnDrone());

// ---- SIM LOOP ----
function step() {
  if (!playing) return;
  tick++;

  // Deploy one drone every 6 ticks
  if (tick % 6 === 0 && deployed < TOTAL) {
    drones[deployed].launched = true;
    drones[deployed].phase = "rise";
    deployed++;
  }

  drones.forEach(function(dr, idx) {
    if (!dr.launched || dr.phase === "wait") return;
    var p = dr.mesh.position;

    if (dr.phase === "rise") {
      p.y += 2.5;
      if (p.y > 25) dr.phase = "climb";
    } else if (dr.phase === "climb") {
      p.y += (dr.alt - p.y) * 0.025;
      var dx = -p.x, dz = -p.z;
      var dist = Math.sqrt(dx*dx + dz*dz) || 1;
      p.x += (dx/dist) * dr.spd * 0.4;
      p.z += (dz/dist) * dr.spd * 0.4;
      p.x += Math.sin(tick*0.06 + dr.pathOff) * 1.2;
      p.z += Math.cos(tick*0.08 + dr.pathOff) * 1.2;
      if (Math.abs(p.y - dr.alt) < 8) dr.phase = "strike";
    } else if (dr.phase === "strike") {
      var dx2 = -p.x, dz2 = -p.z;
      var dist2 = Math.sqrt(dx2*dx2 + dz2*dz2) || 1;
      p.x += (dx2/dist2) * dr.spd;
      p.z += (dz2/dist2) * dr.spd;
      p.x += Math.sin(tick*0.1 + dr.pathOff) * 0.6;
      p.z += Math.cos(tick*0.12 + dr.pathOff) * 0.6;
      p.y += Math.sin(tick*0.05 + idx) * 0.3;
      if (dist2 < 35) dr.phase = "orbit";
    } else if (dr.phase === "orbit") {
      dr.orbitA += 0.02 + idx * 0.002;
      var oR = 25 + idx * 2.5;
      p.x = Math.cos(dr.orbitA) * oR;
      p.z = Math.sin(dr.orbitA) * oR;
      p.y = dr.alt + Math.sin(dr.orbitA * 2) * 8;
      if (!dr.arrived) { dr.arrived = true; onTarget++; }
    }

    dr.mesh.rotation.x += 0.05;
    dr.mesh.rotation.y += 0.07;

    // Trail
    dr.trail.push(p.clone());
    if (dr.trail.length > 50) dr.trail.shift();
    if (dr.trail.length > 1) {
      dr.trailLine.geometry.dispose();
      dr.trailLine.geometry = new THREE.BufferGeometry().setFromPoints(dr.trail);
    }
  });

  // Pulse target ring
  scene.traverse(function(o) {
    if (o.userData && o.userData.pulse) {
      var s = 1 + Math.sin(tick * 0.1) * 0.12;
      o.scale.set(s, s, s);
    }
  });

  // HUD
  var inFlight = drones.filter(function(d) { return d.launched && !d.arrived; }).length;
  document.getElementById("s-dep").textContent = deployed + "/" + TOTAL;
  document.getElementById("s-fly").textContent = inFlight;
  document.getElementById("s-on").textContent = onTarget;
  var mm = Math.floor(tick/60), ss = tick%60;
  document.getElementById("clock").textContent = String(mm).padStart(2,"0") + ":" + String(ss).padStart(2,"0");
}

// ---- TRACK CAM ----
function camUpdate() {
  if (!trackCam) return;
  var tgt = drones.find(function(d) { return d.launched && !d.arrived; });
  if (!tgt) tgt = drones.filter(function(d) { return d.arrived; }).pop();
  if (!tgt) return;
  var p = tgt.mesh.position;
  camera.position.lerp(new THREE.Vector3(p.x+40, p.y+15, p.z+40), 0.03);
  orbitCtrl.target.lerp(new THREE.Vector3(p.x, p.y, p.z), 0.06);
}

function animate() {
  requestAnimationFrame(animate);
  step();
  camUpdate();
  orbitCtrl.update();
  renderer.render(scene, camera);
}

// ---- CONTROLS ----
document.getElementById("b-play").onclick = function() {
  playing = !playing;
  this.textContent = playing ? "PAUSE" : "PLAY";
};
document.getElementById("b-reset").onclick = function() {
  drones.forEach(function(d) { scene.remove(d.mesh); scene.remove(d.trailLine); });
  drones = [];
  for (var i = 0; i < TOTAL; i++) drones.push(spawnDrone());
  deployed = 0; onTarget = 0; tick = 0;
};
document.getElementById("b-next").onclick = function() {
  var spots = [[180,220],[-280,180],[220,-160],[-180,-180]];
  var names = ["MISSION ST","MONTGOMERY ST","FREMONT ST","HOWARD ST"];
  var ci = 0;
  for (var i = 0; i < spots.length; i++) {
    if (Math.abs(spots[i][0]-VAN_X)<10 && Math.abs(spots[i][1]-VAN_Z)<10) { ci = (i+1)%spots.length; break; }
  }
  VAN_X = spots[ci][0]; VAN_Z = spots[ci][1];
  scene.remove(vanGroup);
  vanGroup.position.set(VAN_X, 0, VAN_Z);
  vanGroup.rotation.y = Math.atan2(-VAN_X, -VAN_Z);
  scene.add(vanGroup);
  document.getElementById("sc-name").textContent = "VAN DEPLOY -- " + names[ci];
  document.getElementById("b-reset").onclick();
};
document.getElementById("b-cam").onclick = function() {
  trackCam = !trackCam;
  this.className = trackCam ? "on" : "";
  orbitCtrl.autoRotate = !trackCam;
};
window.onresize = function() {
  camera.aspect = innerWidth/innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
};

animate();
</script>
</body>
</html>
