<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>OVERWATCH - San Francisco Drone Swarm</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #080a10; overflow: hidden; font-family: 'JetBrains Mono', monospace; }
#hud-top {
  position: fixed; top: 0; left: 0; right: 0; height: 30px; z-index: 10;
  display: flex; align-items: center; padding: 0 12px; gap: 12px;
  background: rgba(0,0,0,0.9); border-bottom: 1px solid rgba(255,255,255,0.06);
}
.brand { font-size: 9px; letter-spacing: 3px; color: rgba(255,255,255,0.25); }
.sep { color: rgba(255,255,255,0.06); }
.sc { font-size: 9px; letter-spacing: 2px; color: rgba(70,140,220,0.6); }
.ctrls { display: flex; gap: 4px; margin-left: auto; }
.ctrls button {
  background: transparent; border: 1px solid rgba(255,255,255,0.08); color: rgba(255,255,255,0.2);
  font-family: inherit; font-size: 8px; letter-spacing: 1px; padding: 2px 8px; cursor: pointer; text-transform: uppercase;
}
.ctrls button:hover,.ctrls button.on { border-color: rgba(255,255,255,0.25); color: rgba(255,255,255,0.5); }
#stats {
  position: fixed; top: 36px; left: 10px; z-index: 10; font-size: 8px;
  color: rgba(255,255,255,0.18); letter-spacing: 1.2px; line-height: 2;
}
.sv { color: rgba(255,255,255,0.4); }
.sr { color: rgba(220,80,80,0.65); }
.sb { color: rgba(80,150,230,0.65); }
.sg { color: rgba(80,210,110,0.55); }
#clock {
  position: fixed; top: 38px; right: 10px; z-index: 10;
  font-size: 28px; font-weight: 100; letter-spacing: 4px; color: rgba(255,255,255,0.06);
}
#tgt {
  position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); z-index: 10;
  font-size: 7px; letter-spacing: 3px; color: rgba(200,70,70,0.25); text-transform: uppercase;
}
</style>
</head>
<body>
<div id="hud-top">
  <div class="brand">OVERWATCH</div><span class="sep">|</span>
  <div class="sc" id="sc">SWARM DEPLOY -- SALESFORCE TOWER</div>
  <div class="ctrls">
    <button id="bp" class="on">PAUSE</button>
    <button id="br">RESET</button>
    <button id="bt">TRACK</button>
  </div>
</div>
<div id="stats">
  <div>LAUNCH <span class="sv">WHITE VAN -- MISSION ST</span></div>
  <div>TARGET <span class="sr" id="sTgt">SALESFORCE TOWER</span></div>
  <div>DEPLOYED <span class="sb" id="sDep">0</span></div>
  <div>IN FLIGHT <span class="sb" id="sFly">0</span></div>
  <div>STRIKES <span class="sg" id="sHit">0</span></div>
  <div>TARGETS HIT <span class="sr" id="sTH">0 / 4</span></div>
</div>
<div id="clock">00:00</div>
<div id="tgt">TARGET: SALESFORCE TOWER -- 37.7897N 122.3972W</div>

<script src="js/three.min.js"></script>
<script src="js/OrbitControls.js"></script>
<script>
"use strict";

var scene = new THREE.Scene();
scene.background = new THREE.Color(0x080a10);
scene.fog = new THREE.Fog(0x080a10, 500, 1500);

var camera = new THREE.PerspectiveCamera(55, innerWidth/innerHeight, 0.5, 4000);
camera.position.set(250, 160, 300);

var renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(innerWidth, innerHeight);
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
document.body.appendChild(renderer.domElement);

var ctrl = new THREE.OrbitControls(camera, renderer.domElement);
ctrl.enableDamping = true; ctrl.dampingFactor = 0.05;
ctrl.target.set(0, 80, 0);
ctrl.autoRotate = true; ctrl.autoRotateSpeed = 0.15;

// ---- LIGHTS ----
scene.add(new THREE.AmbientLight(0x445566, 1.0));
var sun = new THREE.DirectionalLight(0x8899bb, 0.7);
sun.position.set(300, 500, 200);
scene.add(sun);
scene.add(new THREE.DirectionalLight(0x556688, 0.4).translateX(-200).translateY(300));
scene.add(new THREE.HemisphereLight(0x334466, 0x111122, 0.4));

// ---- GROUND ----
scene.add(new THREE.Mesh(
  new THREE.PlaneGeometry(3000, 3000),
  new THREE.MeshLambertMaterial({ color: 0x101418 })
).rotateX(-Math.PI/2));

// Street lines
var stMat = new THREE.LineBasicMaterial({ color: 0x1e2230 });
for (var i = -600; i <= 600; i += 50) {
  scene.add(new THREE.Line(new THREE.BufferGeometry().setFromPoints([new THREE.Vector3(i,0.2,-600), new THREE.Vector3(i,0.2,600)]), stMat));
  scene.add(new THREE.Line(new THREE.BufferGeometry().setFromPoints([new THREE.Vector3(-600,0.2,i), new THREE.Vector3(600,0.2,i)]), stMat));
}

// ---- BUILDING SYSTEM ----
var buildings = []; // { x, z, w, d, h } for collision avoidance

function bld(x, z, w, d, h, glassColor) {
  buildings.push({ x:x, z:z, w:w, d:d, h:h });
  var c = glassColor || new THREE.Color().setHSL(0.6 + Math.random()*0.06, 0.2, 0.13 + h/2000);
  var mesh = new THREE.Mesh(
    new THREE.BoxGeometry(w, h, d),
    new THREE.MeshLambertMaterial({ color: c })
  );
  mesh.position.set(x, h/2, z);
  scene.add(mesh);
  // Edges
  scene.add(new THREE.LineSegments(
    new THREE.EdgesGeometry(new THREE.BoxGeometry(w,h,d)),
    new THREE.LineBasicMaterial({ color: 0xffffff, transparent: true, opacity: 0.06 })
  ).translateX(x).translateY(h/2).translateZ(z));
  // Windows -- bright warm rectangles
  var wMat = new THREE.MeshBasicMaterial({ color: 0xffeebb, transparent: true, opacity: 0.25 + Math.random()*0.2 });
  var wOff = new THREE.MeshBasicMaterial({ color: 0xffeebb, transparent: true, opacity: 0.05 });
  for (var wy = 6; wy < h-3; wy += 4) {
    for (var face = 0; face < 4; face++) {
      var lit = Math.random() < 0.35;
      if (!lit && Math.random() > 0.3) continue;
      var wg = new THREE.Mesh(new THREE.PlaneGeometry(1.8, 2.2), lit ? wMat : wOff);
      var wo = (Math.random()-0.5) * (face<2 ? w*0.7 : d*0.7);
      if (face===0) wg.position.set(x+wo, wy, z+d/2+0.3);
      else if (face===1) wg.position.set(x+wo, wy, z-d/2-0.3);
      else if (face===2) { wg.position.set(x+w/2+0.3, wy, z+wo); wg.rotation.y=Math.PI/2; }
      else { wg.position.set(x-w/2-0.3, wy, z+wo); wg.rotation.y=Math.PI/2; }
      scene.add(wg);
    }
  }
  // Rooftop
  if (h > 60 && Math.random() > 0.3) {
    scene.add(new THREE.Mesh(
      new THREE.BoxGeometry(w*0.25, 5, d*0.25),
      new THREE.MeshLambertMaterial({ color: 0x0d0f14 })
    ).translateX(x).translateY(h+2.5).translateZ(z));
    // Red blink light
    var blink = new THREE.Mesh(new THREE.SphereGeometry(0.5,4,4), new THREE.MeshBasicMaterial({ color: 0xff2222 }));
    blink.position.set(x, h+6, z);
    blink.userData.blink = true;
    scene.add(blink);
  }
}

// ---- SALESFORCE TOWER ----
(function(){
  var h = 326;
  var geo = new THREE.CylinderGeometry(13, 19, h, 24);
  scene.add(new THREE.Mesh(geo, new THREE.MeshLambertMaterial({ color: 0x2a3858 })).translateY(h/2));
  scene.add(new THREE.LineSegments(new THREE.EdgesGeometry(geo),
    new THREE.LineBasicMaterial({ color: 0x5577bb, transparent: true, opacity: 0.12 })).translateY(h/2));
  scene.add(new THREE.PointLight(0x4488ff, 1.5, 100).translateY(h+8));
  buildings.push({ x:0, z:0, w:40, d:40, h:h });
  // Target ring
  var rp = [];
  for (var i=0;i<=64;i++) { var a=i/64*Math.PI*2; rp.push(new THREE.Vector3(Math.cos(a)*26,0,Math.sin(a)*26)); }
  var ring = new THREE.Line(new THREE.BufferGeometry().setFromPoints(rp),
    new THREE.LineBasicMaterial({ color: 0xff3333, transparent: true, opacity: 0.5 }));
  ring.position.y = h+12;
  ring.userData.pulse = true;
  scene.add(ring);
  scene.add(new THREE.Mesh(new THREE.CylinderGeometry(0.4,0.4,500,4),
    new THREE.MeshBasicMaterial({ color: 0xff3333, transparent: true, opacity: 0.03 })).translateY(250));
})();

// ---- TRANSAMERICA ----
(function(){
  var h=260;
  var g=new THREE.ConeGeometry(20,h,4);
  var m=new THREE.Mesh(g, new THREE.MeshLambertMaterial({ color: 0x3a4050 }));
  m.position.set(-250,h/2,180); m.rotation.y=Math.PI/4;
  scene.add(m);
  scene.add(new THREE.LineSegments(new THREE.EdgesGeometry(g),
    new THREE.LineBasicMaterial({color:0xffffff,transparent:true,opacity:0.08})).translateX(-250).translateY(h/2).translateZ(180).rotateY(Math.PI/4));
  buildings.push({x:-250,z:180,w:40,d:40,h:h});
})();

// ---- NAMED TOWERS ----
bld(65, -55, 26, 26, 244);   // 181 Fremont
bld(-85, -95, 28, 28, 197);  // Millennium
bld(-205, 95, 42, 33, 237);  // 555 California
bld(155, -205, 24, 24, 195); // One Rincon
bld(-45, 55, 33, 28, 183);   // 50 Fremont
bld(-185, 45, 38, 28, 212);  // 345 California
bld(-125, 195, 33, 24, 174); // Embarcadero 4
bld(35, 75, 28, 26, 148);    // 100 First
bld(85, 95, 33, 28, 160);    // McKesson

// ---- FILL CITY ----
for (var bx=-400; bx<=400; bx+=48) {
  for (var bz=-350; bz<=400; bz+=48) {
    if (Math.random()<0.15) continue;
    if (Math.abs(bx)<45 && Math.abs(bz)<45) continue;
    var tooClose = buildings.some(function(b){ return Math.abs(b.x-bx)<35 && Math.abs(b.z-bz)<35; });
    if (tooClose) continue;
    bld(bx+(Math.random()-0.5)*12, bz+(Math.random()-0.5)*12,
        12+Math.random()*18, 12+Math.random()*18, 20+Math.random()*90);
  }
}

// ---- WHITE VAN ----
var vanGrp = new THREE.Group();
var vanBody = new THREE.Mesh(new THREE.BoxGeometry(5,4,12), new THREE.MeshBasicMaterial({color:0xf0f0f0}));
vanBody.position.y = 3;
vanGrp.add(vanBody);
var vanCab = new THREE.Mesh(new THREE.BoxGeometry(4.8,2.8,3.5), new THREE.MeshBasicMaterial({color:0xe0e0e0}));
vanCab.position.set(0,5,-4.5);
vanGrp.add(vanCab);
vanGrp.add(new THREE.Mesh(new THREE.PlaneGeometry(4,2.2), new THREE.MeshBasicMaterial({color:0x224466})).translateY(5.5).translateZ(-6.3));
// Wheels
[[-2.8,1,-3.5],[2.8,1,-3.5],[-2.8,1,3.5],[2.8,1,3.5]].forEach(function(p){
  var w=new THREE.Mesh(new THREE.CylinderGeometry(1,1,0.5,8),new THREE.MeshBasicMaterial({color:0x1a1a1a}));
  w.position.set(p[0],p[1],p[2]); w.rotation.z=Math.PI/2; vanGrp.add(w);
});
// Open doors
vanGrp.add(new THREE.Mesh(new THREE.BoxGeometry(0.2,3.2,2.5),new THREE.MeshBasicMaterial({color:0xd8d8d8})).translateX(-2.8).translateY(3.2).translateZ(7).rotateY(-0.7));
vanGrp.add(new THREE.Mesh(new THREE.BoxGeometry(0.2,3.2,2.5),new THREE.MeshBasicMaterial({color:0xd8d8d8})).translateX(2.8).translateY(3.2).translateZ(7).rotateY(0.7));
vanGrp.add(new THREE.PointLight(0x3388ff, 2, 25).translateY(3));
vanGrp.add(new THREE.PointLight(0xffffff, 0.6, 35).translateY(10));
var VX=170, VZ=210;
vanGrp.position.set(VX, 0, VZ);
vanGrp.rotation.y = Math.atan2(-VX, -VZ);
scene.add(vanGrp);

// ---- TARGET LOCATIONS (4 strike points) ----
var TARGETS = [
  { x: 0, z: 0, y: 300, name: "SALESFORCE TOWER -- CROWN", hit: false },
  { x: -250, z: 180, y: 240, name: "TRANSAMERICA -- APEX", hit: false },
  { x: 65, z: -55, y: 220, name: "181 FREMONT -- ROOF", hit: false },
  { x: -205, z: 95, y: 210, name: "555 CALIFORNIA -- ROOF", hit: false },
];
TARGETS.forEach(function(t) {
  // Diamond marker at target
  var dm = new THREE.Mesh(new THREE.OctahedronGeometry(4,0), new THREE.MeshBasicMaterial({color:0xff3333,wireframe:true,transparent:true,opacity:0.6}));
  dm.position.set(t.x, t.y, t.z);
  dm.userData.targetMarker = true;
  scene.add(dm);
  t.marker = dm;
});

// ---- DRONE SWARM ----
var TOTAL = 20, drones = [], deployed = 0, strikes = 0, targetsHit = 0;
var tick = 0, playing = true, trackCam = false;

function spawnDrone(targetIdx) {
  var mesh = new THREE.Group();
  // Body
  var body = new THREE.Mesh(new THREE.BoxGeometry(2,0.8,2), new THREE.MeshBasicMaterial({color:0x88bbff}));
  mesh.add(body);
  // Arms
  var armMat = new THREE.MeshBasicMaterial({color:0x6699cc});
  var a1 = new THREE.Mesh(new THREE.BoxGeometry(6,0.2,0.3), armMat);
  a1.rotation.y = Math.PI/4; mesh.add(a1);
  var a2 = new THREE.Mesh(new THREE.BoxGeometry(6,0.2,0.3), armMat);
  a2.rotation.y = -Math.PI/4; mesh.add(a2);
  // Rotors
  var rMat = new THREE.MeshBasicMaterial({color:0x44aaff, transparent:true, opacity:0.4});
  [[-2.1,0.3,-2.1],[2.1,0.3,-2.1],[-2.1,0.3,2.1],[2.1,0.3,2.1]].forEach(function(p){
    var r = new THREE.Mesh(new THREE.CylinderGeometry(1.2,1.2,0.1,8), rMat);
    r.position.set(p[0],p[1],p[2]); r.userData.rotor=true; mesh.add(r);
  });
  // Glow
  mesh.add(new THREE.PointLight(0x4488ff, 0.3, 20));

  mesh.position.set(VX, 3, VZ);
  scene.add(mesh);

  var trail = [];
  var tLine = new THREE.Line(new THREE.BufferGeometry(),
    new THREE.LineBasicMaterial({color:0x2244aa, transparent:true, opacity:0.25}));
  scene.add(tLine);

  var tgt = TARGETS[targetIdx % TARGETS.length];
  return {
    mesh: mesh, trail: trail, tLine: tLine,
    launched: false, phase: "wait", struck: false,
    targetIdx: targetIdx % TARGETS.length,
    tx: tgt.x, ty: tgt.y, tz: tgt.z,
    cruiseAlt: 60 + Math.random()*180,
    speed: 2.5 + Math.random()*1.5,
    wobble: Math.random()*Math.PI*2,
    avoidCooldown: 0
  };
}
for (var i=0; i<TOTAL; i++) drones.push(spawnDrone(i));

// ---- BUILDING COLLISION AVOIDANCE ----
function avoidBuildings(pos, vel, idx) {
  var ax=0, az=0, ay=0;
  var AVOID_DIST = 30;
  for (var i=0; i<buildings.length; i++) {
    var b = buildings[i];
    // Only avoid if at building altitude
    if (pos.y > b.h + 15) continue;
    var dx = pos.x - b.x, dz = pos.z - b.z;
    var halfW = b.w/2 + AVOID_DIST, halfD = b.d/2 + AVOID_DIST;
    if (Math.abs(dx) < halfW && Math.abs(dz) < halfD) {
      // Inside avoidance zone -- push away
      var pushX = dx > 0 ? (halfW - dx) : -(halfW + dx);
      var pushZ = dz > 0 ? (halfD - dz) : -(halfD + dz);
      if (Math.abs(pushX) < Math.abs(pushZ)) ax += pushX * 0.15;
      else az += pushZ * 0.15;
      // Also climb if close to building height
      if (pos.y < b.h + 10) ay += 1.5;
    }
  }
  return { x: ax, y: ay, z: az };
}

// ---- DRONE-TO-DRONE SEPARATION ----
function separateDrones(idx) {
  var me = drones[idx].mesh.position;
  var sx=0, sz=0, sy=0;
  var SEP = 15;
  for (var j=0; j<drones.length; j++) {
    if (j===idx || !drones[j].launched || drones[j].struck) continue;
    var o = drones[j].mesh.position;
    var dx=me.x-o.x, dy=me.y-o.y, dz=me.z-o.z;
    var d = Math.sqrt(dx*dx+dy*dy+dz*dz);
    if (d < SEP && d > 0.1) {
      var f = (SEP-d)/SEP * 0.8;
      sx += (dx/d)*f; sy += (dy/d)*f; sz += (dz/d)*f;
    }
  }
  return { x:sx, y:sy, z:sz };
}

// ---- EXPLOSION ----
var explosions = [];
function explode(pos) {
  var pts = [];
  for (var i=0;i<30;i++){
    pts.push(pos.clone());
    pts.push(new THREE.Vector3(pos.x+(Math.random()-0.5)*20, pos.y+(Math.random()-0.5)*20, pos.z+(Math.random()-0.5)*20));
  }
  var l = new THREE.LineSegments(new THREE.BufferGeometry().setFromPoints(pts),
    new THREE.LineBasicMaterial({color:0xffaa33,transparent:true,opacity:0.9}));
  scene.add(l);
  // Flash
  var flash = new THREE.PointLight(0xffaa33, 3, 80);
  flash.position.copy(pos);
  scene.add(flash);
  explosions.push({ lines:l, flash:flash, life:30 });
}

// ---- SIM STEP ----
function step() {
  if (!playing) return;
  tick++;

  // Deploy
  if (tick % 10 === 0 && deployed < TOTAL) {
    drones[deployed].launched = true;
    drones[deployed].phase = "rise";
    deployed++;
  }

  drones.forEach(function(dr, idx) {
    if (!dr.launched || dr.phase==="wait" || dr.struck) return;
    var p = dr.mesh.position;

    // Avoidance forces
    var bldAvoid = avoidBuildings(p, null, idx);
    var droneAvoid = separateDrones(idx);

    if (dr.phase === "rise") {
      p.y += 2;
      p.x += bldAvoid.x; p.z += bldAvoid.z;
      if (p.y > 30) dr.phase = "cruise";
    } else if (dr.phase === "cruise") {
      // Climb to cruise altitude
      p.y += (dr.cruiseAlt - p.y) * 0.03 + bldAvoid.y;
      // Move toward target
      var dx = dr.tx - p.x, dz = dr.tz - p.z;
      var dist = Math.sqrt(dx*dx + dz*dz) || 1;
      p.x += (dx/dist) * dr.speed * 0.6 + bldAvoid.x + droneAvoid.x;
      p.z += (dz/dist) * dr.speed * 0.6 + bldAvoid.z + droneAvoid.z;
      p.y += droneAvoid.y;
      // Wobble
      p.x += Math.sin(tick*0.04+dr.wobble)*0.4;
      p.z += Math.cos(tick*0.05+dr.wobble)*0.4;
      if (Math.abs(p.y - dr.cruiseAlt) < 5 && dist < 200) dr.phase = "attack";
    } else if (dr.phase === "attack") {
      // Dive toward target
      var dx2=dr.tx-p.x, dy2=dr.ty-p.y, dz2=dr.tz-p.z;
      var dist2 = Math.sqrt(dx2*dx2+dy2*dy2+dz2*dz2) || 1;
      var spd = dr.speed * 1.5;
      p.x += (dx2/dist2)*spd + bldAvoid.x + droneAvoid.x*0.3;
      p.y += (dy2/dist2)*spd + bldAvoid.y;
      p.z += (dz2/dist2)*spd + bldAvoid.z + droneAvoid.z*0.3;
      // Bank into turn
      dr.mesh.rotation.z = Math.sin(tick*0.1+idx)*0.15;
      dr.mesh.rotation.x = -0.1;
      if (dist2 < 8) {
        // STRIKE
        dr.struck = true;
        dr.mesh.visible = false;
        explode(p.clone());
        strikes++;
        var tgt = TARGETS[dr.targetIdx];
        if (!tgt.hit) { tgt.hit = true; targetsHit++; tgt.marker.material.color.setHex(0x44ff44); tgt.marker.material.opacity = 0.3; }
      }
    }

    // Face direction
    if (dr.phase !== "wait") {
      var vx = p.x - (dr.trail.length>0 ? dr.trail[dr.trail.length-1].x : p.x);
      var vz = p.z - (dr.trail.length>0 ? dr.trail[dr.trail.length-1].z : p.z);
      if (Math.abs(vx)>0.01 || Math.abs(vz)>0.01) dr.mesh.rotation.y = Math.atan2(vx,vz);
    }

    // Spin rotors
    dr.mesh.children.forEach(function(c){ if(c.userData&&c.userData.rotor) c.rotation.y+=0.6; });

    // Trail
    dr.trail.push(p.clone());
    if (dr.trail.length>80) dr.trail.shift();
    if (dr.trail.length>1) {
      dr.tLine.geometry.dispose();
      dr.tLine.geometry = new THREE.BufferGeometry().setFromPoints(dr.trail);
    }
  });

  // Explosions
  explosions = explosions.filter(function(e){
    e.life--;
    e.lines.material.opacity = e.life/30*0.9;
    e.flash.intensity = e.life/30*3;
    if (e.life<=0) { scene.remove(e.lines); scene.remove(e.flash); return false; }
    return true;
  });

  // Pulse targets
  scene.traverse(function(o){
    if (o.userData.pulse) { var s=1+Math.sin(tick*0.1)*0.12; o.scale.set(s,s,s); }
    if (o.userData.blink) o.visible = Math.sin(tick*0.12+o.position.x)>0;
    if (o.userData.targetMarker && !o.userData.wasHit) o.rotation.y += 0.03;
  });

  // HUD
  var inFlight = drones.filter(function(d){return d.launched&&!d.struck;}).length;
  document.getElementById("sDep").textContent = deployed+"/"+TOTAL;
  document.getElementById("sFly").textContent = inFlight;
  document.getElementById("sHit").textContent = strikes;
  document.getElementById("sTH").textContent = targetsHit+" / "+TARGETS.length;
  var mm=Math.floor(tick/60), ss=tick%60;
  document.getElementById("clock").textContent = String(mm).padStart(2,"0")+":"+String(ss).padStart(2,"0");
  // Show current target name
  var active = drones.find(function(d){return d.launched&&!d.struck;});
  if (active) document.getElementById("sTgt").textContent = TARGETS[active.targetIdx].name;
}

// ---- TRACK CAM ----
function camTick() {
  if (!trackCam) return;
  var t = drones.find(function(d){return d.launched&&!d.struck&&d.phase!=="wait";});
  if (!t) return;
  var p = t.mesh.position;
  camera.position.lerp(new THREE.Vector3(p.x+30, p.y+12, p.z+30), 0.04);
  ctrl.target.lerp(new THREE.Vector3(p.x, p.y, p.z), 0.08);
}

function animate() {
  requestAnimationFrame(animate);
  step(); camTick(); ctrl.update();
  renderer.render(scene, camera);
}

// ---- CONTROLS ----
document.getElementById("bp").onclick = function(){ playing=!playing; this.textContent=playing?"PAUSE":"PLAY"; };
document.getElementById("br").onclick = function(){
  drones.forEach(function(d){scene.remove(d.mesh);scene.remove(d.tLine);});
  explosions.forEach(function(e){scene.remove(e.lines);scene.remove(e.flash);});
  explosions=[];
  TARGETS.forEach(function(t){t.hit=false;t.marker.material.color.setHex(0xff3333);t.marker.material.opacity=0.6;});
  drones=[];
  for(var i=0;i<TOTAL;i++) drones.push(spawnDrone(i));
  deployed=0; strikes=0; targetsHit=0; tick=0;
};
document.getElementById("bt").onclick = function(){
  trackCam=!trackCam; this.className=trackCam?"on":"";
  ctrl.autoRotate=!trackCam;
};
window.onresize = function(){
  camera.aspect=innerWidth/innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth,innerHeight);
};

animate();
</script>
</body>
</html>
