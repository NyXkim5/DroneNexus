<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OVERWATCH 3D Asset View</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #0a0a0f; color: #e0e0e0; font-family: 'Courier New', monospace; overflow: hidden; }

#canvas3d { width: 100vw; height: 100vh; display: block; }

/* HUD overlay */
#overlay {
    position: fixed; top: 0; left: 0; right: 0;
    padding: 12px 20px;
    display: flex; justify-content: space-between; align-items: center;
    background: linear-gradient(180deg, rgba(0,0,0,0.8) 0%, transparent 100%);
    pointer-events: none; z-index: 10;
}
#overlay > * { pointer-events: auto; }
.overlay-title {
    font-size: 14px; font-weight: bold; letter-spacing: 2px;
    color: #00ff88; text-shadow: 0 0 10px rgba(0,255,136,0.5);
}
.overlay-stats {
    display: flex; gap: 20px; font-size: 11px; color: #8892a0;
}
.stat-val { color: #00ccff; margin-left: 4px; }

/* Controls panel */
#controls {
    position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
    display: flex; gap: 10px; z-index: 10;
}
.ctrl-btn {
    background: rgba(20,25,35,0.9); border: 1px solid #2a3040;
    color: #8892a0; padding: 8px 16px; font-family: inherit; font-size: 11px;
    letter-spacing: 1px; cursor: pointer; border-radius: 4px;
    transition: all 0.2s;
}
.ctrl-btn:hover { border-color: #00ff88; color: #00ff88; }
.ctrl-btn.active { border-color: #00ff88; color: #00ff88; background: rgba(0,255,136,0.1); }

/* Connection indicator */
#conn-status {
    position: fixed; top: 12px; right: 20px;
    font-size: 11px; padding: 4px 12px; border-radius: 10px; z-index: 10;
}
.conn-ok { background: rgba(0,255,136,0.15); color: #00ff88; border: 1px solid rgba(0,255,136,0.3); }
.conn-off { background: rgba(255,50,80,0.15); color: #ff3355; border: 1px solid rgba(255,50,80,0.3); }

/* Drone info tooltip */
#tooltip {
    position: fixed; display: none; background: rgba(10,15,25,0.95);
    border: 1px solid #00ff88; border-radius: 6px; padding: 10px 14px;
    font-size: 11px; z-index: 20; pointer-events: none;
    min-width: 160px;
}
#tooltip .tt-id { color: #00ff88; font-weight: bold; font-size: 12px; margin-bottom: 6px; }
#tooltip .tt-row { display: flex; justify-content: space-between; margin: 2px 0; }
#tooltip .tt-label { color: #8892a0; }
#tooltip .tt-val { color: #00ccff; }

/* Legend */
#legend {
    position: fixed; bottom: 70px; right: 20px; z-index: 10;
    background: rgba(10,15,25,0.9); border: 1px solid #1a2030;
    border-radius: 6px; padding: 10px 14px; font-size: 10px;
}
#legend .leg-title { color: #8892a0; margin-bottom: 6px; letter-spacing: 1px; }
.leg-item { display: flex; align-items: center; gap: 8px; margin: 3px 0; }
.leg-dot { width: 8px; height: 8px; border-radius: 50%; }
</style>
</head>
<body>

<canvas id="canvas3d"></canvas>

<div id="overlay">
    <div class="overlay-title">OVERWATCH 3D ASSET VIEW</div>
    <div class="overlay-stats">
        <span>ASSETS: <span class="stat-val" id="stat-drones">0</span></span>
        <span>FPS: <span class="stat-val" id="stat-fps">0</span></span>
        <span>FORMATION: <span class="stat-val" id="stat-formation">—</span></span>
    </div>
</div>

<div id="conn-status" class="conn-off">DISCONNECTED</div>

<div id="tooltip">
    <div class="tt-id"></div>
    <div class="tt-row"><span class="tt-label">ALT</span><span class="tt-val tt-alt"></span></div>
    <div class="tt-row"><span class="tt-label">SPD</span><span class="tt-val tt-spd"></span></div>
    <div class="tt-row"><span class="tt-label">BAT</span><span class="tt-val tt-bat"></span></div>
    <div class="tt-row"><span class="tt-label">STATUS</span><span class="tt-val tt-status"></span></div>
</div>

<div id="controls">
    <button class="ctrl-btn active" data-cam="orbit">ORBIT</button>
    <button class="ctrl-btn" data-cam="top">TOP DOWN</button>
    <button class="ctrl-btn" data-cam="chase">CHASE</button>
    <button class="ctrl-btn" data-cam="free">FREE CAM</button>
    <button class="ctrl-btn" id="btn-trails">TRAILS ON</button>
    <button class="ctrl-btn" id="btn-grid">GRID ON</button>
</div>

<div id="legend">
    <div class="leg-title">ASSET CLASSIFICATIONS</div>
    <div class="leg-item"><div class="leg-dot" style="background:#00ff88"></div>PRIMARY</div>
    <div class="leg-item"><div class="leg-dot" style="background:#3388ff"></div>ESCORT</div>
    <div class="leg-item"><div class="leg-dot" style="background:#ffaa00"></div>ISR</div>
    <div class="leg-item"><div class="leg-dot" style="background:#00ccff"></div>LOGISTICS</div>
    <div class="leg-item"><div class="leg-dot" style="background:#aa55ff"></div>OVERWATCH</div>
</div>

<script type="importmap">
{ "imports": { "three": "https://cdn.jsdelivr.net/npm/three@0.164.1/build/three.module.js", "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.164.1/examples/jsm/" } }
</script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

// ============================================================
// CONFIG
// ============================================================
const WS_URL = 'ws://localhost:8765/telemetry/stream';
const CENTER = { lat: 33.6405, lon: -117.8443 };
const SCALE = 10000; // lat/lon degrees to 3D units
const ALT_SCALE = 0.3; // altitude meters to 3D units
const TRAIL_LENGTH = 200;

const ROLE_COLORS = {
    PRIMARY: 0x00ff88, ESCORT: 0x3388ff, ISR: 0xffaa00,
    LOGISTICS: 0x00ccff, OVERWATCH: 0xaa55ff
};
const STATUS_EMISSIVE = {
    NOMINAL: 0x000000, DEGRADED: 0xff8800, COMMS_DEGRADED: 0xffff00,
    RTB: 0xff3355, OFFLINE: 0xff0000, GROUNDED: 0x444444
};

// ============================================================
// THREE.JS SETUP
// ============================================================
const canvas = document.getElementById('canvas3d');
const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.toneMapping = THREE.ACESFilmicToneMapping;

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x0a0a12);
scene.fog = new THREE.FogExp2(0x0a0a12, 0.003);

const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 2000);
camera.position.set(40, 60, 80);

const controls = new OrbitControls(camera, canvas);
controls.enableDamping = true;
controls.dampingFactor = 0.08;
controls.target.set(0, 15, 0);
controls.maxPolarAngle = Math.PI * 0.48;

// ============================================================
// LIGHTING
// ============================================================
const ambient = new THREE.AmbientLight(0x1a2040, 0.6);
scene.add(ambient);

const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
dirLight.position.set(50, 100, 50);
dirLight.castShadow = true;
dirLight.shadow.mapSize.set(2048, 2048);
dirLight.shadow.camera.near = 1;
dirLight.shadow.camera.far = 300;
dirLight.shadow.camera.left = -100;
dirLight.shadow.camera.right = 100;
dirLight.shadow.camera.top = 100;
dirLight.shadow.camera.bottom = -100;
scene.add(dirLight);

const hemi = new THREE.HemisphereLight(0x00ff88, 0x0a0a12, 0.15);
scene.add(hemi);

// ============================================================
// GROUND + GRID
// ============================================================
const groundGeo = new THREE.PlaneGeometry(500, 500);
const groundMat = new THREE.MeshStandardMaterial({
    color: 0x0d1117, roughness: 0.95, metalness: 0.0
});
const ground = new THREE.Mesh(groundGeo, groundMat);
ground.rotation.x = -Math.PI / 2;
ground.receiveShadow = true;
scene.add(ground);

const gridHelper = new THREE.GridHelper(400, 80, 0x1a2530, 0x0f1520);
scene.add(gridHelper);

// Geofence boundary visualization
const fenceVerts = [
    [33.6450, -117.8500], [33.6450, -117.8380],
    [33.6360, -117.8380], [33.6360, -117.8500]
];
const fencePoints = fenceVerts.map(([lat, lon]) =>
    new THREE.Vector3((lon - CENTER.lon) * SCALE, 0.2, -(lat - CENTER.lat) * SCALE)
);
fencePoints.push(fencePoints[0].clone());
const fenceGeo = new THREE.BufferGeometry().setFromPoints(fencePoints);
const fenceMat = new THREE.LineBasicMaterial({ color: 0xff3355, opacity: 0.4, transparent: true });
const fenceLine = new THREE.Line(fenceGeo, fenceMat);
scene.add(fenceLine);

// Fence posts
fenceVerts.forEach(([lat, lon]) => {
    const postGeo = new THREE.CylinderGeometry(0.15, 0.15, 2, 6);
    const postMat = new THREE.MeshStandardMaterial({ color: 0xff3355, emissive: 0xff1133, emissiveIntensity: 0.3 });
    const post = new THREE.Mesh(postGeo, postMat);
    post.position.set((lon - CENTER.lon) * SCALE, 1, -(lat - CENTER.lat) * SCALE);
    scene.add(post);
});

// ============================================================
// DRONE MODEL
// ============================================================
function createDroneModel(color) {
    const group = new THREE.Group();

    // Body — sleek hexagonal fuselage
    const bodyGeo = new THREE.CylinderGeometry(0.8, 1.0, 0.4, 6);
    const bodyMat = new THREE.MeshStandardMaterial({
        color: 0x1a2030, roughness: 0.3, metalness: 0.8
    });
    const body = new THREE.Mesh(bodyGeo, bodyMat);
    body.castShadow = true;
    group.add(body);

    // Top dome
    const domeGeo = new THREE.SphereGeometry(0.5, 8, 4, 0, Math.PI * 2, 0, Math.PI / 2);
    const domeMat = new THREE.MeshStandardMaterial({
        color: 0x2a3545, roughness: 0.2, metalness: 0.9
    });
    const dome = new THREE.Mesh(domeGeo, domeMat);
    dome.position.y = 0.2;
    group.add(dome);

    // Arms (4)
    for (let i = 0; i < 4; i++) {
        const angle = (i / 4) * Math.PI * 2 + Math.PI / 4;
        const armGeo = new THREE.BoxGeometry(2.5, 0.12, 0.15);
        const armMat = new THREE.MeshStandardMaterial({ color: 0x2a3545, metalness: 0.7 });
        const arm = new THREE.Mesh(armGeo, armMat);
        arm.position.set(Math.cos(angle) * 1.2, 0, Math.sin(angle) * 1.2);
        arm.rotation.y = -angle;
        arm.castShadow = true;
        group.add(arm);

        // Motor housing
        const motorGeo = new THREE.CylinderGeometry(0.3, 0.35, 0.25, 8);
        const motorMat = new THREE.MeshStandardMaterial({ color: 0x333d4d, metalness: 0.9 });
        const motor = new THREE.Mesh(motorGeo, motorMat);
        motor.position.set(Math.cos(angle) * 2.3, 0.15, Math.sin(angle) * 2.3);
        group.add(motor);

        // Rotor disc (spinning)
        const rotorGeo = new THREE.CircleGeometry(0.9, 16);
        const rotorMat = new THREE.MeshBasicMaterial({
            color: color, opacity: 0.15, transparent: true, side: THREE.DoubleSide
        });
        const rotor = new THREE.Mesh(rotorGeo, rotorMat);
        rotor.position.set(Math.cos(angle) * 2.3, 0.35, Math.sin(angle) * 2.3);
        rotor.rotation.x = -Math.PI / 2;
        rotor.userData.isRotor = true;
        rotor.userData.rotorSpeed = 0.3 + Math.random() * 0.1;
        group.add(rotor);
    }

    // LED indicator
    const ledGeo = new THREE.SphereGeometry(0.15, 8, 8);
    const ledMat = new THREE.MeshBasicMaterial({ color });
    const led = new THREE.Mesh(ledGeo, ledMat);
    led.position.set(0, 0.45, -0.5);
    led.userData.isLED = true;
    group.add(led);

    // Direction indicator (front arrow)
    const arrowGeo = new THREE.ConeGeometry(0.2, 0.6, 4);
    const arrowMat = new THREE.MeshBasicMaterial({ color });
    const arrow = new THREE.Mesh(arrowGeo, arrowMat);
    arrow.rotation.x = Math.PI / 2;
    arrow.position.set(0, 0.1, -1.3);
    group.add(arrow);

    // Label sprite
    group.userData.labelSprite = null;

    return group;
}

// ============================================================
// DRONE STATE MANAGEMENT
// ============================================================
const drones = {}; // drone_id -> { model, trail, data, trailPoints }
let showTrails = true;
let showGrid = true;

function getDrone(id, role) {
    if (drones[id]) return drones[id];

    const color = ROLE_COLORS[role] || 0x3388ff;
    const model = createDroneModel(color);
    scene.add(model);

    // Trail
    const trailMax = TRAIL_LENGTH;
    const trailGeo = new THREE.BufferGeometry();
    const positions = new Float32Array(trailMax * 3);
    trailGeo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
    trailGeo.setDrawRange(0, 0);

    const trailMat = new THREE.LineBasicMaterial({
        color, opacity: 0.5, transparent: true
    });
    const trail = new THREE.Line(trailGeo, trailMat);
    scene.add(trail);

    // ID label
    const labelCanvas = document.createElement('canvas');
    labelCanvas.width = 128;
    labelCanvas.height = 32;
    const ctx = labelCanvas.getContext('2d');
    ctx.fillStyle = '#' + color.toString(16).padStart(6, '0');
    ctx.font = 'bold 18px Courier New';
    ctx.textAlign = 'center';
    ctx.fillText(id, 64, 22);
    const labelTex = new THREE.CanvasTexture(labelCanvas);
    const labelMat = new THREE.SpriteMaterial({ map: labelTex, transparent: true, opacity: 0.8 });
    const label = new THREE.Sprite(labelMat);
    label.scale.set(4, 1, 1);
    scene.add(label);

    const entry = {
        model, trail, label, data: null,
        trailPoints: [], trailIndex: 0,
        color
    };
    drones[id] = entry;
    return entry;
}

function updateDrone(packet) {
    const d = getDrone(packet.drone_id, packet.formation?.role || 'WINGMAN');
    d.data = packet;

    const x = (packet.position.lon - CENTER.lon) * SCALE;
    const z = -(packet.position.lat - CENTER.lat) * SCALE;
    const y = (packet.position.alt_agl || 30) * ALT_SCALE;

    // Smooth position update
    d.model.position.lerp(new THREE.Vector3(x, y, z), 0.15);

    // Rotation from heading
    const headingRad = THREE.MathUtils.degToRad(-(packet.velocity?.heading || 0) + 90);
    d.model.rotation.y = THREE.MathUtils.lerp(
        d.model.rotation.y, headingRad, 0.1
    );

    // Attitude (subtle tilt)
    const roll = THREE.MathUtils.degToRad(packet.attitude?.roll || 0) * 0.3;
    const pitch = THREE.MathUtils.degToRad(packet.attitude?.pitch || 0) * 0.3;
    d.model.rotation.z = THREE.MathUtils.lerp(d.model.rotation.z, roll, 0.1);
    d.model.rotation.x = THREE.MathUtils.lerp(d.model.rotation.x, pitch, 0.1);

    // Label position
    d.label.position.set(d.model.position.x, d.model.position.y + 3, d.model.position.z);

    // Status emissive
    const emissive = STATUS_EMISSIVE[packet.status] || 0x000000;
    d.model.children.forEach(child => {
        if (child.userData.isLED && child.material) {
            child.material.color.setHex(emissive || d.color);
        }
    });

    // Trail
    if (showTrails) {
        d.trailPoints.push(new THREE.Vector3(
            d.model.position.x, d.model.position.y, d.model.position.z
        ));
        if (d.trailPoints.length > TRAIL_LENGTH) d.trailPoints.shift();

        const posAttr = d.trail.geometry.getAttribute('position');
        for (let i = 0; i < d.trailPoints.length; i++) {
            posAttr.setXYZ(i, d.trailPoints[i].x, d.trailPoints[i].y, d.trailPoints[i].z);
        }
        posAttr.needsUpdate = true;
        d.trail.geometry.setDrawRange(0, d.trailPoints.length);
    }
    d.trail.visible = showTrails;
}

// ============================================================
// FORMATION LINES
// ============================================================
let formationLines = null;
function updateFormationLines() {
    if (formationLines) { scene.remove(formationLines); formationLines.geometry.dispose(); }

    const leaderDrone = drones['ALPHA-1'];
    if (!leaderDrone) return;

    const points = [];
    for (const [id, d] of Object.entries(drones)) {
        if (id === 'ALPHA-1' || !d.data) continue;
        points.push(leaderDrone.model.position.clone());
        points.push(d.model.position.clone());
    }

    if (points.length === 0) return;
    const geo = new THREE.BufferGeometry().setFromPoints(points);
    const mat = new THREE.LineBasicMaterial({ color: 0x00ff88, opacity: 0.15, transparent: true });
    formationLines = new THREE.LineSegments(geo, mat);
    scene.add(formationLines);
}

// ============================================================
// CAMERA MODES
// ============================================================
let cameraMode = 'orbit';
let chaseDroneId = 'ALPHA-1';

function updateCamera() {
    if (cameraMode === 'orbit') {
        controls.enabled = true;
        // Auto-rotate gently
        controls.autoRotate = true;
        controls.autoRotateSpeed = 0.5;
    } else if (cameraMode === 'top') {
        controls.enabled = false;
        camera.position.set(0, 120, 0.1);
        camera.lookAt(0, 0, 0);
    } else if (cameraMode === 'chase') {
        controls.enabled = false;
        const target = drones[chaseDroneId];
        if (target) {
            const pos = target.model.position;
            const heading = target.model.rotation.y;
            const dist = 15;
            camera.position.lerp(new THREE.Vector3(
                pos.x - Math.sin(heading) * dist,
                pos.y + 8,
                pos.z - Math.cos(heading) * dist
            ), 0.05);
            camera.lookAt(pos.x, pos.y, pos.z);
        }
    } else if (cameraMode === 'free') {
        controls.enabled = true;
        controls.autoRotate = false;
    }
}

// ============================================================
// WEBSOCKET
// ============================================================
let ws = null;
let reconnectTimer = null;

function connect() {
    ws = new WebSocket(WS_URL);

    ws.onopen = () => {
        document.getElementById('conn-status').className = 'conn-ok';
        document.getElementById('conn-status').textContent = 'CONNECTED';
        if (reconnectTimer) { clearInterval(reconnectTimer); reconnectTimer = null; }
    };

    ws.onmessage = (e) => {
        try {
            const data = JSON.parse(e.data);
            if (Array.isArray(data)) {
                data.forEach(updateDrone);
                document.getElementById('stat-drones').textContent = data.length;
                if (data[0]?.formation?.role) {
                    // Try to detect formation from cohesion patterns
                }
            } else if (data.type === 'STATE_SYNC') {
                if (data.drones) data.drones.forEach(updateDrone);
                if (data.formation) {
                    document.getElementById('stat-formation').textContent = data.formation;
                }
            } else if (data.type === 'ALERT') {
                // Could visualize alerts on drones
            }
        } catch (err) { /* ignore parse errors */ }
    };

    ws.onclose = () => {
        document.getElementById('conn-status').className = 'conn-off';
        document.getElementById('conn-status').textContent = 'DISCONNECTED';
        if (!reconnectTimer) {
            reconnectTimer = setInterval(() => {
                if (!ws || ws.readyState === WebSocket.CLOSED) connect();
            }, 3000);
        }
    };

    ws.onerror = () => ws.close();
}

// ============================================================
// RAYCASTER (hover tooltips)
// ============================================================
const raycaster = new THREE.Raycaster();
const mouse = new THREE.Vector2();
const tooltip = document.getElementById('tooltip');

canvas.addEventListener('mousemove', (e) => {
    mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
    mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;

    raycaster.setFromCamera(mouse, camera);

    let hoveredDrone = null;
    for (const [id, d] of Object.entries(drones)) {
        const intersects = raycaster.intersectObject(d.model, true);
        if (intersects.length > 0) {
            hoveredDrone = d;
            break;
        }
    }

    if (hoveredDrone && hoveredDrone.data) {
        const p = hoveredDrone.data;
        tooltip.style.display = 'block';
        tooltip.style.left = (e.clientX + 15) + 'px';
        tooltip.style.top = (e.clientY - 10) + 'px';
        tooltip.querySelector('.tt-id').textContent = p.drone_id;
        tooltip.querySelector('.tt-alt').textContent = (p.position.alt_agl || 0).toFixed(1) + 'm';
        tooltip.querySelector('.tt-spd').textContent = (p.velocity?.ground_speed || 0).toFixed(1) + ' m/s';
        tooltip.querySelector('.tt-bat').textContent = (p.battery?.remaining_pct || 0).toFixed(0) + '%';
        tooltip.querySelector('.tt-status').textContent = p.status || '—';
    } else {
        tooltip.style.display = 'none';
    }
});

// Click to select chase target
canvas.addEventListener('click', (e) => {
    mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
    mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
    raycaster.setFromCamera(mouse, camera);

    for (const [id, d] of Object.entries(drones)) {
        if (raycaster.intersectObject(d.model, true).length > 0) {
            chaseDroneId = id;
            break;
        }
    }
});

// ============================================================
// UI CONTROLS
// ============================================================
document.querySelectorAll('[data-cam]').forEach(btn => {
    btn.addEventListener('click', () => {
        cameraMode = btn.dataset.cam;
        document.querySelectorAll('[data-cam]').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        if (cameraMode !== 'orbit') {
            controls.autoRotate = false;
        }
    });
});

document.getElementById('btn-trails').addEventListener('click', function() {
    showTrails = !showTrails;
    this.textContent = showTrails ? 'TRAILS ON' : 'TRAILS OFF';
    this.classList.toggle('active', showTrails);
});

document.getElementById('btn-grid').addEventListener('click', function() {
    showGrid = !showGrid;
    gridHelper.visible = showGrid;
    this.textContent = showGrid ? 'GRID ON' : 'GRID OFF';
    this.classList.toggle('active', showGrid);
});

// ============================================================
// PARTICLES (ambient dust)
// ============================================================
const particleCount = 500;
const particleGeo = new THREE.BufferGeometry();
const particlePositions = new Float32Array(particleCount * 3);
for (let i = 0; i < particleCount; i++) {
    particlePositions[i * 3] = (Math.random() - 0.5) * 300;
    particlePositions[i * 3 + 1] = Math.random() * 80;
    particlePositions[i * 3 + 2] = (Math.random() - 0.5) * 300;
}
particleGeo.setAttribute('position', new THREE.BufferAttribute(particlePositions, 3));
const particleMat = new THREE.PointsMaterial({
    color: 0x334455, size: 0.3, transparent: true, opacity: 0.4
});
const particles = new THREE.Points(particleGeo, particleMat);
scene.add(particles);

// ============================================================
// RENDER LOOP
// ============================================================
let frameCount = 0;
let lastFpsTime = performance.now();

function animate() {
    requestAnimationFrame(animate);

    const now = performance.now();
    frameCount++;
    if (now - lastFpsTime > 1000) {
        document.getElementById('stat-fps').textContent = frameCount;
        frameCount = 0;
        lastFpsTime = now;
    }

    // Spin rotors
    for (const d of Object.values(drones)) {
        d.model.children.forEach(child => {
            if (child.userData.isRotor) {
                child.rotation.z += child.userData.rotorSpeed;
            }
        });
    }

    // Formation lines update (every 30 frames)
    if (frameCount % 30 === 0) updateFormationLines();

    // Particle drift
    const posAttr = particles.geometry.getAttribute('position');
    for (let i = 0; i < particleCount; i++) {
        posAttr.array[i * 3 + 1] += 0.01;
        if (posAttr.array[i * 3 + 1] > 80) posAttr.array[i * 3 + 1] = 0;
    }
    posAttr.needsUpdate = true;

    updateCamera();
    controls.update();
    renderer.render(scene, camera);
}

// ============================================================
// INIT
// ============================================================
window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
});

connect();
animate();

</script>
</body>
