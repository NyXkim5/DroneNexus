<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>OVERWATCH WARGAME - Live</title>
<script>window.CESIUM_BASE_URL="cesium/";</script>
<script src="cesium/Cesium.js"></script>
<link href="cesium/Widgets/widgets.css" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body,#c{width:100%;height:100%;overflow:hidden;background:#06080e}
.cesium-viewer-bottom,.cesium-viewer .cesium-widget-credits,
.cesium-viewer .cesium-viewer-animationContainer,
.cesium-viewer .cesium-viewer-timelineContainer{display:none!important}
#hud{position:absolute;inset:0;z-index:10;pointer-events:none;
  font-family:'JetBrains Mono','SF Mono','Consolas',monospace;-webkit-font-smoothing:antialiased}
#top-bar{display:flex;align-items:center;gap:10px;padding:6px 14px;font-size:9px;letter-spacing:2.5px;
  text-transform:uppercase;color:rgba(140,200,255,0.7);background:rgba(4,8,16,0.85);
  border-bottom:1px solid rgba(60,120,200,0.12);pointer-events:auto}
#top-bar .tag{color:rgba(80,200,255,0.9);font-weight:700}
#top-bar .sep{color:rgba(60,120,200,0.12);margin:0 4px}
.dot{display:inline-block;width:7px;height:7px;border-radius:50%;margin-right:5px;vertical-align:middle}
.dot.ok{background:#0f0}.dot.err{background:#f44}.dot.wait{background:#fa0;animation:pulse 1s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
#scenario-select{background:rgba(4,8,16,0.9);border:1px solid rgba(60,120,200,0.12);
  color:rgba(80,200,255,0.9);font-family:inherit;font-size:8px;letter-spacing:1.5px;
  padding:3px 6px;pointer-events:auto;cursor:pointer;text-transform:uppercase}
#top-bar .spacer{flex:1}
#metrics{position:absolute;top:42px;left:12px;font-size:9px;letter-spacing:1.5px;
  color:rgba(140,200,255,0.7);background:rgba(4,8,16,0.85);padding:10px 14px;
  border:1px solid rgba(60,120,200,0.12);line-height:2;min-width:240px}
#metrics .row{display:flex;justify-content:space-between}
#metrics .label{color:rgba(100,150,200,0.55)}
#metrics .val{color:rgba(80,200,255,0.9);font-weight:600}
#metrics .good{color:rgba(70,255,130,0.9)}
#metrics .bad{color:rgba(255,70,70,0.9)}
#metrics .warn{color:rgba(255,200,70,0.9)}
#metrics .divider{border-top:1px solid rgba(60,120,200,0.12);margin:4px 0}
#legend{position:absolute;top:42px;right:12px;font-size:8px;letter-spacing:1px;
  color:rgba(140,200,255,0.7);background:rgba(4,8,16,0.85);padding:8px 10px;
  border:1px solid rgba(60,120,200,0.12);line-height:2}
#legend i{display:inline-block;width:8px;height:8px;margin-right:4px;vertical-align:middle}
#feed{position:absolute;bottom:50px;right:12px;font-size:8px;letter-spacing:1px;
  color:rgba(140,200,255,0.7);text-align:right;line-height:1.8;max-height:220px;overflow:hidden;
  background:rgba(4,8,16,0.85);padding:6px 10px;border:1px solid rgba(60,120,200,0.12);min-width:200px}
.hit{color:rgba(70,255,130,0.9)}.miss{color:rgba(255,70,70,0.9)}
.leak{color:rgba(255,70,70,1);font-weight:700}.info{color:rgba(70,150,255,0.9)}
#feed-title{color:rgba(100,150,200,0.5);font-size:7px;letter-spacing:2px;margin-bottom:4px}
#detail{position:absolute;top:42px;left:50%;transform:translateX(-50%);font-size:9px;
  letter-spacing:1px;color:rgba(140,200,255,0.7);background:rgba(4,8,16,0.85);padding:10px 16px;
  border:1px solid rgba(60,120,200,0.12);display:none;pointer-events:auto;min-width:220px;
  text-align:center;line-height:1.9}
#detail .close{position:absolute;top:4px;right:8px;cursor:pointer;color:rgba(255,70,70,0.7)}
#bottom-bar{position:absolute;bottom:0;left:0;right:0;padding:5px 14px;font-size:7px;
  letter-spacing:2px;color:rgba(140,200,255,0.4);background:rgba(4,8,16,0.85);
  border-top:1px solid rgba(60,120,200,0.12);display:flex;justify-content:space-between;text-transform:uppercase}
#fallback{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:11px;
  color:rgba(255,100,100,0.9);background:rgba(0,0,0,0.9);padding:28px 40px;
  border:1px solid rgba(255,100,100,0.3);font-family:inherit;display:none;z-index:20;
  text-align:center;line-height:2.4;letter-spacing:1px}

/* CRT scan line overlay */
#scanlines{position:absolute;inset:0;z-index:5;pointer-events:none;
  background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,20,40,0.03) 2px,rgba(0,20,40,0.03) 4px)}

/* Vignette overlay */
#vignette{position:absolute;inset:0;z-index:4;pointer-events:none;
  background:radial-gradient(ellipse at center,transparent 60%,rgba(0,0,0,0.35) 100%)}

/* Connection status dot */
.status-dot{width:6px;height:6px;border-radius:50%;display:inline-block;margin-right:5px;vertical-align:middle}
.status-dot.connected{background:rgba(80,255,130,0.8);animation:pulse-dot 2s ease-in-out infinite}
.status-dot.disconnected{background:rgba(255,70,70,0.8);animation:pulse-dot 1s ease-in-out infinite}
@keyframes pulse-dot{0%,100%{opacity:0.6}50%{opacity:1}}

/* Cost ratio flash */
@keyframes flash-metric{0%{color:rgba(255,255,255,1)}100%{color:inherit}}
.flash-metric{animation:flash-metric 0.6s ease-out}

/* Scenario completion overlay */
#completion-overlay{position:absolute;inset:0;z-index:15;pointer-events:none;display:none;
  background:rgba(4,8,16,0.8);justify-content:center;align-items:center}
#completion-overlay.visible{display:flex;animation:fade-in-overlay 1.5s ease-out}
@keyframes fade-in-overlay{0%{opacity:0}100%{opacity:1}}
#completion-box{text-align:center;font-size:11px;letter-spacing:2px;line-height:2.4;
  color:rgba(140,200,255,0.9);padding:36px 52px;border:1px solid rgba(60,120,200,0.25);
  background:rgba(4,8,16,0.92)}
#completion-box .title{font-size:14px;font-weight:700;color:rgba(80,200,255,0.95);margin-bottom:4px}
#completion-box .divider{color:rgba(60,120,200,0.3);letter-spacing:0}
#completion-box .favorable{color:rgba(70,255,130,0.9)}
#completion-box .unfavorable{color:rgba(255,70,70,0.9)}
#completion-box .stat-value{color:rgba(80,200,255,0.9);font-weight:600}
</style>
</head>
<body>
<div id="c"></div>
<div id="scanlines"></div>
<div id="vignette"></div>
<div id="completion-overlay"><div id="completion-box"></div></div>
<div id="narration" style="position:absolute;top:40%;left:50%;transform:translate(-50%,-50%);z-index:15;pointer-events:none;
  font-size:14px;letter-spacing:4px;color:rgba(140,200,255,0);text-transform:uppercase;text-align:center;
  font-family:'JetBrains Mono',monospace;transition:color 0.8s ease;white-space:nowrap"></div>
<div id="hud">
  <div id="top-bar">
    <span class="status-dot disconnected" id="status-dot"></span><span class="dot wait" id="dot"></span><span class="tag">OVERWATCH WARGAME</span>
    <span class="sep">|</span>
    <select id="scenario-select">
      <option value="probe_120">PROBE 120</option><option value="skirmish_80">SKIRMISH 80</option>
      <option value="decoy_300">DECOY 300</option><option value="contested_500">CONTESTED 500</option>
      <option value="saturation_1000">SATURATION 1000</option>
      <option value="combined_saturation_strike">COMBINED SAT STRIKE</option>
    </select>
    <span class="sep">|</span><span id="conn-label">CONNECTING</span>
    <span class="sep">|</span><span id="tick-label">T+00:00</span>
    <span class="spacer"></span>
    <span id="mute-btn" style="cursor:pointer;pointer-events:auto;color:rgba(80,200,255,0.7)" onclick="audioMuted=!audioMuted;this.textContent=audioMuted?'[MUTED]':'[SND]';">[SND]</span>
    <span class="sep">|</span><span>UNCLASSIFIED // FOUO</span>
  </div>
  <div id="metrics"></div>
  <div id="legend">
    <i style="background:#ff4444"></i>SATURATION <i style="background:#0ff;margin-left:6px"></i>PROBE
    <i style="background:#a040ff;margin-left:6px"></i>DECOY <i style="background:#fa0;margin-left:6px"></i>UNKNOWN<br>
    <i style="background:#48f;border-radius:1px"></i>DEFENDER
    <i style="background:#0f6;border-radius:1px;margin-left:6px"></i>ENGAGING
    <i style="background:#fff;border-radius:50%;margin-left:6px"></i>SITE
  </div>
  <div id="feed"><div id="feed-title">ENGAGEMENT FEED</div></div>
  <div id="detail"><span class="close" onclick="closeDetail()">X</span><div id="detail-body"></div></div>
  <div id="threat-warning" style="position:absolute;bottom:60px;left:50%;transform:translateX(-50%);font-size:11px;
    letter-spacing:3px;font-weight:700;text-transform:uppercase;pointer-events:none"></div>
  <div id="status-msg" style="position:absolute;bottom:28px;left:50%;transform:translateX(-50%);font-size:8px;
    letter-spacing:2px;text-transform:uppercase;pointer-events:none;color:rgba(70,255,130,0.9)"></div>
  <div id="bottom-bar"><span id="asset-count">-- TRACKS / -- DEFENDERS</span><span id="ws-label">--</span></div>
</div>
<div id="fallback">BACKEND NOT RUNNING<br>
  <span style="color:rgba(80,180,255,0.9)">cd backend && python3 main.py</span><br>Then reload this page.</div>

<script>
/* OVERWATCH WARGAME -- Live Counter-Drone Engagement Viewer
   Connects to BULWARK wargame engine via WebSocket. Renders hostile tracks,
   defender assets, engagement lines, and real-time metrics on CesiumJS. */

Cesium.Ion.defaultAccessToken="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJqdGkiOiJlOGY0MjBhYy0zZTFlLTRkNTItOGFmNS1mYmM0ZDE1ZmYxMGYiLCJpZCI6NDQ3NDY2LCJpc3MiOiJodHRwczovL2FwaS5jZXNpdW0uY29tIiwiYXVkIjoidW5kZWZpbmVkX2RlZmF1bHQiLCJpYXQiOjE3ODIxMTI4MjN9.uvbJwgTognrLcj79tpt-kn46yt5S288s2hWgRBIhct8";
var viewer=new Cesium.Viewer("c",{timeline:false,animation:false,shouldAnimate:true,homeButton:false,
  sceneModePicker:false,baseLayerPicker:false,navigationHelpButton:false,geocoder:false,
  fullscreenButton:false,infoBox:false,selectionIndicator:false});

/* Google 3D Tiles with globe+terrain fallback */
(async function(){try{viewer.scene.primitives.add(await Cesium.Cesium3DTileset.fromIonAssetId(2275207))}
catch(e){viewer.scene.globe=new Cesium.Globe();
  try{Cesium.createWorldTerrainAsync().then(function(t){viewer.scene.terrainProvider=t})}catch(e2){}}})();

var ORIGIN_LAT=33.6405,ORIGIN_LON=-117.8443;
var INTENT_COL={SATURATION:"#ff4444",PROBE:"#00ffff",DECOY:"#a040ff",STRIKE:"#ff6600",UNKNOWN:"#ffaa00"};
var STATUS_COL={READY:"#4488ff",ENGAGING:"#00ff66",RELOADING:"#ffcc00",DEPLETED:"#666",SPENT:"#666",OFFLINE:"#444"};

/* Canvas icon factory */
var iconCache={};
function makeIcon(shape,color){
  var key=shape+color;if(iconCache[key])return iconCache[key];
  var c=document.createElement("canvas");c.width=32;c.height=32;var g=c.getContext("2d");
  g.fillStyle=color;g.strokeStyle="rgba(255,255,255,0.5)";g.lineWidth=1;
  if(shape==="diamond"){g.beginPath();g.moveTo(16,2);g.lineTo(30,16);g.lineTo(16,30);g.lineTo(2,16);g.closePath();g.fill();g.stroke()}
  else{g.fillRect(4,4,24,24);g.strokeRect(4,4,24,24)}
  iconCache[key]=c.toDataURL();return iconCache[key];
}

function enuToGeo(e,n,u){return{lat:ORIGIN_LAT+n/111000,lon:ORIGIN_LON+e/(111000*Math.cos(ORIGIN_LAT*Math.PI/180)),alt:u||50}}

/* Web Audio API -- tactical sound effects */
var audioCtx=null,audioMuted=false;
function initAudio(){if(audioCtx)return;audioCtx=new(window.AudioContext||window.webkitAudioContext)()}
document.addEventListener("click",function(){initAudio()},{once:true});
function playPing(freq,duration,vol){
  if(!audioCtx||audioMuted)return;var osc=audioCtx.createOscillator(),gain=audioCtx.createGain();
  osc.connect(gain);gain.connect(audioCtx.destination);osc.frequency.value=freq||880;osc.type="sine";
  gain.gain.setValueAtTime(vol||0.08,audioCtx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.001,audioCtx.currentTime+(duration||0.15));
  osc.start();osc.stop(audioCtx.currentTime+(duration||0.15))}
function playSweep(){
  if(!audioCtx||audioMuted)return;var osc=audioCtx.createOscillator(),gain=audioCtx.createGain();
  osc.connect(gain);gain.connect(audioCtx.destination);osc.type="sine";
  osc.frequency.setValueAtTime(440,audioCtx.currentTime);
  osc.frequency.exponentialRampToValueAtTime(880,audioCtx.currentTime+0.2);
  gain.gain.setValueAtTime(0.06,audioCtx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.001,audioCtx.currentTime+0.2);
  osc.start();osc.stop(audioCtx.currentTime+0.2)}

/* Particle explosion system */
var explodedSet=new Set(),activeParticles=0,MAX_PARTICLES=5;
function createExplosionImage(){
  var c=document.createElement("canvas");c.width=16;c.height=16;var g=c.getContext("2d");
  var grad=g.createRadialGradient(8,8,0,8,8,8);
  grad.addColorStop(0,"rgba(255,200,50,1)");grad.addColorStop(0.4,"rgba(255,120,20,0.8)");
  grad.addColorStop(1,"rgba(200,50,0,0)");g.fillStyle=grad;g.fillRect(0,0,16,16);return c}
function createSmokeImage(){
  var c=document.createElement("canvas");c.width=16;c.height=16;var g=c.getContext("2d");
  var grad=g.createRadialGradient(8,8,0,8,8,8);
  grad.addColorStop(0,"rgba(255,60,40,1)");grad.addColorStop(0.5,"rgba(180,30,20,0.6)");
  grad.addColorStop(1,"rgba(80,10,0,0)");g.fillStyle=grad;g.fillRect(0,0,16,16);return c}
function spawnExplosion(pos){
  if(activeParticles>=MAX_PARTICLES)return;activeParticles++;
  var ps=new Cesium.ParticleSystem({image:createExplosionImage(),
    startColor:Cesium.Color.fromCssColorString("rgba(255,180,50,1)"),
    endColor:Cesium.Color.fromCssColorString("rgba(255,50,0,0)"),
    startScale:1.0,endScale:4.0,minimumParticleLife:0.3,maximumParticleLife:1.2,
    minimumSpeed:5.0,maximumSpeed:20.0,emissionRate:200,lifetime:0.8,
    emitter:new Cesium.SphereEmitter(2.0),
    modelMatrix:Cesium.Transforms.eastNorthUpToFixedFrame(pos),
    sizeInMeters:true,minimumImageSize:new Cesium.Cartesian2(2,2),
    maximumImageSize:new Cesium.Cartesian2(6,6)});
  viewer.scene.primitives.add(ps);
  setTimeout(function(){viewer.scene.primitives.remove(ps);activeParticles--},2000)}
function spawnSmoke(pos){
  if(activeParticles>=MAX_PARTICLES)return;activeParticles++;
  var ps=new Cesium.ParticleSystem({image:createSmokeImage(),
    startColor:Cesium.Color.fromCssColorString("rgba(255,40,40,1)"),
    endColor:Cesium.Color.fromCssColorString("rgba(100,10,0,0)"),
    startScale:0.8,endScale:3.0,minimumParticleLife:0.2,maximumParticleLife:0.8,
    minimumSpeed:3.0,maximumSpeed:10.0,emissionRate:120,lifetime:0.5,
    emitter:new Cesium.SphereEmitter(1.5),
    modelMatrix:Cesium.Transforms.eastNorthUpToFixedFrame(pos),
    sizeInMeters:true,minimumImageSize:new Cesium.Cartesian2(1,1),
    maximumImageSize:new Cesium.Cartesian2(4,4)});
  viewer.scene.primitives.add(ps);
  setTimeout(function(){viewer.scene.primitives.remove(ps);activeParticles--},1500)}
function flashDefender(defId){
  var ent=defEnts[defId];if(!ent||!ent.billboard)return;
  ent.billboard.image=makeIcon("square","#00ff66");ent.billboard.width=38;ent.billboard.height=38;
  setTimeout(function(){if(!ent.billboard)return;var st=(ent._data&&ent._data.status)||"READY";
    var hex=STATUS_COL[st]||STATUS_COL.READY;ent.billboard.image=makeIcon("square",hex);
    ent.billboard.width=28;ent.billboard.height=28},500)}
function getTrackPos(tid){
  var ent=trackEnts[tid];if(!ent)return null;
  return ent.position.getValue(Cesium.JulianDate.now())}

/* State */
var scenario=new URLSearchParams(window.location.search).get("scenario")||"probe_120";
var wsUrl="ws://localhost:8765/ws/v1/wargame/"+scenario;
var trackEnts={},defEnts={},assignEnts={},rangeEnts={};
var siteEnt=null,siteRing=null,feedLines=[],ws=null,reconTimer=null;
var trackHistory={};
var activeEngageIds=new Set();
var leakZoomCount=0,leakZooming=false;
var corridorEntity=null,corridorFrameCount=0;
var orbitAngle=0,orbitActive=true,frameCount=0,selectEl=document.getElementById("scenario-select");
selectEl.value=scenario;
document.getElementById("ws-label").textContent=wsUrl.replace(/^wss?:\/\//,"");

/* Camera: 400m altitude, slow orbit over origin */
var CAM_ALT=400,CAM_PITCH=-25;
viewer.camera.flyTo({destination:Cesium.Cartesian3.fromDegrees(ORIGIN_LON,ORIGIN_LAT,CAM_ALT),
  orientation:{heading:0,pitch:Cesium.Math.toRadians(CAM_PITCH),roll:0},duration:2});

viewer.scene.preRender.addEventListener(function(){
  if(!orbitActive)return;orbitAngle+=0.0003;
  var targetH=orbitAngle*1.8%6.28,curH=viewer.camera.heading;
  var diff=targetH-curH;while(diff>Math.PI)diff-=2*Math.PI;while(diff<-Math.PI)diff+=2*Math.PI;
  var smoothH=curH+diff*0.02;
  viewer.camera.setView({destination:Cesium.Cartesian3.fromDegrees(
    ORIGIN_LON+0.003*Math.sin(orbitAngle),ORIGIN_LAT+0.003*Math.cos(orbitAngle),CAM_ALT),
    orientation:{heading:smoothH,pitch:Cesium.Math.toRadians(CAM_PITCH),roll:0}});
});
var idleTimer=null;
function pauseOrbit(){orbitActive=false;if(idleTimer)clearTimeout(idleTimer);
  idleTimer=setTimeout(function(){orbitActive=true},15000)}
viewer.scene.canvas.addEventListener("mousedown",pauseOrbit);
viewer.scene.canvas.addEventListener("wheel",pauseOrbit);

/* Defended site */
var sitePulseRing=null,sitePulseGrowing=true,sitePulseRadius=200;
function ensureSite(s){if(siteEnt)return;
  var lat=s?s.lat:ORIGIN_LAT,lon=s?s.lon:ORIGIN_LON;
  var sitePos=Cesium.Cartesian3.fromDegrees(lon,lat,5);
  siteEnt=viewer.entities.add({id:"site",position:sitePos,
    point:{pixelSize:12,color:Cesium.Color.WHITE.withAlpha(0.9),outlineColor:Cesium.Color.WHITE.withAlpha(0.4),
      outlineWidth:3,disableDepthTestDistance:Number.POSITIVE_INFINITY},
    label:{text:"DEFENDED SITE",font:"10px monospace",fillColor:Cesium.Color.WHITE.withAlpha(0.9),
      showBackground:true,backgroundColor:new Cesium.Color(0,0,0,0.6),
      pixelOffset:new Cesium.Cartesian2(0,-22),scale:0.6,disableDepthTestDistance:Number.POSITIVE_INFINITY}});
  siteRing=viewer.entities.add({id:"site-ring",position:Cesium.Cartesian3.fromDegrees(lon,lat,2),
    ellipse:{semiMajorAxis:200,semiMinorAxis:200,height:2,material:Cesium.Color.WHITE.withAlpha(0.04),
      outline:true,outlineColor:Cesium.Color.WHITE.withAlpha(0.2),outlineWidth:2}});
  /* Pulsing ring that expands and fades */
  sitePulseRing=viewer.entities.add({id:"site-pulse",position:Cesium.Cartesian3.fromDegrees(lon,lat,1),
    ellipse:{semiMajorAxis:new Cesium.CallbackProperty(function(){return sitePulseRadius},false),
      semiMinorAxis:new Cesium.CallbackProperty(function(){return sitePulseRadius},false),
      height:1,material:Cesium.Color.WHITE.withAlpha(0.08),outline:true,
      outlineColor:new Cesium.CallbackProperty(function(){
        var a=Math.max(0,0.15*(1-(sitePulseRadius-200)/150));
        return Cesium.Color.WHITE.withAlpha(a)},false),outlineWidth:1}});
}
/* Animate the pulse ring */
viewer.scene.preRender.addEventListener(function(){
  if(!sitePulseRing)return;
  sitePulseRadius+=0.8;
  if(sitePulseRadius>350)sitePulseRadius=200;
});

/* Track upsert */
function upsertTrack(t){
  var lat=t.lat,lon=t.lon,alt=50;
  if(lat==null&&t.enu){var g=enuToGeo(t.enu[0],t.enu[1],t.enu[2]);lat=g.lat;lon=g.lon;alt=g.alt}
  if(t.enu&&t.enu[2])alt=t.enu[2]; if(lat==null||lon==null)return;
  var intent=t.intent||"UNKNOWN",hex=INTENT_COL[intent]||INTENT_COL.UNKNOWN;
  var col=Cesium.Color.fromCssColorString(hex),sz=Math.round(28+((t.confidence||0.5)-0.3)*17);
  if(sz<28)sz=28;if(sz>40)sz=40;
  var tti=t.time_to_impact_s;
  if(typeof tti==="number"&&tti<15){sz=Math.round(sz*(1+(1-tti/15)*0.5))}
  var pos=Cesium.Cartesian3.fromDegrees(lon,lat,alt);
  /* Heading trail history */
  if(!trackHistory[t.id])trackHistory[t.id]=[];
  trackHistory[t.id].push(pos);
  if(trackHistory[t.id].length>5)trackHistory[t.id].shift();
  var trailId="trail-"+t.id;
  if(!viewer.entities.getById(trailId)&&trackHistory[t.id].length>1){
    viewer.entities.add({id:trailId,polyline:{
      positions:new Cesium.CallbackProperty(function(){return trackHistory[this._tid]||[]}.bind({_tid:t.id}),false),
      width:2,material:Cesium.Color.fromCssColorString(hex).withAlpha(0.3),
      disableDepthTestDistance:Number.POSITIVE_INFINITY}})}
  var ent=trackEnts[t.id];
  if(!ent){ent=viewer.entities.add({id:"t-"+t.id,name:t.id,position:pos,
    billboard:{image:makeIcon("diamond",hex),width:sz,height:sz,disableDepthTestDistance:Number.POSITIVE_INFINITY},
    label:{text:t.id.substring(0,8)+" "+intent,font:"8px monospace",fillColor:col.withAlpha(0.85),
      showBackground:true,backgroundColor:new Cesium.Color(0,0,0,0.55),
      pixelOffset:new Cesium.Cartesian2(0,-20),scale:0.55,
      disableDepthTestDistance:Number.POSITIVE_INFINITY,
      distanceDisplayCondition:new Cesium.DistanceDisplayCondition(0,5000)}});
    trackEnts[t.id]=ent}
  else{ent.position=pos;
    if(ent.billboard){ent.billboard.image=makeIcon("diamond",hex);ent.billboard.width=sz;ent.billboard.height=sz}
    if(ent.label&&frameCount%5===0)ent.label.text=t.id.substring(0,8)+" "+intent}
  ent._data=t;
}

/* Defender upsert */
function upsertDefender(d){
  var lat=d.lat,lon=d.lon,alt=0;
  if(lat==null&&d.enu){var g=enuToGeo(d.enu[0],d.enu[1],d.enu[2]);lat=g.lat;lon=g.lon;alt=g.alt}
  if(d.enu&&d.enu[2])alt=d.enu[2]; if(lat==null||lon==null)return;
  var status=d.status||"READY",hex=STATUS_COL[status]||STATUS_COL.READY;
  var col=Cesium.Color.fromCssColorString(hex),ent=defEnts[d.id];
  if(!ent){ent=viewer.entities.add({id:"d-"+d.id,name:d.id,
    position:Cesium.Cartesian3.fromDegrees(lon,lat,alt),
    billboard:{image:makeIcon("square",hex),width:28,height:28,disableDepthTestDistance:Number.POSITIVE_INFINITY},
    label:{text:(d.kind||"DEF")+" "+d.id.substring(0,6)+" ["+status+"]",font:"8px monospace",
      fillColor:col.withAlpha(0.85),showBackground:true,backgroundColor:new Cesium.Color(0,0,0,0.55),
      pixelOffset:new Cesium.Cartesian2(0,-22),scale:0.55,disableDepthTestDistance:Number.POSITIVE_INFINITY}});
    defEnts[d.id]=ent;
    if(d.range_m){rangeEnts[d.id]=viewer.entities.add({id:"r-"+d.id,
      position:Cesium.Cartesian3.fromDegrees(lon,lat,2),
      ellipse:{semiMajorAxis:d.range_m,semiMinorAxis:d.range_m,height:2,
        material:Cesium.Color.fromCssColorString(hex).withAlpha(0.03),outline:true,
        outlineColor:Cesium.Color.fromCssColorString(hex).withAlpha(0.12),outlineWidth:1}})}}
  else{ent.position=Cesium.Cartesian3.fromDegrees(lon,lat,alt);
    if(ent.billboard)ent.billboard.image=makeIcon("square",hex);
    if(ent.label&&frameCount%5===0)ent.label.text=(d.kind||"DEF")+" "+d.id.substring(0,6)+" ["+status+"]";
    if(rangeEnts[d.id])rangeEnts[d.id].position=Cesium.Cartesian3.fromDegrees(lon,lat,2)}
  ent._data=d;
}

/* Remove entities no longer in current frame */
function removeStale(live,ents){
  var rm=[];for(var id in ents)if(!live[id])rm.push(id);
  for(var i=0;i<rm.length;i++){viewer.entities.remove(ents[rm[i]]);delete ents[rm[i]];
    if(rangeEnts[rm[i]]){viewer.entities.remove(rangeEnts[rm[i]]);delete rangeEnts[rm[i]]}
    var te=viewer.entities.getById("trail-"+rm[i]);
    if(te)viewer.entities.remove(te);
    delete trackHistory[rm[i]]}
}

/* Assignment lines - persistent engagement lines for HIT/MISS (3s) */
function drawAssignments(asgs){
  var now=Cesium.JulianDate.now();
  for(var i=0;i<asgs.length;i++){var a=asgs[i];
    if(a.status!=="HIT"&&a.status!=="MISS")continue;
    var engId="engage-"+Date.now()+"-"+a.defender_id.substring(0,6)+"-"+a.track_id.substring(0,6)+"-"+i;
    if(activeEngageIds.size>=10)continue;
    var dE=defEnts[a.defender_id],tE=trackEnts[a.track_id];if(!dE||!tE)continue;
    var dp=dE.position.getValue(now),tp=tE.position.getValue(now);if(!dp||!tp)continue;
    var col=a.status==="HIT"?Cesium.Color.LIME.withAlpha(0.6):Cesium.Color.RED.withAlpha(0.6);
    var w=a.status==="HIT"?2:1.5;
    activeEngageIds.add(engId);
    viewer.entities.add({id:engId,
      polyline:{positions:[dp,tp],width:w,
        material:new Cesium.PolylineGlowMaterialProperty({glowPower:0.15,color:col}),
        disableDepthTestDistance:Number.POSITIVE_INFINITY}});
    (function(eid){setTimeout(function(){
      var e=viewer.entities.getById(eid);if(e)viewer.entities.remove(e);
      activeEngageIds.delete(eid)},3000)})(engId)}
}

/* HUD metrics */
var lastCostWin=null;
function fmtTime(s){var m=Math.floor(s/60),sec=Math.floor(s%60);
  return"T+"+(m<10?"0":"")+m+":"+(sec<10?"0":"")+sec}

function updateMetrics(m){if(!m)return;
  var iR=(m.intercept_rate*100).toFixed(0);
  var r=m.cost_exchange_ratio!=null?m.cost_exchange_ratio.toFixed(2):"--";
  var rc=m.cost_exchange_win===true?"good":m.cost_exchange_win===false?"bad":"val";
  var rl=m.cost_exchange_win===true?" (FAVORABLE)":m.cost_exchange_win===false?" (UNFAVORABLE)":"";
  /* Detect cost ratio state change for flash */
  var costChanged=lastCostWin!==null&&lastCostWin!==m.cost_exchange_win;
  lastCostWin=m.cost_exchange_win;
  var flashClass=costChanged?" flash-metric":"";
  document.getElementById("tick-label").textContent=fmtTime(m.sim_time_s||0);
  document.getElementById("metrics").innerHTML=
    '<div class="row"><span class="label">HOSTILES</span><span class="val">'+m.active_hostiles+'</span></div>'+
    '<div class="row"><span class="label">TRACKED</span><span class="val">'+m.tracks_held+'</span></div>'+
    '<div class="row"><span class="label">LEAKERS</span><span class="'+(m.leakers>0?"bad":"good")+'">'+m.leakers+'</span></div>'+
    '<div class="divider"></div>'+
    '<div class="row"><span class="label">INTERCEPTS</span><span class="val">'+m.intercepts+' / '+m.engagements_made+'</span></div>'+
    '<div class="row"><span class="label">RATE</span><span class="'+(iR>=80?"good":iR>=50?"warn":"bad")+'">'+iR+'%</span></div>'+
    '<div class="divider"></div>'+
    '<div class="row"><span class="label">COST RATIO</span><span class="'+rc+flashClass+'" id="cost-ratio-val">'+r+rl+'</span></div>'+
    '<div class="row"><span class="label">DEF SPENT</span><span class="val">$'+fmtMoney(m.defender_spent||0)+'</span></div>'+
    '<div class="row"><span class="label">ATK DESTROYED</span><span class="val">$'+fmtMoney(m.attacker_destroyed||0)+'</span></div>'}

function fmtMoney(v){return v.toLocaleString("en-US",{maximumFractionDigits:0})}

/* Engagement feed -- append-only DOM ops */
function addFeed(html){
  var feed=document.getElementById("feed");
  var line=document.createElement("div");line.innerHTML=html;
  feed.appendChild(line);feedLines.push(line);
  if(feedLines.length>10){var old=feedLines.shift();if(old.parentNode)old.parentNode.removeChild(old)}}

/* Click entity for details */
viewer.screenSpaceEventHandler.setInputAction(function(click){
  var p=viewer.scene.pick(click.position);
  if(!Cesium.defined(p)||!p.id){closeDetail();return}
  var ent=p.id,d=ent._data,body=document.getElementById("detail-body");
  if(d&&d.intent!=null){body.innerHTML='TRACK '+d.id+'<br>INTENT: '+d.intent+'<br>CONF: '+
    ((d.confidence||0)*100).toFixed(0)+'%<br>TTI: '+(d.time_to_impact_s!=null?d.time_to_impact_s.toFixed(1)+'s':'--')+
    '<br>THREAT: '+(d.threat_score!=null?d.threat_score.toFixed(2):'--');
    document.getElementById("detail").style.display="block"}
  else if(d&&d.kind!=null){body.innerHTML='DEFENDER '+d.id+'<br>TYPE: '+(d.kind||'?')+'<br>STATUS: '+
    (d.status||'?')+'<br>CAP: '+(d.capacity!=null?d.capacity:'--')+'<br>RANGE: '+(d.range_m||'--')+
    'm<br>COST: $'+(d.unit_cost||0).toFixed(0);document.getElementById("detail").style.display="block"}
},Cesium.ScreenSpaceEventType.LEFT_CLICK);
function closeDetail(){document.getElementById("detail").style.display="none"}

/* Narration system */
var narrationShown={};
function showNarration(key,text,duration,color){
  if(narrationShown[key])return;narrationShown[key]=true;
  var el=document.getElementById("narration");
  el.textContent=text;el.style.color=color||"rgba(140,200,255,0.85)";
  setTimeout(function(){el.style.color="rgba(140,200,255,0)"},(duration||3)*1000)}

/* Scenario completion overlay */
function showCompletion(m){
  if(!m)return;
  var hostiles=m.total_hostiles||m.active_hostiles||"--";
  var neutralized=m.intercepts||0;
  var leakers=m.leakers||0;
  var total=neutralized+leakers;
  var rate=total>0?((neutralized/total)*100).toFixed(1):"--";
  var ratio=m.cost_exchange_ratio!=null?m.cost_exchange_ratio.toFixed(2):"--";
  var favorable=m.cost_exchange_win===true;
  var ratioClass=favorable?"favorable":"unfavorable";
  var ratioLabel=favorable?"FAVORABLE":"UNFAVORABLE";
  var defSpent=fmtMoney(m.defender_spent||0);
  var atkDest=fmtMoney(m.attacker_destroyed||0);
  var box=document.getElementById("completion-box");
  box.innerHTML=
    '<div class="title">SCENARIO COMPLETE</div>'+
    '<div class="divider">─────────────────</div>'+
    '<div>HOSTILES: <span class="stat-value">'+hostiles+'</span>'+
    ' &nbsp;|&nbsp; NEUTRALIZED: <span class="stat-value">'+neutralized+'</span>'+
    ' &nbsp;|&nbsp; LEAKED: <span class="stat-value">'+leakers+'</span></div>'+
    '<div>INTERCEPT RATE: <span class="stat-value">'+rate+'%</span></div>'+
    '<div>COST EXCHANGE: <span class="'+ratioClass+'">'+ratio+' ('+ratioLabel+')</span></div>'+
    '<div>DEFENDER SPENT: <span class="stat-value">$'+defSpent+'</span></div>'+
    '<div>ATTACKER DESTROYED: <span class="stat-value">$'+atkDest+'</span></div>';
  document.getElementById("completion-overlay").classList.add("visible");
}

/* Auto-zoom on LEAK event (first 3 only) */
function onLeak(trackPos){
  if(leakZoomCount>=3||leakZooming||viewer.trackedEntity)return;
  leakZoomCount++;leakZooming=true;
  viewer.camera.flyTo({
    destination:Cesium.Cartesian3.fromDegrees(ORIGIN_LON+0.001,ORIGIN_LAT+0.001,200),
    orientation:{heading:0,pitch:Cesium.Math.toRadians(-35),roll:0},duration:1});
  setTimeout(function(){
    viewer.camera.flyTo({
      destination:Cesium.Cartesian3.fromDegrees(ORIGIN_LON,ORIGIN_LAT,CAM_ALT),
      orientation:{heading:0,pitch:Cesium.Math.toRadians(CAM_PITCH),roll:0},duration:1.5});
    setTimeout(function(){leakZooming=false},1600)},3000)}

/* Threat approach corridor */
function updateCorridor(tracks){
  if(tracks.length<5)return;
  var sumLon=0,sumLat=0;
  for(var i=0;i<tracks.length;i++){
    var tLat=tracks[i].lat,tLon=tracks[i].lon;
    if(tLat==null&&tracks[i].enu){var g=enuToGeo(tracks[i].enu[0],tracks[i].enu[1],tracks[i].enu[2]);tLat=g.lat;tLon=g.lon}
    if(tLat==null||tLon==null)continue;
    sumLon+=tLon;sumLat+=tLat}
  var centLon=sumLon/tracks.length,centLat=sumLat/tracks.length;
  if(!corridorEntity){
    corridorEntity=viewer.entities.add({id:"approach-corridor",polyline:{
      positions:[Cesium.Cartesian3.fromDegrees(centLon,centLat,100),Cesium.Cartesian3.fromDegrees(ORIGIN_LON,ORIGIN_LAT,50)],
      width:3,material:new Cesium.PolylineDashMaterialProperty({color:Cesium.Color.RED.withAlpha(0.2),dashLength:16}),
      disableDepthTestDistance:Number.POSITIVE_INFINITY}})}
  else{corridorEntity.polyline.positions=[
    Cesium.Cartesian3.fromDegrees(centLon,centLat,100),
    Cesium.Cartesian3.fromDegrees(ORIGIN_LON,ORIGIN_LAT,50)]}}

/* WebSocket */
function setDot(c){document.getElementById("dot").className="dot "+c}
function setConn(t){document.getElementById("conn-label").textContent=t}
function setStatusDot(connected){
  var el=document.getElementById("status-dot");
  el.className="status-dot "+(connected?"connected":"disconnected")}

function connect(){
  setDot("wait");setConn("CONNECTING");setStatusDot(false);
  document.getElementById("fallback").style.display="none";
  try{ws=new WebSocket(wsUrl)}catch(e){onFail();return}
  ws.onopen=function(){setDot("ok");setConn("CONNECTED");setStatusDot(true);
    if(reconTimer){clearTimeout(reconTimer);reconTimer=null}
    addFeed('<span class="info">CONNECTED TO '+scenario.toUpperCase()+'</span>')};
  ws.onmessage=function(ev){
    var msg;try{msg=JSON.parse(ev.data)}catch(e){return}
    if(msg.type==="WARGAME_FRAME"){frameCount++;
      var tracks=msg.tracks||[],defs=msg.defenders||[],asgs=msg.assignments||[];
      var lt={};for(var i=0;i<tracks.length;i++){upsertTrack(tracks[i]);lt[tracks[i].id]=true}
      removeStale(lt,trackEnts);
      var ld={};for(var j=0;j<defs.length;j++){upsertDefender(defs[j]);ld[defs[j].id]=true}
      removeStale(ld,defEnts);
      drawAssignments(asgs);ensureSite(msg.site);
      corridorFrameCount++;if(corridorFrameCount%30===0)updateCorridor(tracks);
      if(msg.metrics)updateMetrics(msg.metrics);
      document.getElementById("asset-count").textContent=tracks.length+" TRACKS / "+defs.length+" DEFENDERS";
      /* Narration triggers */
      showNarration("init","WARGAME INITIALIZED - "+scenario.toUpperCase().replace("_"," "),3);
      var m=msg.metrics||{};
      if(m.active_hostiles>0){showNarration("detected","HOSTILE SWARM DETECTED",3);
        if(!narrationShown["detected-snd"]){narrationShown["detected-snd"]=true;playSweep()}}
      if((m.engagements_made||0)>0)showNarration("engaging","DEFENDERS ENGAGING",2);
      if((m.leakers||0)>0)showNarration("leak","WARNING: LEAKER DETECTED",2,"rgba(255,70,70,0.95)");
      var prog=(m.sim_time_s||0)/((m.total_time_s||300)*0.5);
      if(prog>=1)showNarration("mid",(m.intercept_rate||0)>=0.7?"DEFENSE HOLDING":"DEFENSE DEGRADING",3,
        (m.intercept_rate||0)>=0.7?"rgba(70,255,130,0.9)":"rgba(255,70,70,0.95)");
      /* TTI threat warning */
      var minTTI=Infinity;
      for(var ti=0;ti<tracks.length;ti++){var tt=tracks[ti].time_to_impact_s;
        if(typeof tt==="number"&&tt<minTTI)minTTI=tt}
      var tw=document.getElementById("threat-warning");
      if(minTTI<10){tw.textContent="IMMINENT THREAT: "+Math.round(minTTI)+"s";tw.style.color="rgba(255,70,70,0.95)"}
      else{tw.textContent=""}
      /* Story-driven status */
      var sm=document.getElementById("status-msg");
      var leakRate=m.leakers/(Math.max(1,m.leakers+(m.intercepts||0)));
      if(leakRate>0.15){sm.textContent="DEFENSE DEGRADING - "+Math.round(leakRate*100)+"% LEAK RATE";
        sm.style.color="rgba(255,70,70,0.95)"}
      else if((m.active_hostiles||0)>50){sm.textContent="HEAVY ENGAGEMENT - "+m.active_hostiles+" HOSTILES";
        sm.style.color="rgba(255,200,70,0.9)"}
      else if((m.active_hostiles||0)>0){sm.textContent="DEFENSE HOLDING - RATE "+((m.intercept_rate||0)*100).toFixed(0)+"%";
        sm.style.color="rgba(70,255,130,0.9)"}
      else{sm.textContent=""}
      for(var a=0;a<asgs.length;a++){var ag=asgs[a],dl=ag.defender_id.substring(0,8),tl=ag.track_id.substring(0,8);
        var eKey=ag.defender_id+"-"+ag.track_id;
        if(ag.status==="HIT"){addFeed('<span class="hit">'+dl+' -> '+tl+': HIT</span>');
          playPing(1200,0.1,0.08);
          if(!explodedSet.has(eKey)){explodedSet.add(eKey);var hp=getTrackPos(ag.track_id);
            if(hp)spawnExplosion(hp);flashDefender(ag.defender_id)}}
        else if(ag.status==="MISS"){addFeed('<span class="miss">'+dl+' -> '+tl+': MISS</span>');
          playPing(400,0.08,0.05)}
        else if(ag.status==="LEAK"){addFeed('<span class="leak">'+tl+': LEAKED</span>');
          playPing(600,0.3,0.12);
          if(!explodedSet.has("leak-"+ag.track_id)){explodedSet.add("leak-"+ag.track_id);
            var lp=getTrackPos(ag.track_id);if(lp){spawnSmoke(lp);onLeak(lp)}}}}
      if(msg.done){addFeed('<span class="info">--- SCENARIO COMPLETE ---</span>');setConn("COMPLETE");
        showCompletion(msg.metrics,tracks.length,defs.length)}}
    if(msg.type==="ERROR")addFeed('<span class="miss">ERR: '+(msg.error||"unknown")+'</span>')};
  ws.onerror=function(){onFail()};
  ws.onclose=function(){setDot("err");setConn("DISCONNECTED");setStatusDot(false);schedRecon()}}

function onFail(){setDot("err");setConn("DISCONNECTED");setStatusDot(false);
  document.getElementById("fallback").style.display="block";schedRecon()}
function schedRecon(){if(reconTimer)return;reconTimer=setTimeout(function(){reconTimer=null;connect()},4000)}

/* Scenario switcher */
selectEl.addEventListener("change",function(){
  scenario=selectEl.value;wsUrl="ws://localhost:8765/ws/v1/wargame/"+scenario;
  document.getElementById("ws-label").textContent=wsUrl.replace(/^wss?:\/\//,"");
  if(ws){ws.onclose=null;ws.close();ws=null}
  if(reconTimer){clearTimeout(reconTimer);reconTimer=null}
  clearAllEntities();connect()});

/* Clear all entities for restart */
function clearAllEntities(){
  for(var k in trackEnts){viewer.entities.remove(trackEnts[k]);
    var te=viewer.entities.getById("trail-"+k);if(te)viewer.entities.remove(te)}
  for(var k2 in defEnts)viewer.entities.remove(defEnts[k2]);
  for(var k3 in assignEnts)viewer.entities.remove(assignEnts[k3]);
  for(var k4 in rangeEnts)viewer.entities.remove(rangeEnts[k4]);
  activeEngageIds.forEach(function(eid){var e=viewer.entities.getById(eid);if(e)viewer.entities.remove(e)});
  activeEngageIds.clear();
  if(corridorEntity){viewer.entities.remove(corridorEntity);corridorEntity=null}
  if(siteEnt){viewer.entities.remove(siteEnt);siteEnt=null}
  if(siteRing){viewer.entities.remove(siteRing);siteRing=null}
  if(sitePulseRing){viewer.entities.remove(sitePulseRing);sitePulseRing=null}
  trackEnts={};defEnts={};assignEnts={};rangeEnts={};feedLines=[];explodedSet.clear();
  activeParticles=0;lastCostWin=null;narrationShown={};trackHistory={};
  leakZoomCount=0;leakZooming=false;corridorFrameCount=0;frameCount=0;
  document.getElementById("feed").innerHTML='<div id="feed-title">ENGAGEMENT FEED</div>';
  document.getElementById("metrics").innerHTML="";
  document.getElementById("tick-label").textContent="T+00:00";
  document.getElementById("asset-count").textContent="-- TRACKS / -- DEFENDERS";
  document.getElementById("completion-overlay").classList.remove("visible");
  document.getElementById("threat-warning").textContent="";
  document.getElementById("status-msg").textContent="";
  document.getElementById("narration").style.color="rgba(140,200,255,0)"}

/* R key: restart scenario */
document.addEventListener("keydown",function(e){
  if(e.key==="r"||e.key==="R"){
    if(ws){ws.onclose=null;ws.close();ws=null}
    if(reconTimer){clearTimeout(reconTimer);reconTimer=null}
    clearAllEntities();connect()}});

connect();
</script>
