<script>
"use strict";
var urlToken = new URLSearchParams(window.location.search).get("token");
mapboxgl.accessToken = urlToken || localStorage.getItem("mapbox_token") || "";
if (mapboxgl.accessToken) localStorage.setItem("mapbox_token", mapboxgl.accessToken);

var SF_CENTER = [-122.3942, 37.7935], VAN_POS = [-122.3948, 37.7878];
var TARGETS = [
  { lng: -122.3936, lat: 37.7956, alt: 50, name: "EMBARCADERO CENTER", hit: false },
  { lng: -122.4093, lat: 37.8087, alt: 15, name: "PIER 39", hit: false },
  { lng: -122.3972, lat: 37.7897, alt: 326, name: "SALESFORCE TOWER", hit: false },
  { lng: -122.4194, lat: 37.8080, alt: 70, name: "GHIRARDELLI SQUARE", hit: false }
];
var TOTAL = 24, drones = [], deployed = 0, strikes = 0, targetsHit = 0;
var simTime = 0, playing = true, trackCam = false, deployTimer = 0, frameCount = 0;
var camBearing = -20, camPitch = 58, camZoom = 14.8, trackedDrone = null;
var camBearingVel = 0, camPosVelLng = 0, camPosVelLat = 0, camZoomVel = 0;
var camShakeTimer = 0, camShakeIntensity = 0;
var threeScene, threeCamera, threeRenderer, vanMesh = null;
var droneMeshes = [], shadowMeshes = [], explosionPool = [], activeExplosions = [];

var CORRIDORS = [
  {a:[-122.4180,37.7750],b:[-122.3930,37.7910]}, // Market
  {a:[-122.4180,37.7735],b:[-122.3930,37.7895]}, // Mission
  {a:[-122.3880,37.7940],b:[-122.3960,37.8090]}  // Embarcadero
];

function catmullRom(p0, p1, p2, p3, t) {
  var t2 = t * t, t3 = t2 * t;
  return 0.5 * ((2*p1) + (-p0+p2)*t + (2*p0-5*p1+4*p2-p3)*t2 + (-p0+3*p1-3*p2+p3)*t3);
}

function snapToCorridor(lng, lat, threshold) {
  var bestDist = threshold, bestLng = lng, bestLat = lat;
  for (var ci = 0; ci < CORRIDORS.length; ci++) {
    var c = CORRIDORS[ci], ax = c.a[0], ay = c.a[1], bx = c.b[0], by = c.b[1];
    var abx = bx-ax, aby = by-ay, apx = lng-ax, apy = lat-ay;
    var t = Math.max(0, Math.min(1, (apx*abx+apy*aby)/(abx*abx+aby*aby)));
    var px = ax+t*abx, py = ay+t*aby, dx = lng-px, dy = lat-py;
    var dist = Math.sqrt(dx*dx+dy*dy);
    if (dist < bestDist) { bestDist = dist; bestLng = lng*0.4+px*0.6; bestLat = lat*0.4+py*0.6; }
  }
  return [bestLng, bestLat];
}

function generateWaypoints(sLng, sLat, tLng, tLat, v) {
  var pts = [[sLng, sLat]], dLng = tLng-sLng, dLat = tLat-sLat;
  var pL = Math.sqrt(dLat*dLat + dLng*dLng), pLng = -dLat/pL, pLat = dLng/pL;
  var n = 3 + Math.floor(Math.random()*2);
  for (var i = 1; i <= n; i++) {
    var f = i/(n+1), o = Math.round((Math.random()-0.5)*v*2000)/1000;
    var snapped = snapToCorridor(sLng+dLng*f+pLng*o, sLat+dLat*f+pLat*o, 0.002);
    pts.push([snapped[0], snapped[1]]);
  }
  pts.push([tLng, tLat]); return pts;
}

function evalSpline(wp, t) {
  var n = wp.length-1, s = t*n, seg = Math.min(Math.floor(s), n-1), lt = s-seg;
  var p0=wp[Math.max(0,seg-1)], p1=wp[seg], p2=wp[Math.min(n,seg+1)], p3=wp[Math.min(n,seg+2)];
  return [catmullRom(p0[0],p1[0],p2[0],p3[0],lt), catmullRom(p0[1],p1[1],p2[1],p3[1],lt)];
}

function altProfile(t, cAlt, tAlt) {
  var osc = Math.sin(t * 4) * 5;
  if (t < 0.2) { var r = t/0.2, e = r*r*(3-2*r); return 5 + (cAlt-5)*e + osc * r; }
  if (t < 0.85) return cAlt + osc;
  var d = (t-0.85)/0.15, e2 = d*d*(3-2*d); return cAlt + (tAlt-cAlt)*e2 + osc*(1-d);
}

function pathDistance(wp) {
  var d = 0;
  for (var i = 1; i < wp.length; i++) { var dx=(wp[i][0]-wp[i-1][0])*87000, dy=(wp[i][1]-wp[i-1][1])*111000; d += Math.sqrt(dx*dx+dy*dy); }
  return d;
}
function lngLatAltToWorld(lng, lat, alt) {
  var mc = mapboxgl.MercatorCoordinate.fromLngLat([lng, lat], alt);
  return { x: mc.x, y: mc.y, z: mc.z };
}
function meterScale(lat, alt) { return mapboxgl.MercatorCoordinate.fromLngLat([0, lat], alt).meterInMercatorCoordinateUnits(); }

function noise(x) { var s = Math.sin(x * 127.1) * 43758.5453; return s - Math.floor(s); }
function smoothNoise(x) {
  var ix = Math.floor(x), fx = x - ix;
  fx = fx * fx * (3 - 2 * fx);
  return noise(ix) * (1 - fx) + noise(ix + 1) * fx;
}

var sharedGlowTex = null, sharedFlashTex = null;

function makeGlowTex() {
  if (sharedGlowTex) return sharedGlowTex;
  var c = document.createElement("canvas"); c.width = 64; c.height = 64;
  var ctx = c.getContext("2d"), g = ctx.createRadialGradient(32,32,0,32,32,32);
  g.addColorStop(0,"rgba(68,136,255,1)"); g.addColorStop(0.4,"rgba(68,136,255,0.4)"); g.addColorStop(1,"rgba(68,136,255,0)");
  ctx.fillStyle = g; ctx.fillRect(0,0,64,64);
  sharedGlowTex = new THREE.CanvasTexture(c);
  return sharedGlowTex;
}

function makeFlashTex() {
  if (sharedFlashTex) return sharedFlashTex;
  var c = document.createElement("canvas"); c.width = 64; c.height = 64;
  var ctx = c.getContext("2d"), g = ctx.createRadialGradient(32,32,0,32,32,32);
  g.addColorStop(0,"rgba(255,255,255,1)"); g.addColorStop(0.3,"rgba(255,200,100,0.8)"); g.addColorStop(1,"rgba(255,200,100,0)");
  ctx.fillStyle = g; ctx.fillRect(0,0,64,64);
  sharedFlashTex = new THREE.CanvasTexture(c);
  return sharedFlashTex;
}

function buildDrone(s) {
  var g = new THREE.Group();
  var body = new THREE.Mesh(
    new THREE.BoxGeometry(2*s, 0.5*s, 2*s),
    new THREE.MeshStandardMaterial({color:0x2a3a55, metalness:0.6, roughness:0.3})
  );
  g.add(body);
  var armPos = [[1,1],[-1,1],[1,-1],[-1,-1]];
  var armMat = new THREE.MeshPhongMaterial({color:0x4a5a70});
  var motorMat = new THREE.MeshPhongMaterial({color:0x3a4a60});
  var rotorMat = new THREE.MeshBasicMaterial({color:0x44aaff, transparent:true, opacity:0.35, side:THREE.DoubleSide});
  var glowTex = makeGlowTex();
  g.userData.rotors = [];
  g.userData.exhaustCones = [];
  g.userData.detailParts = [];
  for (var i = 0; i < 4; i++) {
    var ax = armPos[i][0], az = armPos[i][1];
    var arm = new THREE.Mesh(new THREE.CylinderGeometry(0.06*s,0.06*s,1.8*s,6), armMat);
    arm.position.set(ax*0.7*s, 0, az*0.7*s);
    arm.rotation.z = Math.atan2(az,ax) - Math.PI/2; arm.rotateX(Math.PI/2);
    g.add(arm);
    var motor = new THREE.Mesh(new THREE.CylinderGeometry(0.2*s,0.2*s,0.3*s,8), motorMat);
    motor.position.set(ax*1.4*s, 0.15*s, az*1.4*s); g.add(motor);
    var rotor = new THREE.Mesh(new THREE.CircleGeometry(0.6*s,12), rotorMat);
    rotor.position.set(ax*1.4*s, 0.35*s, az*1.4*s); rotor.rotation.x = -Math.PI/2;
    g.add(rotor); g.userData.rotors.push(rotor);
    var glow = new THREE.Sprite(new THREE.SpriteMaterial({map:glowTex, color:0x4488ff, transparent:true, opacity:0.5, blending:THREE.AdditiveBlending}));
    glow.position.set(ax*1.4*s, -0.2*s, az*1.4*s); glow.scale.set(0.8*s,0.8*s,1);
    g.add(glow);
    g.userData.detailParts.push(glow);
    var exhaust = new THREE.Mesh(
      new THREE.ConeGeometry(0.15*s, 0.4*s, 6),
      new THREE.MeshBasicMaterial({color:0x4488ff, transparent:true, opacity:0.2})
    );
    exhaust.position.set(ax*1.4*s, -0.15*s, az*1.4*s);
    exhaust.rotation.x = Math.PI; // point downward
    g.add(exhaust);
    g.userData.exhaustCones.push(exhaust);
    g.userData.detailParts.push(exhaust);
  }
  var front = new THREE.Mesh(new THREE.SphereGeometry(0.12*s,6,6), new THREE.MeshBasicMaterial({color:0x44ff66}));
  front.position.set(0, 0, -1.05*s); g.add(front);
  g.userData.detailParts.push(front);
  var strobe = new THREE.Mesh(
    new THREE.SphereGeometry(0.08*s, 4, 4),
    new THREE.MeshBasicMaterial({color:0xffffff})
  );
  strobe.position.set(0, 0.3*s, 0);
  g.add(strobe);
  g.userData.strobe = strobe;
  g.userData.detailParts.push(strobe);
  return g;
}

function buildVan(s) {
  var g = new THREE.Group();
  var body = new THREE.Mesh(new THREE.BoxGeometry(2.5*s,2*s,5*s), new THREE.MeshPhongMaterial({color:0xe8e8e8, shininess:30}));
  body.position.y = 1*s; g.add(body);
  var cab = new THREE.Mesh(new THREE.BoxGeometry(2.4*s,1.5*s,1.8*s), new THREE.MeshPhongMaterial({color:0xc0c8d0}));
  cab.position.set(0, 0.75*s, -3.2*s); g.add(cab);
  var light = new THREE.PointLight(0x4488ff, 2, 8*s);
  light.position.set(0, 1*s, 0); g.add(light); g.userData.light = light;
  return g;
}

function initExplosionPool() {
  for (var p = 0; p < 4; p++) {
    var pool = { inUse: false, age: 0, s: 0, w: {x:0,y:0,z:0} };
    pool.flash = new THREE.PointLight(0xffaa33, 0, 80);
    pool.flash.visible = false;
    threeScene.add(pool.flash);
    pool.flashSprite = new THREE.Sprite(new THREE.SpriteMaterial({
      map: makeFlashTex(), color:0xffffff, transparent:true, opacity:0, blending:THREE.AdditiveBlending
    }));
    pool.flashSprite.visible = false;
    threeScene.add(pool.flashSprite);
    var ringGeo = new THREE.TorusGeometry(1, 0.15, 8, 32);
    var ringMat = new THREE.MeshBasicMaterial({color:0xffcc66, transparent:true, opacity:0, side:THREE.DoubleSide});
    pool.ring = new THREE.Mesh(ringGeo, ringMat);
    pool.ring.visible = false;
    threeScene.add(pool.ring);
    pool.hotDebris = [];
    for (var i = 0; i < 20; i++) {
      var hue = i % 2 === 0 ? 0xff6600 : 0xff8833;
      var dp = new THREE.Mesh(
        new THREE.SphereGeometry(0.3, 4, 4),
        new THREE.MeshBasicMaterial({color:hue, transparent:true, opacity:0})
      );
      dp.visible = false;
      dp.userData.vel = new THREE.Vector3();
      dp.userData.life = 0; dp.userData.maxLife = 1.5;
      threeScene.add(dp);
      pool.hotDebris.push(dp);
    }
    pool.smokeWisps = [];
    for (var j = 0; j < 10; j++) {
      var gray = 0x444444 + Math.floor((j / 10) * 0x333333);
      var sm = new THREE.Mesh(
        new THREE.SphereGeometry(0.4, 6, 6),
        new THREE.MeshBasicMaterial({color:gray, transparent:true, opacity:0})
      );
      sm.visible = false;
      sm.userData.vel = new THREE.Vector3();
      sm.userData.life = 0; sm.userData.maxLife = 2.0;
      threeScene.add(sm);
      pool.smokeWisps.push(sm);
    }
    explosionPool.push(pool);
  }
}

function spawnExplosion(lng, lat, alt) {
  // Find a free pool slot
  var ex = null;
  for (var p = 0; p < explosionPool.length; p++) {
    if (!explosionPool[p].inUse) { ex = explosionPool[p]; break; }
  }
  // If all in use, reclaim the oldest
  if (!ex) {
    var oldest = 0;
    for (var oi = 1; oi < explosionPool.length; oi++) {
      if (explosionPool[oi].age > explosionPool[oldest].age) oldest = oi;
    }
    ex = explosionPool[oldest];
  }
  var s = meterScale(lat, alt), w = lngLatAltToWorld(lng, lat, alt);
  ex.inUse = true; ex.age = 0; ex.s = s; ex.w = w;
  // Position and activate flash
  ex.flash.position.set(w.x, w.y, w.z);
  ex.flash.intensity = 5; ex.flash.distance = 80 * s; ex.flash.visible = true;
  ex.flashSprite.position.set(w.x, w.y, w.z);
  ex.flashSprite.scale.set(0.01, 0.01, 1);
  ex.flashSprite.material.opacity = 1; ex.flashSprite.visible = true;
  // Ring
  ex.ring.position.set(w.x, w.y, w.z);
  ex.ring.rotation.x = Math.PI/2;
  ex.ring.scale.setScalar(s); // scale geometry to meter scale
  ex.ring.material.opacity = 0.8; ex.ring.visible = true;
  // Hot debris
  for (var i = 0; i < ex.hotDebris.length; i++) {
    var dp = ex.hotDebris[i];
    dp.position.set(w.x, w.y, w.z);
    dp.scale.setScalar(s);
    var spd = (0.8 + Math.random() * 2.0) * s;
    dp.userData.vel.set((Math.random()-0.5)*spd, (Math.random()-0.5)*spd, (Math.random()-0.5)*spd*0.5);
    dp.userData.life = 1.5; dp.material.opacity = 1; dp.visible = true;
  }
  // Smoke wisps
  for (var j = 0; j < ex.smokeWisps.length; j++) {
    var sm = ex.smokeWisps[j];
    sm.position.set(w.x + (Math.random()-0.5)*s*2, w.y + (Math.random()-0.5)*s*2, w.z + (Math.random()-0.5)*s);
    sm.scale.setScalar(s);
    sm.userData.vel.set((Math.random()-0.5)*s*0.3, s*0.5 + Math.random()*s*0.3, (Math.random()-0.5)*s*0.3);
    sm.userData.life = 2.0; sm.material.opacity = 0.6; sm.visible = true;
  }
  activeExplosions.push(ex);
}

function tickExplosions(dt) {
  for (var i = activeExplosions.length - 1; i >= 0; i--) {
    var ex = activeExplosions[i]; ex.age += dt;
    ex.flash.intensity = ex.age < 0.5 ? 5 * (1 - ex.age / 0.5) : 0;
    if (ex.age < 0.1) {
      var fs = (ex.age / 0.1) * 30 * ex.s;
      ex.flashSprite.scale.set(fs, fs, 1);
      ex.flashSprite.material.opacity = 1;
    } else if (ex.age < 0.4) {
      ex.flashSprite.scale.set(30 * ex.s, 30 * ex.s, 1);
      ex.flashSprite.material.opacity = Math.max(0, 1 - (ex.age - 0.1) / 0.3);
    } else {
      ex.flashSprite.visible = false;
    }
    if (ex.age < 0.5) {
      var rf = ex.age / 0.5;
      ex.ring.scale.setScalar((1 + rf * 49) * ex.s);
      ex.ring.material.opacity = 0.8 * (1 - rf);
    } else {
      ex.ring.visible = false;
    }
    var grav = ex.s * 3;
    for (var j = 0; j < ex.hotDebris.length; j++) {
      var p = ex.hotDebris[j]; p.userData.life -= dt;
      if (p.userData.life <= 0) { p.visible = false; continue; }
      p.position.x += p.userData.vel.x * dt;
      p.position.y += p.userData.vel.y * dt;
      p.position.z += p.userData.vel.z * dt;
      p.userData.vel.y -= grav * dt;
      if (p.position.y < ex.w.y - 20 * ex.s && p.userData.vel.y < 0) {
        p.userData.vel.y *= -0.3; p.userData.vel.x *= 0.7; p.userData.vel.z *= 0.7;
      }
      var lifeRatio = p.userData.life / p.userData.maxLife;
      p.scale.setScalar(Math.max(0.1, lifeRatio) * ex.s);
      p.material.opacity = lifeRatio;
    }
    for (var k = 0; k < ex.smokeWisps.length; k++) {
      var sm = ex.smokeWisps[k]; sm.userData.life -= dt;
      if (sm.userData.life <= 0) { sm.visible = false; continue; }
      sm.position.x += sm.userData.vel.x * dt;
      sm.position.y += sm.userData.vel.y * dt;
      sm.position.z += sm.userData.vel.z * dt;
      sm.userData.vel.x *= 0.98; sm.userData.vel.z *= 0.98;
      var sLife = sm.userData.life / sm.userData.maxLife;
      sm.scale.setScalar((1 + (1 - sLife) * 3) * ex.s);
      sm.material.opacity = sLife * 0.6;
    }
    // Return to pool when expired
    if (ex.age > 2.5) {
      ex.inUse = false;
      ex.flash.visible = false; ex.flash.intensity = 0;
      ex.flashSprite.visible = false;
      ex.ring.visible = false;
      for (var ci = 0; ci < ex.hotDebris.length; ci++) ex.hotDebris[ci].visible = false;
      for (var si = 0; si < ex.smokeWisps.length; si++) ex.smokeWisps[si].visible = false;
      activeExplosions.splice(i, 1);
    }
  }
}

function spawnDrone(idx) {
  var tgt = TARGETS[idx % 4], cAlt = 25 + Math.random() * 30, cSpd = 22 + Math.random() * 8;
  var wp = generateWaypoints(VAN_POS[0], VAN_POS[1], tgt.lng, tgt.lat, 0.001+Math.random()*0.0015);
  return { lng:VAN_POS[0], lat:VAN_POS[1], alt:0, prevLng:VAN_POS[0], prevLat:VAN_POS[1],
    heading:0, smoothHeading:0, bank:0, bankVel:0, pitch:0, targetIdx:idx%4,
    tLng:tgt.lng, tLat:tgt.lat, tAlt:tgt.alt, cruiseAlt:cAlt, cruiseSpeed:cSpd,
    waypoints:wp, launched:false, struck:false, phase:"wait", trailCoords:[], pathT:0,
    pathDuration:pathDistance(wp)/cSpd, launchTime:0, riseTime:1.0,
    jX:0, jY:0, jZ:0, jp:Math.random()*Math.PI*2,
    noiseSeed:Math.random()*1000, prevAlt:0, rotorSpeedMul:1.0,
    orbitPause:0, orbitWaypoint:-1, diving:false };
}
for (var i = 0; i < TOTAL; i++) drones.push(spawnDrone(i));

function spawnDroneMesh(idx) {
  var s = meterScale(37.79, 50);
  var mesh = buildDrone(s); mesh.visible = false; threeScene.add(mesh); droneMeshes[idx] = mesh;
  var shGeo = new THREE.CircleGeometry(0.5*s, 12);
  var sh = new THREE.Mesh(shGeo, new THREE.MeshBasicMaterial({color:0x000000, transparent:true, opacity:0.3, side:THREE.DoubleSide}));
  sh.rotation.x = -Math.PI/2; sh.visible = false; threeScene.add(sh); shadowMeshes[idx] = sh;
  var lineGeo = new THREE.BufferGeometry().setFromPoints([new THREE.Vector3(),new THREE.Vector3()]);
  var line = new THREE.Line(lineGeo, targetLineMat.clone());
  line.computeLineDistances();
  line.visible = false; threeScene.add(line); targetLines[idx] = line;
}

function simStep(dt) {
  if (!playing) return;
  simTime += dt; deployTimer += dt;
  if (deployTimer >= 0.6 && deployed < TOTAL) {
    var d = drones[deployed]; d.launched = true; d.phase = "rise"; d.launchTime = simTime; d.pathT = 0;
    spawnDroneMesh(deployed); droneMeshes[deployed].visible = true; shadowMeshes[deployed].visible = true;
    deployed++; deployTimer = 0; droneIcons[deployed-1].className = "di active";
    if (vanMesh && vanMesh.userData.light) vanMesh.userData.light.intensity = 6;
  }
  if (vanMesh && vanMesh.userData.light && vanMesh.userData.light.intensity > 2) {
    vanMesh.userData.light.intensity = Math.max(2, vanMesh.userData.light.intensity - dt*8);
  }
  for (var i = 0; i < drones.length; i++) {
    var d = drones[i];
    if (!d.launched || d.struck) continue;
    var elapsed = simTime - d.launchTime;
    var nt = simTime + d.noiseSeed;
    d.jX = (smoothNoise(nt * 1.7) - 0.5) * 0.6 + (smoothNoise(nt * 3.1 + 100) - 0.5) * 0.12;
    d.jZ = (smoothNoise(nt * 1.3 + 50) - 0.5) * 0.6 + (smoothNoise(nt * 2.7 + 200) - 0.5) * 0.12;
    d.jY = (smoothNoise(nt * 2.3 + 150) - 0.5) * 0.3 + (smoothNoise(nt * 4.1 + 300) - 0.5) * 0.06;
    d.prevAlt = d.alt;
    if (d.phase === "rise") {
      var rf = Math.min(elapsed/d.riseTime, 1), e = rf*rf*(3-2*rf);
      d.alt = e*15; d.lng = VAN_POS[0]+(Math.random()-0.5)*0.00001; d.lat = VAN_POS[1]+(Math.random()-0.5)*0.00001;
      d.rotorSpeedMul = 1.5;
      if (rf >= 1) { d.phase = "cruise"; d.launchTime = simTime; }
    } else if (d.phase === "cruise") {
      if (d.orbitPause > 0) {
        d.orbitPause -= dt;
        d.prevLng = d.lng; d.prevLat = d.lat;
        var orbitR = 0.00008;
        var orbitAngle = simTime * 1.2 + d.noiseSeed;
        d.lng += Math.cos(orbitAngle) * orbitR * dt;
        d.lat += Math.sin(orbitAngle) * orbitR * dt;
      } else {
        var rawPathT = (simTime - d.launchTime) / d.pathDuration;
        if (rawPathT > 0.95 && !d.diving) d.diving = true;
        if (d.diving) {
          d.pathT = Math.min(d.pathT + (dt / d.pathDuration) * 2.0, 1);
        } else {
          d.pathT = Math.min(rawPathT, 1);
        }
        var pos = evalSpline(d.waypoints, d.pathT);
        d.prevLng = d.lng; d.prevLat = d.lat; d.lng = pos[0]; d.lat = pos[1];
        d.alt = altProfile(d.pathT, d.cruiseAlt, d.tAlt);
        var wpSeg = Math.floor(d.pathT * (d.waypoints.length - 1));
        if (wpSeg > 0 && wpSeg !== d.orbitWaypoint && wpSeg < d.waypoints.length - 2 && d.pathT > 0.3 && d.pathT < 0.7) {
          if (Math.random() < 0.004) {
            d.orbitPause = 0.4 + Math.random() * 0.8;
            d.orbitWaypoint = wpSeg;
          }
        }
      }
      var dLng = d.lng-d.prevLng, dLat = d.lat-d.prevLat;
      var turnRate = 0;
      if (Math.abs(dLng) > 1e-9 || Math.abs(dLat) > 1e-9) {
        var th = Math.atan2(dLng, dLat)*180/Math.PI, hd = th-d.smoothHeading;
        while (hd > 180) hd -= 360; while (hd < -180) hd += 360;
        turnRate = hd * Math.min(dt * 4, 1);
        d.smoothHeading += turnRate; d.heading = d.smoothHeading;
      }
      var targetBank = Math.max(-35, Math.min(35, turnRate * 25)) * (Math.PI / 180);
      d.bankVel += (targetBank - d.bank) * 8 * dt;
      d.bankVel *= 0.85;
      d.bank += d.bankVel * dt;
      var tp;
      if (d.diving) { tp = -30 * Math.PI / 180; }
      else if (d.pathT > 0.85) { tp = -(d.pathT - 0.85) / 0.15 * 0.3; }
      else { tp = 0; }
      d.pitch += (tp - d.pitch) * Math.min(dt * 3, 1);
      var altRate = (d.alt - d.prevAlt) / Math.max(dt, 0.001);
      if (d.diving) { d.rotorSpeedMul = 2.0; }
      else if (altRate > 1) { d.rotorSpeedMul += (1.5 - d.rotorSpeedMul) * Math.min(dt * 4, 1); }
      else if (altRate < -1) { d.rotorSpeedMul += (0.7 - d.rotorSpeedMul) * Math.min(dt * 4, 1); }
      else { d.rotorSpeedMul += (1.0 - d.rotorSpeedMul) * Math.min(dt * 4, 1); }
      if (d.pathT >= 0.98) {
        var sx = d.lng-d.tLng, sy = d.lat-d.tLat;
        if (Math.sqrt(sx*sx+sy*sy) < 0.0003 || d.pathT >= 1.0) {
          d.struck = true; strikes++; droneIcons[i].className = "di struck";
          if (droneMeshes[i]) droneMeshes[i].visible = false;
          if (shadowMeshes[i]) shadowMeshes[i].visible = false;
          if (targetLines[i]) targetLines[i].visible = false;
          spawnExplosion(d.tLng, d.tLat, d.tAlt);
          triggerCameraShake(d.tLng, d.tLat);
          var tgt = TARGETS[d.targetIdx];
          if (!tgt.hit) { tgt.hit = true; targetsHit++; flashTarget(d.targetIdx); }
          continue;
        }
      }
    }
    if (droneMeshes[i] && droneMeshes[i].visible) {
      var ms = meterScale(d.lat, d.alt), w = lngLatAltToWorld(d.lng, d.lat, d.alt);
      droneMeshes[i].position.set(w.x+d.jX*ms, w.y+d.jY*ms, w.z+d.jZ*ms);
      droneMeshes[i].rotation.set(d.pitch, -d.heading*Math.PI/180, d.bank);
      var rotors = droneMeshes[i].userData.rotors;
      if (rotors) for (var r = 0; r < rotors.length; r++) rotors[r].rotation.z += (dt * 40 * d.rotorSpeedMul) + r * 0.5;
      var strobeObj = droneMeshes[i].userData.strobe;
      if (strobeObj) strobeObj.visible = (simTime % 1.2) < 0.1;
      var exhaustCones = droneMeshes[i].userData.exhaustCones;
      if (exhaustCones) {
        var thrustScale = 0.5 + d.rotorSpeedMul * 0.4;
        for (var ec = 0; ec < exhaustCones.length; ec++) {
          exhaustCones[ec].scale.y = thrustScale;
          exhaustCones[ec].material.opacity = 0.1 + d.rotorSpeedMul * 0.1;
        }
      }
      var camPos = map.getCenter();
      var dxCam = (d.lng - camPos.lng) * 87000, dyCam = (d.lat - camPos.lat) * 111000;
      var camDist = Math.sqrt(dxCam * dxCam + dyCam * dyCam);
      var showDetail = camDist < 400;
      var details = droneMeshes[i].userData.detailParts;
      if (details) for (var dp = 0; dp < details.length; dp++) details[dp].visible = showDetail;
      if (targetLines[i]) {
        if (d.pathT > 0.9 && d.phase === "cruise") {
          var tw = lngLatAltToWorld(d.tLng, d.tLat, d.tAlt);
          var posArr = targetLines[i].geometry.attributes.position.array;
          posArr[0] = w.x; posArr[1] = w.y; posArr[2] = w.z;
          posArr[3] = tw.x; posArr[4] = tw.y; posArr[5] = tw.z;
          targetLines[i].geometry.attributes.position.needsUpdate = true;
          targetLines[i].computeLineDistances();
          targetLines[i].visible = true;
        } else {
          targetLines[i].visible = false;
        }
      }
      if (shadowMeshes[i]) {
        var gw = lngLatAltToWorld(d.lng, d.lat, 0);
        shadowMeshes[i].position.set(gw.x, gw.y, gw.z);
        shadowMeshes[i].scale.setScalar(1+d.alt*0.01);
        shadowMeshes[i].material.opacity = Math.max(0.05, 0.3-d.alt*0.002);
      }
    }
    d.trailCoords.push([d.lng, d.lat]);
    if (d.trailCoords.length > 80) d.trailCoords.shift();
  }
  tickExplosions(dt);
  if (frameCount % 5 === 0) updateTrails();
  updateCamera(dt); updateHUD(); frameCount++;
}

function flashTarget(idx) {
  var el = document.getElementById("tgt-marker-"+idx); if (!el) return;
  el.innerHTML = '<svg width="28" height="28" viewBox="0 0 28 28"><circle cx="14" cy="14" r="13" fill="rgba(255,255,255,0.8)"/></svg>';
  el.style.filter = "drop-shadow(0 0 16px rgba(255,255,255,0.9))";
  setTimeout(function() {
    el.innerHTML = '<svg width="28" height="28" viewBox="0 0 28 28"><circle cx="14" cy="14" r="11" fill="none" stroke="#44ff44" stroke-width="1.5" opacity="0.7"/><circle cx="14" cy="14" r="2" fill="#44ff44" opacity="0.8"/></svg>';
    el.style.filter = "drop-shadow(0 0 10px rgba(68,255,68,0.5))";
  }, 300);
}

function triggerCameraShake(strikeLng, strikeLat) {
  var center = map.getCenter();
  var dx = (strikeLng - center.lng) * 87000, dy = (strikeLat - center.lat) * 111000;
  var dist = Math.sqrt(dx * dx + dy * dy);
  if (dist < 200 || (trackedDrone && trackedDrone.struck)) {
    camShakeTimer = 0.3;
    camShakeIntensity = Math.max(0.3, 1.0 - dist / 200);
  }
}

function updateCamera(dt) {
  if (camShakeTimer > 0) camShakeTimer -= dt;
  if (trackCam) {
    var lead = null;
    for (var i = 0; i < drones.length; i++) { if (drones[i].launched && !drones[i].struck && drones[i].phase==="cruise") { lead=drones[i]; break; } }
    if (!lead) for (var j = 0; j < drones.length; j++) { if (drones[j].launched && !drones[j].struck) { lead=drones[j]; break; } }
    trackedDrone = lead;
    if (lead) {
      var spdLng = lead.lng - lead.prevLng, spdLat = lead.lat - lead.prevLat;
      var groundSpd = Math.sqrt((spdLng*87000)*(spdLng*87000)+(spdLat*111000)*(spdLat*111000)) / Math.max(dt, 0.001);
      if (!isFinite(groundSpd)) groundSpd = 0;
      var hr = lead.heading * Math.PI / 180;
      var lookAheadDist = 40 + Math.min(groundSpd * 1.5, 120);
      var laLng = Math.sin(hr) * (lookAheadDist / 87000);
      var laLat = Math.cos(hr) * (lookAheadDist / 111000);
      var targetCenterLng = lead.lng + laLng;
      var targetCenterLat = lead.lat + laLat;
      var tcDiffLng = targetCenterLng - (lead.lng + camPosVelLng * 0.01);
      var tcDiffLat = targetCenterLat - (lead.lat + camPosVelLat * 0.01);
      camPosVelLng += tcDiffLng * 5 * dt;
      camPosVelLat += tcDiffLat * 5 * dt;
      camPosVelLng *= 0.92; camPosVelLat *= 0.92;
      var finalCenterLng = lead.lng + camPosVelLng * 0.1 + laLng;
      var finalCenterLat = lead.lat + camPosVelLat * 0.1 + laLat;
      var targetBearing = lead.heading;
      var bd = targetBearing - camBearing;
      while (bd > 180) bd -= 360; while (bd < -180) bd += 360;
      var springK = Math.abs(bd) > 20 ? 10 : 6;
      camBearingVel += bd * springK * dt;
      camBearingVel *= 0.88;
      camBearing += camBearingVel * dt;
      var tPitch = lead.pathT > 0.85 ? 55+(lead.pathT-0.85)/0.15*15 : 55;
      camPitch += (tPitch-camPitch)*Math.min(dt*2,1);
      var baseZoom = Math.max(14.5, Math.min(17, 17-(lead.alt/80)*2));
      var speedFactor = Math.min(groundSpd / 60, 1);
      var tZoom = baseZoom - speedFactor * 0.3;
      camZoomVel += (tZoom - camZoom) * 4 * dt;
      camZoomVel *= 0.92;
      camZoom += camZoomVel * dt;
      var shakeOffLng = 0, shakeOffLat = 0;
      if (camShakeTimer > 0) {
        var shakeAmp = camShakeIntensity * (camShakeTimer / 0.3) * 0.0001;
        shakeOffLng = (Math.random() - 0.5) * shakeAmp;
        shakeOffLat = (Math.random() - 0.5) * shakeAmp;
      }
      map.easeTo({center:[finalCenterLng + shakeOffLng, finalCenterLat + shakeOffLat], bearing:camBearing, pitch:camPitch, zoom:camZoom, duration:150, easing:function(t){return t;}});
      document.getElementById("track-hud").style.display = "block";
      document.getElementById("compass").style.display = "block";
      document.getElementById("th-target").textContent = TARGETS[lead.targetIdx].name;
      if (isFinite(groundSpd) && groundSpd < 200) document.getElementById("th-speed").textContent = groundSpd.toFixed(1);
      document.getElementById("th-alt").textContent = lead.alt.toFixed(0);
      document.getElementById("th-hdg").textContent = ((lead.heading%360+360)%360).toFixed(0);
      drawCompass(lead.heading);
    }
  } else {
    trackedDrone = null;
    document.getElementById("track-hud").style.display = "none";
    document.getElementById("compass").style.display = "none";
    camBearing += 0.1;
    map.easeTo({bearing:camBearing, duration:150, easing:function(t){return t;}});
  }
}

function drawCompass(h) {
  var c = document.getElementById("compass"), ctx = c.getContext("2d");
  ctx.clearRect(0,0,36,36); ctx.strokeStyle="rgba(255,255,255,0.15)"; ctx.lineWidth=1;
  ctx.beginPath(); ctx.arc(18,18,15,0,Math.PI*2); ctx.stroke();
  ctx.save(); ctx.translate(18,18); ctx.rotate(-h*Math.PI/180);
  ctx.fillStyle="rgba(255,80,80,0.7)"; ctx.beginPath(); ctx.moveTo(0,-12); ctx.lineTo(-3,-6); ctx.lineTo(3,-6); ctx.closePath(); ctx.fill();
  ctx.fillStyle="rgba(255,255,255,0.2)"; ctx.beginPath(); ctx.moveTo(0,12); ctx.lineTo(-3,6); ctx.lineTo(3,6); ctx.closePath(); ctx.fill();
  ctx.restore(); ctx.fillStyle="rgba(68,170,255,0.6)"; ctx.beginPath(); ctx.arc(18,18,2,0,Math.PI*2); ctx.fill();
}

function updateTrails() {
  if (!map.getSource("trails")) return;
  var fOld = [], fRecent = [];
  for (var i = 0; i < drones.length; i++) {
    if (drones[i].trailCoords.length < 2) continue;
    var coords = drones[i].trailCoords;
    fOld.push({type:"Feature",geometry:{type:"LineString",coordinates:coords.slice()},properties:{}});
    var recentStart = Math.max(0, coords.length - 20);
    if (coords.length > 2) {
      fRecent.push({type:"Feature",geometry:{type:"LineString",coordinates:coords.slice(recentStart)},properties:{}});
    }
  }
  map.getSource("trails").setData({type:"FeatureCollection", features:fOld});
  if (map.getSource("trails-recent")) {
    map.getSource("trails-recent").setData({type:"FeatureCollection", features:fRecent});
  }
}

var hudTimer = 0;
function updateHUD() {
  if (++hudTimer % 5 !== 0) return;
  var inFlight = 0;
  for (var i = 0; i < TOTAL; i++) { if (drones[i].launched && !drones[i].struck) inFlight++; }
  document.getElementById("sDep").textContent = deployed+"/"+TOTAL;
  document.getElementById("sFly").textContent = inFlight;
  document.getElementById("sHit").textContent = strikes;
  document.getElementById("sTH").textContent = targetsHit+" / "+TARGETS.length;
  var act = null; for (var j = 0; j < drones.length; j++) { if (drones[j].launched && !drones[j].struck) { act=drones[j]; break; } }
  if (act) document.getElementById("sTgt").textContent = TARGETS[act.targetIdx].name;
  var ts = Math.floor(simTime);
  document.getElementById("clock").textContent = String(Math.floor(ts/60)).padStart(2,"0")+":"+String(ts%60).padStart(2,"0");
}

var lastTime = performance.now();
function animate() {
  requestAnimationFrame(animate);
  var now = performance.now(), dt = Math.min((now-lastTime)/1000, 0.05); lastTime = now;
  simStep(dt);
}

document.getElementById("bp").onclick = function() { playing=!playing; this.textContent=playing?"PAUSE":"PLAY"; this.className=playing?"on":""; };

function disposeObject(obj) {
  if (!obj) return;
  if (obj.geometry) obj.geometry.dispose();
  if (obj.material) {
    if (obj.material.map) obj.material.map.dispose();
    obj.material.dispose();
  }
}
function disposeDroneMesh(mesh) {
  if (!mesh) return;
  mesh.traverse(function(child) { disposeObject(child); });
  threeScene.remove(mesh);
}

document.getElementById("br").onclick = function() {
  // Dispose drone meshes and shadows
  for (var i = 0; i < droneMeshes.length; i++) {
    disposeDroneMesh(droneMeshes[i]);
    if (shadowMeshes[i]) { disposeObject(shadowMeshes[i]); threeScene.remove(shadowMeshes[i]); }
    if (targetLines[i]) { disposeObject(targetLines[i]); threeScene.remove(targetLines[i]); }
  }
  // Reset explosion pool (hide all, don't destroy)
  for (var ei = 0; ei < activeExplosions.length; ei++) {
    var ex = activeExplosions[ei];
    ex.inUse = false; ex.flash.visible = false; ex.flash.intensity = 0;
    ex.flashSprite.visible = false; ex.ring.visible = false;
    for (var hi = 0; hi < ex.hotDebris.length; hi++) ex.hotDebris[hi].visible = false;
    for (var si = 0; si < ex.smokeWisps.length; si++) ex.smokeWisps[si].visible = false;
  }
  activeExplosions = [];
  droneMeshes=[]; shadowMeshes=[]; targetLines=[]; drones=[];
  for (var n = 0; n < TOTAL; n++) drones.push(spawnDrone(n));
  deployed=0; strikes=0; targetsHit=0; simTime=0; deployTimer=0;
  camBearingVel=0; camPosVelLng=0; camPosVelLat=0; camZoomVel=0; camShakeTimer=0; camShakeIntensity=0;
  TARGETS.forEach(function(t){t.hit=false;}); droneIcons.forEach(function(e){e.className="di";});
  TARGETS.forEach(function(t,idx) {
    var el = document.getElementById("tgt-marker-"+idx); if (!el) return;
    el.innerHTML = '<svg width="28" height="28" viewBox="0 0 28 28" style="animation:target-pulse 2.5s ease-in-out infinite"><circle cx="14" cy="14" r="11" fill="none" stroke="#ff3333" stroke-width="1.5" opacity="0.6"/><circle cx="14" cy="14" r="6" fill="none" stroke="#ff3333" stroke-width="1" opacity="0.4"/><circle cx="14" cy="14" r="2" fill="#ff3333" opacity="0.7"/></svg>';
    el.style.filter = "drop-shadow(0 0 8px rgba(255,50,50,0.35))";
  });
  if (map.getSource("trails")) map.getSource("trails").setData({type:"FeatureCollection",features:[]});
  if (map.getSource("trails-recent")) map.getSource("trails-recent").setData({type:"FeatureCollection",features:[]});
  camBearing=-20; camPitch=58; camZoom=14.8;
  map.easeTo({center:SF_CENTER, zoom:14.8, pitch:58, bearing:-20, duration:500});
};
document.getElementById("bt").onclick = function() { trackCam=!trackCam; this.className=trackCam?"on":""; if(!trackCam) map.easeTo({center:SF_CENTER,zoom:14.8,pitch:58,bearing:camBearing,duration:1000}); };
</script>
