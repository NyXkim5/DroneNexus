<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>OVERWATCH - San Francisco Drone Swarm</title>
<link href="https://api.mapbox.com/mapbox-gl-js/v3.12.0/mapbox-gl.css" rel="stylesheet">
<script src="https://api.mapbox.com/mapbox-gl-js/v3.12.0/mapbox-gl.js"></script>
<script src="js/three.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#000;overflow:hidden;font-family:'JetBrains Mono',monospace}
#map{position:absolute;inset:0}
#vignette{position:fixed;inset:0;z-index:5;pointer-events:none;background:radial-gradient(ellipse at center,transparent 55%,rgba(0,0,0,0.5) 100%)}
#scanlines{position:fixed;inset:0;z-index:6;pointer-events:none;background:repeating-linear-gradient(0deg,transparent,transparent 3px,rgba(0,0,0,0.015) 3px,rgba(0,0,0,0.015) 4px)}
#hud-top{position:fixed;top:0;left:0;right:0;height:26px;z-index:10;display:flex;align-items:center;padding:0 14px;gap:14px;background:rgba(0,0,0,0.88);border-bottom:1px solid rgba(255,255,255,0.05)}
.brand{font-size:9px;letter-spacing:4px;color:rgba(255,255,255,0.22)}
.sc{font-size:8px;letter-spacing:2.5px;color:rgba(80,150,220,0.5);margin-left:12px}
.ctrls{display:flex;gap:5px;margin-left:auto}
.ctrls button{background:transparent;border:1px solid rgba(255,255,255,0.08);color:rgba(255,255,255,0.2);font-family:inherit;font-size:7px;letter-spacing:1.5px;padding:3px 8px;cursor:pointer;text-transform:uppercase}
.ctrls button:hover,.ctrls button.on{border-color:rgba(255,255,255,0.25);color:rgba(255,255,255,0.5)}
#stats{position:fixed;top:32px;left:10px;z-index:10;font-size:8px;color:rgba(255,255,255,0.18);letter-spacing:1.2px;line-height:2.2}
.sv{color:rgba(255,255,255,0.4)}.sr{color:rgba(220,80,80,0.65)}.sb{color:rgba(80,150,230,0.65)}.sg{color:rgba(80,210,110,0.55)}
#drone-icons{display:flex;gap:2px;margin-top:3px}
.di{width:5px;height:5px;border:1px solid rgba(80,150,230,0.35)}.di.active{background:rgba(80,150,230,0.55)}.di.struck{background:rgba(220,80,80,0.5);border-color:rgba(220,80,80,0.5)}
#clock{position:fixed;top:34px;right:10px;z-index:10;font-size:26px;font-weight:100;letter-spacing:4px;color:rgba(255,255,255,0.06)}
#tgt{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);z-index:10;font-size:7px;letter-spacing:3px;color:rgba(200,70,70,0.25);text-transform:uppercase}
#track-hud{position:fixed;bottom:50px;right:10px;z-index:10;font-size:8px;color:rgba(255,255,255,0.25);letter-spacing:1.2px;line-height:2.2;text-align:right;display:none}
#track-hud .th-label{color:rgba(80,150,230,0.5)}
#compass{position:fixed;bottom:52px;right:100px;z-index:10;width:36px;height:36px;display:none}
.mapboxgl-ctrl-logo,.mapboxgl-ctrl-attrib{display:none !important}
@keyframes target-pulse{0%,100%{transform:scale(1);opacity:0.6}50%{transform:scale(1.1);opacity:0.8}}
</style>
</head>
<body>
<div id="map"></div><div id="vignette"></div><div id="scanlines"></div>
<div id="hud-top">
  <div class="brand">OVERWATCH</div>
  <div class="sc">SWARM DEPLOY - FINANCIAL DISTRICT</div>
  <div class="ctrls"><button id="bp" class="on">PAUSE</button><button id="br">RESET</button><button id="bt">TRACK</button></div>
</div>
<div id="stats">
  <div>ORIGIN <span class="sv">WHITE VAN - MISSION ST</span></div>
  <div>TARGET <span class="sr" id="sTgt">SALESFORCE TOWER</span></div>
  <div>DEPLOYED <span class="sb" id="sDep">0</span></div>
  <div>IN FLIGHT <span class="sb" id="sFly">0</span></div>
  <div>STRIKES <span class="sg" id="sHit">0</span></div>
  <div>TARGETS <span class="sr" id="sTH">0 / 4</span></div>
  <div id="drone-icons"></div>
</div>
<div id="clock">00:00</div>
<div id="track-hud">
  <div><span class="th-label">TGT</span> <span id="th-target">---</span></div>
  <div><span class="th-label">SPD</span> <span id="th-speed">0</span> m/s</div>
  <div><span class="th-label">ALT</span> <span id="th-alt">0</span> m</div>
  <div><span class="th-label">HDG</span> <span id="th-hdg">0</span> deg</div>
</div>
<canvas id="compass" width="36" height="36"></canvas>
<div id="tgt">SWARM OPS - EMBARCADERO / PIER 39 / SALESFORCE / GHIRARDELLI - SAN FRANCISCO</div>

<script>
"use strict";
var urlToken = new URLSearchParams(window.location.search).get("token");
mapboxgl.accessToken = urlToken || localStorage.getItem("mapbox_token") || "";
if (mapboxgl.accessToken) localStorage.setItem("mapbox_token", mapboxgl.accessToken);

var SF_CENTER = [-122.3942, 37.7935], VAN_POS = [-122.3948, 37.7878];
var TARGETS = [
  { lng: -122.3936, lat: 37.7956, alt: 50, name: "EMBARCADERO CENTER", hit: false },
  { lng: -122.4093, lat: 37.8087, alt: 15, name: "PIER 39", hit: false },
  { lng: -122.3972, lat: 37.7897, alt: 326, name: "SALESFORCE TOWER", hit: false },
  { lng: -122.4194, lat: 37.8080, alt: 70, name: "GHIRARDELLI SQUARE", hit: false }
];
var TOTAL = 24, drones = [], deployed = 0, strikes = 0, targetsHit = 0;
var simTime = 0, playing = true, trackCam = false, deployTimer = 0, frameCount = 0;
var camBearing = -20, camPitch = 58, camZoom = 14.8, trackedDrone = null;
var threeScene, threeCamera, threeRenderer, vanMesh = null;
var droneMeshes = [], shadowMeshes = [], explosions = [];

function catmullRom(p0, p1, p2, p3, t) {
  var t2 = t * t, t3 = t2 * t;
  return 0.5 * ((2*p1) + (-p0+p2)*t + (2*p0-5*p1+4*p2-p3)*t2 + (-p0+3*p1-3*p2+p3)*t3);
}
function generateWaypoints(sLng, sLat, tLng, tLat, v) {
  var pts = [[sLng, sLat]], dLng = tLng-sLng, dLat = tLat-sLat;
  var pL = Math.sqrt(dLat*dLat + dLng*dLng), pLng = -dLat/pL, pLat = dLng/pL;
  var n = 3 + Math.floor(Math.random()*2);
  for (var i = 1; i <= n; i++) {
    var f = i/(n+1), o = Math.round((Math.random()-0.5)*v*2000)/1000;
    pts.push([sLng + dLng*f + pLng*o, sLat + dLat*f + pLat*o]);
  }
  pts.push([tLng, tLat]); return pts;
}
function evalSpline(wp, t) {
  var n = wp.length-1, s = t*n, seg = Math.min(Math.floor(s), n-1), lt = s-seg;
  var p0=wp[Math.max(0,seg-1)], p1=wp[seg], p2=wp[Math.min(n,seg+1)], p3=wp[Math.min(n,seg+2)];
  return [catmullRom(p0[0],p1[0],p2[0],p3[0],lt), catmullRom(p0[1],p1[1],p2[1],p3[1],lt)];
}
function altProfile(t, cAlt, tAlt) {
  if (t < 0.2) { var r = t/0.2, e = r*r*(3-2*r); return 5 + (cAlt-5)*e; }
  if (t < 0.85) return cAlt;
  var d = (t-0.85)/0.15, e2 = d*d*(3-2*d); return cAlt + (tAlt-cAlt)*e2;
}
function pathDistance(wp) {
  var d = 0;
  for (var i = 1; i < wp.length; i++) { var dx=(wp[i][0]-wp[i-1][0])*87000, dy=(wp[i][1]-wp[i-1][1])*111000; d += Math.sqrt(dx*dx+dy*dy); }
  return d;
}
function lngLatAltToWorld(lng, lat, alt) {
  var mc = mapboxgl.MercatorCoordinate.fromLngLat([lng, lat], alt);
  return { x: mc.x, y: mc.y, z: mc.z };
}
function meterScale(lat, alt) { return mapboxgl.MercatorCoordinate.fromLngLat([0, lat], alt).meterInMercatorCoordinateUnits(); }

function makeGlowTex() {
  var c = document.createElement("canvas"); c.width = 64; c.height = 64;
  var ctx = c.getContext("2d"), g = ctx.createRadialGradient(32,32,0,32,32,32);
  g.addColorStop(0,"rgba(68,136,255,1)"); g.addColorStop(0.4,"rgba(68,136,255,0.4)"); g.addColorStop(1,"rgba(68,136,255,0)");
  ctx.fillStyle = g; ctx.fillRect(0,0,64,64); return new THREE.CanvasTexture(c);
}

function buildDrone(s) {
  var g = new THREE.Group();
  var body = new THREE.Mesh(new THREE.BoxGeometry(2*s, 0.5*s, 2*s), new THREE.MeshPhongMaterial({color:0x2a3a55, shininess:40}));
  g.add(body);
  var armPos = [[1,1],[-1,1],[1,-1],[-1,-1]];
  var armMat = new THREE.MeshPhongMaterial({color:0x4a5a70});
  var motorMat = new THREE.MeshPhongMaterial({color:0x3a4a60});
  var rotorMat = new THREE.MeshBasicMaterial({color:0x44aaff, transparent:true, opacity:0.35, side:THREE.DoubleSide});
  var glowTex = makeGlowTex();
  g.userData.rotors = [];
  for (var i = 0; i < 4; i++) {
    var ax = armPos[i][0], az = armPos[i][1];
    var arm = new THREE.Mesh(new THREE.CylinderGeometry(0.06*s,0.06*s,1.8*s,6), armMat);
    arm.position.set(ax*0.7*s, 0, az*0.7*s);
    arm.rotation.z = Math.atan2(az,ax) - Math.PI/2; arm.rotateX(Math.PI/2);
    g.add(arm);
    var motor = new THREE.Mesh(new THREE.CylinderGeometry(0.2*s,0.2*s,0.3*s,8), motorMat);
    motor.position.set(ax*1.4*s, 0.15*s, az*1.4*s); g.add(motor);
    var rotor = new THREE.Mesh(new THREE.CircleGeometry(0.6*s,12), rotorMat);
    rotor.position.set(ax*1.4*s, 0.35*s, az*1.4*s); rotor.rotation.x = -Math.PI/2;
    g.add(rotor); g.userData.rotors.push(rotor);
    var glow = new THREE.Sprite(new THREE.SpriteMaterial({map:glowTex, color:0x4488ff, transparent:true, opacity:0.5, blending:THREE.AdditiveBlending}));
    glow.position.set(ax*1.4*s, -0.2*s, az*1.4*s); glow.scale.set(0.8*s,0.8*s,1); g.add(glow);
  }
  var front = new THREE.Mesh(new THREE.SphereGeometry(0.12*s,6,6), new THREE.MeshBasicMaterial({color:0x44ff66}));
  front.position.set(0, 0, -1.05*s); g.add(front);
  return g;
}

function buildVan(s) {
  var g = new THREE.Group();
  var body = new THREE.Mesh(new THREE.BoxGeometry(2.5*s,2*s,5*s), new THREE.MeshPhongMaterial({color:0xe8e8e8, shininess:30}));
  body.position.y = 1*s; g.add(body);
  var cab = new THREE.Mesh(new THREE.BoxGeometry(2.4*s,1.5*s,1.8*s), new THREE.MeshPhongMaterial({color:0xc0c8d0}));
  cab.position.set(0, 0.75*s, -3.2*s); g.add(cab);
  var light = new THREE.PointLight(0x4488ff, 2, 8*s);
  light.position.set(0, 1*s, 0); g.add(light); g.userData.light = light;
  return g;
}

function spawnDrone(idx) {
  var tgt = TARGETS[idx % 4], cAlt = 40+Math.random()*40, cSpd = 22+Math.random()*8;
  var wp = generateWaypoints(VAN_POS[0], VAN_POS[1], tgt.lng, tgt.lat, 0.001+Math.random()*0.0015);
  return { lng:VAN_POS[0], lat:VAN_POS[1], alt:0, prevLng:VAN_POS[0], prevLat:VAN_POS[1],
    heading:0, smoothHeading:0, bank:0, pitch:0, targetIdx:idx%4,
    tLng:tgt.lng, tLat:tgt.lat, tAlt:tgt.alt, cruiseAlt:cAlt, cruiseSpeed:cSpd,
    waypoints:wp, launched:false, struck:false, phase:"wait", trailCoords:[], pathT:0,
    pathDuration:pathDistance(wp)/cSpd, launchTime:0, riseTime:1.0,
    jX:0, jY:0, jZ:0, jp:Math.random()*Math.PI*2 };
}
for (var i = 0; i < TOTAL; i++) drones.push(spawnDrone(i));

var map = new mapboxgl.Map({ container:"map", style:"mapbox://styles/mapbox/dark-v11", center:SF_CENTER, zoom:14.8, pitch:58, bearing:-20, antialias:true });

// Target markers (HTML overlay)
TARGETS.forEach(function(t, idx) {
  var el = document.createElement("div"); el.id = "tgt-marker-" + idx;
  el.innerHTML = '<svg width="28" height="28" viewBox="0 0 28 28" style="animation:target-pulse 2.5s ease-in-out infinite"><circle cx="14" cy="14" r="11" fill="none" stroke="#ff3333" stroke-width="1.5" opacity="0.6"/><circle cx="14" cy="14" r="6" fill="none" stroke="#ff3333" stroke-width="1" opacity="0.4"/><circle cx="14" cy="14" r="2" fill="#ff3333" opacity="0.7"/></svg>';
  el.style.cssText = "filter:drop-shadow(0 0 8px rgba(255,50,50,0.35))";
  var popup = new mapboxgl.Popup({offset:16,closeButton:false}).setHTML('<div style="font-family:monospace;font-size:7px;letter-spacing:1.5px;color:#ff6666;background:rgba(0,0,0,0.85);padding:3px 6px;border:1px solid rgba(255,50,50,0.25);border-radius:2px">'+t.name+'</div>');
  new mapboxgl.Marker({element:el,anchor:"center"}).setLngLat([t.lng,t.lat]).setPopup(popup).addTo(map).togglePopup();
});

// HUD icons
var iconCtr = document.getElementById("drone-icons"), droneIcons = [];
for (var di = 0; di < TOTAL; di++) { var e = document.createElement("div"); e.className="di"; iconCtr.appendChild(e); droneIcons.push(e); }

// Custom 3D layer
var droneLayer = {
  id: "drone-3d-layer", type: "custom", renderingMode: "3d",
  onAdd: function(map, gl) {
    threeCamera = new THREE.Camera();
    threeScene = new THREE.Scene();
    threeScene.add(new THREE.AmbientLight(0x7799cc, 0.6));
    var dir = new THREE.DirectionalLight(0xffffff, 0.4); dir.position.set(1,2,1); threeScene.add(dir);
    threeRenderer = new THREE.WebGLRenderer({ canvas:map.getCanvas(), context:gl, antialias:true });
    threeRenderer.autoClear = false;
    var vs = meterScale(VAN_POS[1], 0);
    vanMesh = buildVan(vs);
    var vw = lngLatAltToWorld(VAN_POS[0], VAN_POS[1], 0);
    vanMesh.position.set(vw.x, vw.y, vw.z); threeScene.add(vanMesh);
  },
  render: function(gl, matrix) {
    threeCamera.projectionMatrix = new THREE.Matrix4().fromArray(matrix);
    threeRenderer.resetState();
    threeRenderer.render(threeScene, threeCamera);
    map.triggerRepaint();
  }
};

map.on("style.load", function() {
  map.addLayer({ id:"3d-buildings", source:"composite", "source-layer":"building", filter:["==","extrude","true"], type:"fill-extrusion", minzoom:14,
    paint:{"fill-extrusion-color":["interpolate",["linear"],["get","height"],0,"#151c28",50,"#1a2538",100,"#202e48",200,"#283858",300,"#304268"],"fill-extrusion-height":["get","height"],"fill-extrusion-base":["get","min_height"],"fill-extrusion-opacity":0.88}});
  map.setFog({color:"#0c1020","high-color":"#0a1028","horizon-blend":0.06,"space-color":"#040810","star-intensity":0.5});
  map.setLight({anchor:"viewport",color:"#7799cc",intensity:0.5,position:[1.5,200,30]});
  map.addLayer(droneLayer);
  map.addSource("trails",{type:"geojson",data:{type:"FeatureCollection",features:[]}});
  map.addLayer({id:"trail-glow",type:"line",source:"trails",paint:{"line-color":"#2255aa","line-opacity":0.08,"line-width":6,"line-blur":4}});
  map.addLayer({id:"trail-lines",type:"line",source:"trails",paint:{"line-color":"#3388dd","line-opacity":0.3,"line-width":2}});
  animate();
});

function spawnDroneMesh(idx) {
  var s = meterScale(37.79, 50);
  var mesh = buildDrone(s); mesh.visible = false; threeScene.add(mesh); droneMeshes[idx] = mesh;
  var shGeo = new THREE.CircleGeometry(0.5*s, 12);
  var sh = new THREE.Mesh(shGeo, new THREE.MeshBasicMaterial({color:0x000000, transparent:true, opacity:0.3, side:THREE.DoubleSide}));
  sh.rotation.x = -Math.PI/2; sh.visible = false; threeScene.add(sh); shadowMeshes[idx] = sh;
}

function spawnExplosion(lng, lat, alt) {
  var s = meterScale(lat, alt), w = lngLatAltToWorld(lng, lat, alt), parts = [];
  var flash = new THREE.PointLight(0xff8800, 5, 50*s); flash.position.set(w.x, w.y, w.z); threeScene.add(flash);
  for (var i = 0; i < 30; i++) {
    var p = new THREE.Mesh(new THREE.SphereGeometry(0.3*s,4,4), new THREE.MeshBasicMaterial({color:0xff6600, transparent:true, opacity:1}));
    p.position.set(w.x, w.y, w.z);
    var spd = (0.5+Math.random()*1.5)*s;
    p.userData.vel = new THREE.Vector3((Math.random()-0.5)*spd, (Math.random()-0.5)*spd, (Math.random()-0.5)*spd*0.5);
    p.userData.life = 1.0; threeScene.add(p); parts.push(p);
  }
  explosions.push({parts:parts, flash:flash, age:0, s:s});
}

function tickExplosions(dt) {
  for (var i = explosions.length-1; i >= 0; i--) {
    var ex = explosions[i]; ex.age += dt;
    ex.flash.intensity = ex.age < 0.3 ? 5*(1-ex.age/0.3) : 0;
    var grav = ex.s * 2;
    for (var j = 0; j < ex.parts.length; j++) {
      var p = ex.parts[j]; p.userData.life -= dt;
      if (p.userData.life <= 0) { p.visible = false; continue; }
      p.position.x += p.userData.vel.x*dt; p.position.y += p.userData.vel.y*dt;
      p.userData.vel.y -= grav*dt; p.position.z += p.userData.vel.z*dt;
      p.scale.setScalar(Math.max(0.1, p.userData.life)); p.material.opacity = p.userData.life;
    }
    if (ex.age > 1.2) {
      for (var k = 0; k < ex.parts.length; k++) { threeScene.remove(ex.parts[k]); ex.parts[k].geometry.dispose(); ex.parts[k].material.dispose(); }
      threeScene.remove(ex.flash); explosions.splice(i, 1);
    }
  }
}

function simStep(dt) {
  if (!playing) return;
  simTime += dt; deployTimer += dt;
  if (deployTimer >= 0.6 && deployed < TOTAL) {
    var d = drones[deployed]; d.launched = true; d.phase = "rise"; d.launchTime = simTime; d.pathT = 0;
    spawnDroneMesh(deployed); droneMeshes[deployed].visible = true; shadowMeshes[deployed].visible = true;
    deployed++; deployTimer = 0; droneIcons[deployed-1].className = "di active";
    if (vanMesh && vanMesh.userData.light) vanMesh.userData.light.intensity = 6;
  }
  if (vanMesh && vanMesh.userData.light && vanMesh.userData.light.intensity > 2) {
    vanMesh.userData.light.intensity = Math.max(2, vanMesh.userData.light.intensity - dt*8);
  }
  for (var i = 0; i < drones.length; i++) {
    var d = drones[i];
    if (!d.launched || d.struck) continue;
    var elapsed = simTime - d.launchTime;
    d.jp += dt*3;
    d.jX = Math.sin(d.jp*1.7)*0.1; d.jY = Math.cos(d.jp*2.3)*0.05; d.jZ = Math.sin(d.jp*1.1+1)*0.1;
    if (d.phase === "rise") {
      var rf = Math.min(elapsed/d.riseTime, 1), e = rf*rf*(3-2*rf);
      d.alt = e*15; d.lng = VAN_POS[0]+(Math.random()-0.5)*0.00001; d.lat = VAN_POS[1]+(Math.random()-0.5)*0.00001;
      if (rf >= 1) { d.phase = "cruise"; d.launchTime = simTime; }
    } else if (d.phase === "cruise") {
      d.pathT = Math.min((simTime-d.launchTime)/d.pathDuration, 1);
      var pos = evalSpline(d.waypoints, d.pathT);
      d.prevLng = d.lng; d.prevLat = d.lat; d.lng = pos[0]; d.lat = pos[1];
      d.alt = altProfile(d.pathT, d.cruiseAlt, d.tAlt);
      var dLng = d.lng-d.prevLng, dLat = d.lat-d.prevLat;
      if (Math.abs(dLng) > 1e-9 || Math.abs(dLat) > 1e-9) {
        var th = Math.atan2(dLng, dLat)*180/Math.PI, hd = th-d.smoothHeading;
        while (hd > 180) hd -= 360; while (hd < -180) hd += 360;
        d.smoothHeading += hd*Math.min(dt*4, 1); d.heading = d.smoothHeading;
        d.bank += (hd*Math.min(dt*4,1)*0.8 - d.bank)*Math.min(dt*5, 1);
      }
      var tp = d.pathT > 0.85 ? -(d.pathT-0.85)/0.15*0.3 : 0;
      d.pitch += (tp-d.pitch)*Math.min(dt*3, 1);
      if (d.pathT >= 0.98) {
        var sx = d.lng-d.tLng, sy = d.lat-d.tLat;
        if (Math.sqrt(sx*sx+sy*sy) < 0.0003 || d.pathT >= 1.0) {
          d.struck = true; strikes++; droneIcons[i].className = "di struck";
          if (droneMeshes[i]) droneMeshes[i].visible = false;
          if (shadowMeshes[i]) shadowMeshes[i].visible = false;
          spawnExplosion(d.tLng, d.tLat, d.tAlt);
          var tgt = TARGETS[d.targetIdx];
          if (!tgt.hit) { tgt.hit = true; targetsHit++; flashTarget(d.targetIdx); }
          continue;
        }
      }
    }
    if (droneMeshes[i] && droneMeshes[i].visible) {
      var s = meterScale(d.lat, d.alt), w = lngLatAltToWorld(d.lng, d.lat, d.alt);
      droneMeshes[i].position.set(w.x+d.jX*s, w.y+d.jY*s, w.z+d.jZ*s);
      droneMeshes[i].rotation.set(d.pitch, -d.heading*Math.PI/180, d.bank);
      var rotors = droneMeshes[i].userData.rotors;
      if (rotors) for (var r = 0; r < rotors.length; r++) rotors[r].rotation.z += dt*40+r*0.5;
      if (shadowMeshes[i]) {
        var gw = lngLatAltToWorld(d.lng, d.lat, 0);
        shadowMeshes[i].position.set(gw.x, gw.y, gw.z);
        shadowMeshes[i].scale.setScalar(1+d.alt*0.01);
        shadowMeshes[i].material.opacity = Math.max(0.05, 0.3-d.alt*0.002);
      }
    }
    d.trailCoords.push([d.lng, d.lat]);
    if (d.trailCoords.length > 80) d.trailCoords.shift();
  }
  tickExplosions(dt);
  if (frameCount % 3 === 0) updateTrails();
  updateCamera(dt); updateHUD(); frameCount++;
}

function flashTarget(idx) {
  var el = document.getElementById("tgt-marker-"+idx); if (!el) return;
  el.innerHTML = '<svg width="28" height="28" viewBox="0 0 28 28"><circle cx="14" cy="14" r="13" fill="rgba(255,255,255,0.8)"/></svg>';
  el.style.filter = "drop-shadow(0 0 16px rgba(255,255,255,0.9))";
  setTimeout(function() {
    el.innerHTML = '<svg width="28" height="28" viewBox="0 0 28 28"><circle cx="14" cy="14" r="11" fill="none" stroke="#44ff44" stroke-width="1.5" opacity="0.7"/><circle cx="14" cy="14" r="2" fill="#44ff44" opacity="0.8"/></svg>';
    el.style.filter = "drop-shadow(0 0 10px rgba(68,255,68,0.5))";
  }, 300);
}

function updateCamera(dt) {
  if (trackCam) {
    var lead = null;
    for (var i = 0; i < drones.length; i++) { if (drones[i].launched && !drones[i].struck && drones[i].phase==="cruise") { lead=drones[i]; break; } }
    if (!lead) for (var j = 0; j < drones.length; j++) { if (drones[j].launched && !drones[j].struck) { lead=drones[j]; break; } }
    trackedDrone = lead;
    if (lead) {
      var hr = lead.heading*Math.PI/180, oD = 80;
      var oLng = -Math.sin(hr)*(oD/87000), oLat = -Math.cos(hr)*(oD/111000);
      var tc = [lead.lng+oLng*0.3, lead.lat+oLat*0.3];
      var bd = lead.heading-camBearing; while(bd>180)bd-=360; while(bd<-180)bd+=360;
      camBearing += bd*Math.min(dt*2.5,1);
      var tPitch = lead.pathT > 0.85 ? 55+(lead.pathT-0.85)/0.15*15 : 55;
      camPitch += (tPitch-camPitch)*Math.min(dt*2,1);
      var tZoom = Math.max(14.5, Math.min(17, 17-(lead.alt/80)*2));
      camZoom += (tZoom-camZoom)*Math.min(dt*2,1);
      map.easeTo({center:tc, bearing:camBearing, pitch:camPitch, zoom:camZoom, duration:150, easing:function(t){return t;}});
      document.getElementById("track-hud").style.display = "block";
      document.getElementById("compass").style.display = "block";
      document.getElementById("th-target").textContent = TARGETS[lead.targetIdx].name;
      var sLng=lead.lng-lead.prevLng, sLat2=lead.lat-lead.prevLat;
      var spd = Math.sqrt((sLng*87000)*(sLng*87000)+(sLat2*111000)*(sLat2*111000))/dt;
      if (isFinite(spd) && spd < 200) document.getElementById("th-speed").textContent = spd.toFixed(1);
      document.getElementById("th-alt").textContent = lead.alt.toFixed(0);
      document.getElementById("th-hdg").textContent = ((lead.heading%360+360)%360).toFixed(0);
      drawCompass(lead.heading);
    }
  } else {
    trackedDrone = null;
    document.getElementById("track-hud").style.display = "none";
    document.getElementById("compass").style.display = "none";
    camBearing += 0.1;
    map.easeTo({bearing:camBearing, duration:150, easing:function(t){return t;}});
  }
}

function drawCompass(h) {
  var c = document.getElementById("compass"), ctx = c.getContext("2d");
  ctx.clearRect(0,0,36,36); ctx.strokeStyle="rgba(255,255,255,0.15)"; ctx.lineWidth=1;
  ctx.beginPath(); ctx.arc(18,18,15,0,Math.PI*2); ctx.stroke();
  ctx.save(); ctx.translate(18,18); ctx.rotate(-h*Math.PI/180);
  ctx.fillStyle="rgba(255,80,80,0.7)"; ctx.beginPath(); ctx.moveTo(0,-12); ctx.lineTo(-3,-6); ctx.lineTo(3,-6); ctx.closePath(); ctx.fill();
  ctx.fillStyle="rgba(255,255,255,0.2)"; ctx.beginPath(); ctx.moveTo(0,12); ctx.lineTo(-3,6); ctx.lineTo(3,6); ctx.closePath(); ctx.fill();
  ctx.restore(); ctx.fillStyle="rgba(68,170,255,0.6)"; ctx.beginPath(); ctx.arc(18,18,2,0,Math.PI*2); ctx.fill();
}

function updateTrails() {
  if (!map.getSource("trails")) return;
  var f = [];
  for (var i = 0; i < drones.length; i++) { if (drones[i].trailCoords.length < 2) continue; f.push({type:"Feature",geometry:{type:"LineString",coordinates:drones[i].trailCoords.slice()},properties:{}}); }
  map.getSource("trails").setData({type:"FeatureCollection", features:f});
}

var hudTimer = 0;
function updateHUD() {
  if (++hudTimer % 5 !== 0) return;
  var inFlight = 0;
  for (var i = 0; i < TOTAL; i++) { if (drones[i].launched && !drones[i].struck) inFlight++; }
  document.getElementById("sDep").textContent = deployed+"/"+TOTAL;
  document.getElementById("sFly").textContent = inFlight;
  document.getElementById("sHit").textContent = strikes;
  document.getElementById("sTH").textContent = targetsHit+" / "+TARGETS.length;
  var act = null; for (var j = 0; j < drones.length; j++) { if (drones[j].launched && !drones[j].struck) { act=drones[j]; break; } }
  if (act) document.getElementById("sTgt").textContent = TARGETS[act.targetIdx].name;
  var ts = Math.floor(simTime);
  document.getElementById("clock").textContent = String(Math.floor(ts/60)).padStart(2,"0")+":"+String(ts%60).padStart(2,"0");
}

var lastTime = performance.now();
function animate() {
  requestAnimationFrame(animate);
  var now = performance.now(), dt = Math.min((now-lastTime)/1000, 0.05); lastTime = now;
  simStep(dt);
}

document.getElementById("bp").onclick = function() { playing=!playing; this.textContent=playing?"PAUSE":"PLAY"; this.className=playing?"on":""; };
document.getElementById("br").onclick = function() {
  for (var i = 0; i < droneMeshes.length; i++) { if (droneMeshes[i]) threeScene.remove(droneMeshes[i]); if (shadowMeshes[i]) threeScene.remove(shadowMeshes[i]); }
  for (var j = 0; j < explosions.length; j++) { for (var k=0;k<explosions[j].parts.length;k++) threeScene.remove(explosions[j].parts[k]); threeScene.remove(explosions[j].flash); }
  droneMeshes=[]; shadowMeshes=[]; explosions=[]; drones=[];
  for (var n = 0; n < TOTAL; n++) drones.push(spawnDrone(n));
  deployed=0; strikes=0; targetsHit=0; simTime=0; deployTimer=0;
  TARGETS.forEach(function(t){t.hit=false;}); droneIcons.forEach(function(e){e.className="di";});
  TARGETS.forEach(function(t,idx) {
    var el = document.getElementById("tgt-marker-"+idx); if (!el) return;
    el.innerHTML = '<svg width="28" height="28" viewBox="0 0 28 28" style="animation:target-pulse 2.5s ease-in-out infinite"><circle cx="14" cy="14" r="11" fill="none" stroke="#ff3333" stroke-width="1.5" opacity="0.6"/><circle cx="14" cy="14" r="6" fill="none" stroke="#ff3333" stroke-width="1" opacity="0.4"/><circle cx="14" cy="14" r="2" fill="#ff3333" opacity="0.7"/></svg>';
    el.style.filter = "drop-shadow(0 0 8px rgba(255,50,50,0.35))";
  });
  if (map.getSource("trails")) map.getSource("trails").setData({type:"FeatureCollection",features:[]});
  camBearing=-20; camPitch=58; camZoom=14.8;
  map.easeTo({center:SF_CENTER, zoom:14.8, pitch:58, bearing:-20, duration:500});
};
document.getElementById("bt").onclick = function() { trackCam=!trackCam; this.className=trackCam?"on":""; if(!trackCam) map.easeTo({center:SF_CENTER,zoom:14.8,pitch:58,bearing:camBearing,duration:1000}); };
</script>
</body>
</html>
