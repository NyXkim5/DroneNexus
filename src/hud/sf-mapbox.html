<!DOCTYPE html>
<html lang="en">
<head>
<!--
  OVERWATCH C2 - Tactical Asset Coordination Display
  MIL-STD-2525 symbology via milsymbol.js. 24 UAS assets deploy from ground vehicle,
  fly spline paths along SF corridors, engage 4 targets.
  Blue force tracking with range rings, heading vectors, velocity leaders.
-->
<meta charset="UTF-8">
<title>OVERWATCH C2 - Tactical Display</title>
<link href="https://api.mapbox.com/mapbox-gl-js/v3.12.0/mapbox-gl.css" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#000;overflow:hidden;font-family:'JetBrains Mono',monospace}
#map{position:absolute;inset:0}
#hud-top{position:fixed;top:0;left:0;right:0;height:28px;z-index:10;display:flex;align-items:center;padding:0 14px;gap:14px;background:rgba(0,0,0,0.92);border-bottom:1px solid rgba(255,255,255,0.06)}
.brand{font-size:9px;letter-spacing:4px;color:rgba(255,255,255,0.35);font-weight:600}

.ctrls{display:flex;gap:5px}
.ctrls button{background:transparent;border:1px solid rgba(255,255,255,0.08);color:rgba(255,255,255,0.25);font-family:inherit;font-size:7px;letter-spacing:1.5px;padding:3px 8px;cursor:pointer;text-transform:uppercase}
.ctrls button:hover,.ctrls button.on{border-color:rgba(80,150,230,0.4);color:rgba(80,150,230,0.7)}
#track-hud{position:fixed;top:36px;right:10px;z-index:10;font-size:8px;color:rgba(255,255,255,0.3);letter-spacing:1.2px;line-height:2.2;text-align:right;display:none}
#track-hud .th-label{color:rgba(80,150,230,0.5)}

.ad-header{font-size:9px;letter-spacing:2px;color:rgba(80,150,230,0.8);margin-bottom:6px;font-weight:600}

#compass{position:fixed;top:36px;right:120px;z-index:10;width:36px;height:36px;display:none}
#clock{position:fixed;top:36px;left:10px;z-index:10;font-size:8px;color:rgba(255,255,255,0.2);letter-spacing:1.5px}
#mission-status{position:fixed;top:52px;left:10px;z-index:10;font-size:7.5px;color:rgba(255,255,255,0.18);letter-spacing:1.2px;line-height:2}
#bottom-bar{position:fixed;bottom:0;left:0;right:0;height:22px;z-index:10;display:flex;align-items:center;padding:0 14px;gap:20px;background:rgba(0,0,0,0.92);border-top:1px solid rgba(255,255,255,0.06)}
.coord-display{font-size:7px;letter-spacing:1px;color:rgba(255,255,255,0.2)}
.track-id{font-size:7px;letter-spacing:1.5px;color:rgba(80,150,230,0.5)}
.classification{font-size:7px;letter-spacing:2px;color:rgba(255,200,50,0.4);margin-left:auto;animation:fouo-blink 4s ease-in-out infinite}
@keyframes fouo-blink{0%,100%{opacity:1}50%{opacity:0.4}}
.mapboxgl-ctrl-logo,.mapboxgl-ctrl-attrib{display:none !important}
</style>
</head>
<body>
<div id="map"></div>
<div id="hud-top">

</div>
<script>
"use strict";
var urlToken=new URLSearchParams(window.location.search).get("token");
mapboxgl.accessToken=urlToken||localStorage.getItem("mapbox_token")||"";
if(mapboxgl.accessToken)localStorage.setItem("mapbox_token",mapboxgl.accessToken);
var SF_CENTER=[-122.3942,37.7935],VAN_POS=[-122.3948,37.7878];
var TARGETS=[
  {lng:-122.3936,lat:37.7956,alt:50,name:"EMBARCADERO CENTER",hit:false},
  {lng:-122.4093,lat:37.8087,alt:15,name:"PIER 39",hit:false},
  {lng:-122.3972,lat:37.7897,alt:326,name:"SALESFORCE TOWER",hit:false},
  {lng:-122.4194,lat:37.8080,alt:70,name:"GHIRARDELLI SQUARE",hit:false}
];
var TOTAL=24,drones=[],deployed=0,strikes=0,targetsHit=0;
var simTime=0,playing=true,trackCam=false,deployTimer=0,frameCount=0;
var camBearing=-20,camPitch=45,camZoom=14.8,trackedDrone=null;
var camBearingVel=0,camPosVelLng=0,camPosVelLat=0,camZoomVel=0;
var droneMarkers=[],missionEnded=false,selectedDroneIdx=-1;
var tgtMarkers=[],vanMarker=null;
var currentSymbolSize=24,lastZoomForSize=14.8;
var CORRIDORS=[
  {a:[-122.4180,37.7750],b:[-122.3930,37.7910]},
  {a:[-122.4180,37.7735],b:[-122.3930,37.7895]},
  {a:[-122.3880,37.7940],b:[-122.3960,37.8090]}
];
function catmullRom(p0,p1,p2,p3,t){
  var t2=t*t,t3=t2*t;
  return 0.5*((2*p1)+(-p0+p2)*t+(2*p0-5*p1+4*p2-p3)*t2+(-p0+3*p1-3*p2+p3)*t3);
}
function snapToCorridor(lng,lat,threshold){
  var bestDist=threshold,bestLng=lng,bestLat=lat;
  for(var ci=0;ci<CORRIDORS.length;ci++){
    var c=CORRIDORS[ci],ax=c.a[0],ay=c.a[1],bx=c.b[0],by=c.b[1];
    var abx=bx-ax,aby=by-ay,apx=lng-ax,apy=lat-ay;
    var t=Math.max(0,Math.min(1,(apx*abx+apy*aby)/(abx*abx+aby*aby)));
    var px=ax+t*abx,py=ay+t*aby,dx=lng-px,dy=lat-py,dist=Math.sqrt(dx*dx+dy*dy);
    if(dist<bestDist){bestDist=dist;bestLng=lng*0.4+px*0.6;bestLat=lat*0.4+py*0.6;}
  }
  return[bestLng,bestLat];
}
function generateWaypoints(sLng,sLat,tLng,tLat,v){
  var pts=[[sLng,sLat]],dLng=tLng-sLng,dLat=tLat-sLat;
  var pL=Math.sqrt(dLat*dLat+dLng*dLng),pLng=-dLat/pL,pLat=dLng/pL;
  var n=3+Math.floor(Math.random()*2);
  for(var i=1;i<=n;i++){
    var f=i/(n+1),o=Math.round((Math.random()-0.5)*v*2000)/1000;
    var snapped=snapToCorridor(sLng+dLng*f+pLng*o,sLat+dLat*f+pLat*o,0.002);
    pts.push([snapped[0],snapped[1]]);
  }
  pts.push([tLng,tLat]);return pts;
}
function evalSpline(wp,t){
  var n=wp.length-1,s=t*n,seg=Math.min(Math.floor(s),n-1),lt=s-seg;
  var p0=wp[Math.max(0,seg-1)],p1=wp[seg],p2=wp[Math.min(n,seg+1)],p3=wp[Math.min(n,seg+2)];
  return[catmullRom(p0[0],p1[0],p2[0],p3[0],lt),catmullRom(p0[1],p1[1],p2[1],p3[1],lt)];
}
function altProfile(t,cAlt,tAlt){
  var osc=Math.sin(t*4)*5;
  if(t<0.2){var r=t/0.2,e=r*r*(3-2*r);return 5+(cAlt-5)*e+osc*r;}
  if(t<0.85)return cAlt+osc;
  var d=(t-0.85)/0.15,e2=d*d*(3-2*d);return cAlt+(tAlt-cAlt)*e2+osc*(1-d);
}
function pathDistance(wp){
  var d=0;
  for(var i=1;i<wp.length;i++){var dx=(wp[i][0]-wp[i-1][0])*87000,dy=(wp[i][1]-wp[i-1][1])*111000;d+=Math.sqrt(dx*dx+dy*dy);}
  return d;
}
function safe(v){return isFinite(v)?v:0;}
function getSymbolSize(){
  var z=map.getZoom();
  if(z>=16)return 24;
  if(z<=14)return 35;
  return Math.round(35+(24-35)*((z-14)/2));
}
function makeDroneSymbol(idx,heading,speed,size){
  var s=size||currentSymbolSize;
  var designation="D-"+String(idx+1).padStart(2,"0");
  return new milsymbol.Symbol("SFAPMFQ------",{
    size:s,frame:true,fill:true,strokeWidth:1.5,
    uniqueDesignation:designation,speed:Math.round(speed||0),direction:Math.round(heading||0)
  }).toDataURL();
}
function makeHostileSymbol(destroyed){
  return new milsymbol.Symbol("SHGPE------",{size:20,fill:true,frame:true,strokeWidth:destroyed?2:1.5}).toDataURL();
}
function makeVanSymbol(){
  return new milsymbol.Symbol("SFGPEV----H",{size:22,fill:true,frame:true,uniqueDesignation:"VAN-01"}).toDataURL();
}
function spawnDrone(idx){
  var tgt=TARGETS[idx%4],cAlt=25+Math.random()*30,cSpd=22+Math.random()*8;
  var wp=generateWaypoints(VAN_POS[0],VAN_POS[1],tgt.lng,tgt.lat,0.001+Math.random()*0.0015);
  return{lng:VAN_POS[0],lat:VAN_POS[1],alt:0,prevLng:VAN_POS[0],prevLat:VAN_POS[1],
    heading:0,smoothHeading:0,bank:0,bankVel:0,pitch:0,targetIdx:idx%4,
    tLng:tgt.lng,tLat:tgt.lat,tAlt:tgt.alt,cruiseAlt:cAlt,cruiseSpeed:cSpd,
    waypoints:wp,launched:false,struck:false,phase:"wait",trailCoords:[],pathT:0,
    pathDuration:pathDistance(wp)/cSpd,launchTime:0,riseTime:1.0,
    noiseSeed:Math.random()*1000,prevAlt:0,groundSpeed:0,
    orbitPause:0,orbitWaypoint:-1,diving:false,
    lastRenderedHeading:0,lastRenderedSpeed:0};
}
for(var i=0;i<TOTAL;i++)drones.push(spawnDrone(i));
var map=new mapboxgl.Map({container:"map",style:"mapbox://styles/mapbox/dark-v11",center:SF_CENTER,zoom:14.8,pitch:45,bearing:-20,antialias:true});
map.on("zoom",function(){
  var z=map.getZoom();
  if(Math.abs(z-lastZoomForSize)>0.3){
    lastZoomForSize=z;currentSymbolSize=getSymbolSize();
    for(var i=0;i<drones.length;i++){
      if(!drones[i].launched||drones[i].struck||!droneMarkers[i])continue;
      var img=document.getElementById("drone-img-"+i);
      if(img){img.src=makeDroneSymbol(i,drones[i].heading,drones[i].groundSpeed);drones[i].lastRenderedHeading=drones[i].heading;drones[i].lastRenderedSpeed=drones[i].groundSpeed;}
    }
  }
  applyDeclutter(z);
});
function applyDeclutter(z){
  if(z<15.5){
    document.querySelectorAll("[id^='drone-alt-']").forEach(function(el){el.style.display="none";});
    if(map.getLayer("heading-vec"))map.setPaintProperty("heading-vec","line-opacity",0);
    if(map.getLayer("assignment-lines"))map.setPaintProperty("assignment-lines","line-opacity",0);
    if(map.getLayer("trail-line"))map.setPaintProperty("trail-line","line-opacity",0);
  }else{
    document.querySelectorAll("[id^='drone-alt-']").forEach(function(el){el.style.display="block";});
    if(map.getLayer("heading-vec"))map.setPaintProperty("heading-vec","line-opacity",0.3);
    if(map.getLayer("assignment-lines"))map.setPaintProperty("assignment-lines","line-opacity",0.06);
    if(map.getLayer("trail-line"))map.setPaintProperty("trail-line","line-opacity",0.15);
  }
}
map.on("load",function(){
  map.addLayer({id:"3d-buildings",source:"composite","source-layer":"building",filter:["==","extrude","true"],type:"fill-extrusion",minzoom:14,
    paint:{"fill-extrusion-color":["interpolate",["linear"],["get","height"],0,"#161d28",30,"#1a2538",100,"#1e2e45",200,"#243652",300,"#2a4060"],
      "fill-extrusion-height":["get","height"],"fill-extrusion-base":["get","min_height"],"fill-extrusion-opacity":0.88}});
  map.setFog({color:"#0a0f1a","high-color":"#121830","horizon-blend":0.06,"space-color":"#040810","star-intensity":0.4});
  map.setLight({anchor:"viewport",color:"#7799cc",intensity:0.3,position:[1.5,45,30]});
  map.addSource("grid-lines",{type:"geojson",data:{type:"FeatureCollection",features:[]}});
  map.addLayer({id:"grid-layer",type:"line",source:"grid-lines",minzoom:16,paint:{"line-color":"#ffffff","line-opacity":0.04,"line-width":0.5}});
  map.addSource("trails",{type:"geojson",data:{type:"FeatureCollection",features:[]}});
  map.addLayer({id:"trail-line",type:"line",source:"trails",paint:{"line-color":"#4488cc","line-opacity":0.15,"line-width":1}});
  map.addSource("trails-recent",{type:"geojson",data:{type:"FeatureCollection",features:[]}});
  map.addLayer({id:"trail-recent",type:"line",source:"trails-recent",paint:{"line-color":"#5599dd","line-opacity":0.3,"line-width":1}});
  map.addSource("assignments",{type:"geojson",data:{type:"FeatureCollection",features:[]}});
  map.addLayer({id:"assignment-lines",type:"line",source:"assignments",paint:{"line-color":"#ffffff","line-opacity":0.06,"line-width":1,"line-dasharray":[4,4]},minzoom:14.5});
  map.addSource("heading-vectors",{type:"geojson",data:{type:"FeatureCollection",features:[]}});
  map.addLayer({id:"heading-vec",type:"line",source:"heading-vectors",paint:{"line-color":"#4488dd","line-opacity":0.3,"line-width":1}});
  map.addSource("range-rings",{type:"geojson",data:{type:"FeatureCollection",features:[]}});
  map.addLayer({id:"range-ring-layer",type:"line",source:"range-rings",paint:{"line-color":"#ffffff","line-opacity":0.08,"line-width":1,"line-dasharray":[6,4]}});
  map.addSource("range-labels",{type:"geojson",data:{type:"FeatureCollection",features:[]}});
  map.addLayer({id:"range-label-layer",type:"symbol",source:"range-labels",layout:{"text-field":["get","label"],"text-size":9,"text-font":["DIN Pro Regular","Arial Unicode MS Regular"],"text-anchor":"center"},paint:{"text-color":"rgba(255,255,255,0.2)","text-halo-color":"rgba(0,0,0,0.6)","text-halo-width":1}});
  createRangeRings();createGrid();createVanMarker();createTargetMarkers();animate();
});
function createRangeRings(){
  var rings=[],labels=[],radii=[500,1000];
  for(var r=0;r<radii.length;r++){
    var coords=[];
    for(var a=0;a<=64;a++){var angle=(a/64)*Math.PI*2;coords.push([VAN_POS[0]+(radii[r]*Math.cos(angle))/87000,VAN_POS[1]+(radii[r]*Math.sin(angle))/111000]);}
    rings.push({type:"Feature",geometry:{type:"LineString",coordinates:coords},properties:{}});
    labels.push({type:"Feature",geometry:{type:"Point",coordinates:[VAN_POS[0]+(radii[r])/87000,VAN_POS[1]]},properties:{label:radii[r]+"m"}});
  }
  if(map.getSource("range-rings"))map.getSource("range-rings").setData({type:"FeatureCollection",features:rings});
  if(map.getSource("range-labels"))map.getSource("range-labels").setData({type:"FeatureCollection",features:labels});
}
function createGrid(){
  var features=[],cx=VAN_POS[0],cy=VAN_POS[1],step100lng=100/87000,step100lat=100/111000;
  for(var gx=-10;gx<=10;gx++){
    features.push({type:"Feature",geometry:{type:"LineString",coordinates:[[cx+gx*step100lng,cy-10*step100lat],[cx+gx*step100lng,cy+10*step100lat]]},properties:{}});
  }
  for(var gy=-10;gy<=10;gy++){
    features.push({type:"Feature",geometry:{type:"LineString",coordinates:[[cx-10*step100lng,cy+gy*step100lat],[cx+10*step100lng,cy+gy*step100lat]]},properties:{}});
  }
  if(map.getSource("grid-lines"))map.getSource("grid-lines").setData({type:"FeatureCollection",features:features});
}
function createVanMarker(){
  var el=document.createElement("div"),img=document.createElement("img");
  img.src=makeVanSymbol();img.style.cssText="display:block";el.appendChild(img);
  vanMarker=new mapboxgl.Marker({element:el,anchor:"center"}).setLngLat(VAN_POS).addTo(map);
}
function createTargetMarkers(){
  TARGETS.forEach(function(t,idx){
    var el=document.createElement("div"),img=document.createElement("img");
    img.src=makeHostileSymbol(false);img.style.cssText="display:block";img.id="tgt-img-"+idx;el.appendChild(img);
    var label=document.createElement("div");
    label.style.cssText="font-family:'JetBrains Mono',monospace;font-size:6px;letter-spacing:1px;color:rgba(255,80,80,0.6);text-align:center;margin-top:2px;white-space:nowrap";
    label.textContent=t.name;label.id="tgt-label-"+idx;el.appendChild(label);
    tgtMarkers[idx]=new mapboxgl.Marker({element:el,anchor:"center"}).setLngLat([t.lng,t.lat]).addTo(map);
  });
}
function spawnDroneMarker(idx){
  var d=drones[idx],el=document.createElement("div");el.style.cssText="position:relative";
  var img=document.createElement("img");img.src=makeDroneSymbol(idx,d.heading,d.groundSpeed);
  img.style.cssText="display:block";img.id="drone-img-"+idx;el.appendChild(img);
  var altLabel=document.createElement("div");
  altLabel.style.cssText="font-family:'JetBrains Mono',monospace;font-size:6px;color:rgba(255,255,255,0.3);text-align:center;margin-top:1px;letter-spacing:0.5px";
  altLabel.id="drone-alt-"+idx;altLabel.textContent="0m";el.appendChild(altLabel);
  if(map.getZoom()<15.5)altLabel.style.display="none";
  droneMarkers[idx]=new mapboxgl.Marker({element:el,anchor:"center"}).setLngLat(VAN_POS).addTo(map);
  d.lastRenderedHeading=d.heading;d.lastRenderedSpeed=d.groundSpeed;
}
function simStep(dt){
  if(!playing)return;
  simTime+=dt;deployTimer+=dt;
  if(deployTimer>=0.6&&deployed<TOTAL){
    var d=drones[deployed];d.launched=true;d.phase="rise";d.launchTime=simTime;d.pathT=0;
    spawnDroneMarker(deployed);deployed++;deployTimer=0;
  }
  for(var i=0;i<drones.length;i++){
    var d=drones[i];if(!d.launched||d.struck)continue;
    updateDronePhysics(d,i,dt);updateDroneMarker(d,i);
    d.trailCoords.push([d.lng,d.lat]);if(d.trailCoords.length>80)d.trailCoords.shift();
  }
  if(frameCount%5===0)updateTrails();
  if(frameCount%8===0)updateOverlays();
  if(frameCount%10===0)updateAssetDetail();
  updateCamera(dt);updateHUD();frameCount++;
  if(deployed>=TOTAL&&!missionEnded&&drones.every(function(d){return d.struck||!d.launched;})&&strikes>0){
    missionEnded=true;document.getElementById("mission-status").textContent="STATUS: ALL ASSETS RTB";
  }
}
function updateDronePhysics(d,i,dt){
  if(d.phase==="rise"){
    var elapsed=simTime-d.launchTime,rf=Math.min(elapsed/d.riseTime,1),e=rf*rf*(3-2*rf);
    d.alt=e*15;d.lng=VAN_POS[0]+(Math.random()-0.5)*0.00001;d.lat=VAN_POS[1]+(Math.random()-0.5)*0.00001;
    if(rf>=1){d.phase="cruise";d.launchTime=simTime;}
  }else if(d.phase==="cruise"){updateCruisePhase(d,i,dt);}
}
function updateCruisePhase(d,i,dt){
  if(d.orbitPause>0){
    d.orbitPause-=dt;d.prevLng=d.lng;d.prevLat=d.lat;
    var orbitAngle=simTime*1.2+d.noiseSeed;
    d.lng+=Math.cos(orbitAngle)*0.00008*dt;d.lat+=Math.sin(orbitAngle)*0.00008*dt;
  }else{
    var rawPathT=(simTime-d.launchTime)/d.pathDuration;
    if(rawPathT>0.95&&!d.diving)d.diving=true;
    d.pathT=d.diving?Math.min(d.pathT+(dt/d.pathDuration)*2.0,1):Math.min(rawPathT,1);
    var pos=evalSpline(d.waypoints,d.pathT);d.prevLng=d.lng;d.prevLat=d.lat;
    d.lng=safe(pos[0]);d.lat=safe(pos[1]);d.alt=safe(altProfile(d.pathT,d.cruiseAlt,d.tAlt));
    var wpSeg=Math.floor(d.pathT*(d.waypoints.length-1));
    if(wpSeg>0&&wpSeg!==d.orbitWaypoint&&wpSeg<d.waypoints.length-2&&d.pathT>0.3&&d.pathT<0.7){
      if(Math.random()<0.004){d.orbitPause=0.4+Math.random()*0.8;d.orbitWaypoint=wpSeg;}
    }
  }
  var dLng=d.lng-d.prevLng,dLat=d.lat-d.prevLat;
  d.groundSpeed=safe(Math.sqrt((dLng*87000)*(dLng*87000)+(dLat*111000)*(dLat*111000))/Math.max(dt,0.001));
  if(Math.abs(dLng)>1e-9||Math.abs(dLat)>1e-9){
    var hd=Math.atan2(dLng,dLat)*180/Math.PI-d.smoothHeading;
    while(hd>180)hd-=360;while(hd<-180)hd+=360;
    d.smoothHeading+=hd*Math.min(dt*4,1);d.heading=d.smoothHeading;
  }
  if(d.pathT>=0.98){
    var sx=d.lng-d.tLng,sy=d.lat-d.tLat;
    if(Math.sqrt(sx*sx+sy*sy)<0.0003||d.pathT>=1.0){
      d.struck=true;strikes++;
      if(droneMarkers[i]){droneMarkers[i].remove();droneMarkers[i]=null;}
      flashTarget(d.targetIdx);
      if(!TARGETS[d.targetIdx].hit){TARGETS[d.targetIdx].hit=true;targetsHit++;}
    }
  }
}
function updateDroneMarker(d,i){
  if(!droneMarkers[i])return;
  droneMarkers[i].setLngLat([d.lng,d.lat]);
  var headingDelta=Math.abs(d.heading-d.lastRenderedHeading);
  if(headingDelta>180)headingDelta=360-headingDelta;
  var speedDelta=Math.abs(d.groundSpeed-d.lastRenderedSpeed);
  if(headingDelta>5||speedDelta>3){
    var img=document.getElementById("drone-img-"+i);
    if(img){img.src=makeDroneSymbol(i,d.heading,d.groundSpeed);d.lastRenderedHeading=d.heading;d.lastRenderedSpeed=d.groundSpeed;}
  }
  if(frameCount%15===0){
    var altEl=document.getElementById("drone-alt-"+i);if(altEl)altEl.textContent=Math.round(d.alt)+"m";
  }
}
function flashTarget(idx){
  var img=document.getElementById("tgt-img-"+idx),label=document.getElementById("tgt-label-"+idx);
  if(img){img.style.filter="brightness(3)";setTimeout(function(){img.src=makeHostileSymbol(true);img.style.filter="none";},200);}
  if(label){label.textContent="NEUTRALIZED";label.style.color="rgba(80,210,110,0.6)";}
}
function updateAssetDetail(){
  var panel=document.getElementById("asset-detail");
  if(selectedDroneIdx<0||!drones[selectedDroneIdx]||drones[selectedDroneIdx].struck){
    panel.style.display="none";return;
  }
  var d=drones[selectedDroneIdx];
  panel.style.display="block";
  document.getElementById("ad-name").textContent="D-"+String(selectedDroneIdx+1).padStart(2,"0");
  var status=d.phase==="rise"?"ASCENDING":d.diving?"TERMINAL":"EN ROUTE";
  document.getElementById("ad-status").textContent=status;
  document.getElementById("ad-target").textContent=TARGETS[d.targetIdx].name;
  document.getElementById("ad-speed").textContent=d.groundSpeed.toFixed(1)+" m/s";
  document.getElementById("ad-alt").textContent=Math.round(d.alt)+" m AGL";
  document.getElementById("ad-hdg").textContent=((d.heading%360+360)%360).toFixed(0)+" deg";
  var pct=Math.round(d.pathT*100);
  document.getElementById("ad-path").textContent=pct+"% COMPLETE";
  var remaining=(1-d.pathT)*d.pathDuration;
  document.getElementById("ad-eta").textContent=Math.max(0,Math.round(remaining))+"s";
}
function updateOverlays(){
  var hf=[],af=[];
  for(var i=0;i<drones.length;i++){
    var d=drones[i];if(!d.launched||d.struck)continue;
    var hr=d.heading*Math.PI/180,vecLen=40+Math.min(d.groundSpeed*0.5,40);
    hf.push({type:"Feature",geometry:{type:"LineString",coordinates:[[d.lng,d.lat],[d.lng+Math.sin(hr)*(vecLen/87000),d.lat+Math.cos(hr)*(vecLen/111000)]]},properties:{}});
    af.push({type:"Feature",geometry:{type:"LineString",coordinates:[[d.lng,d.lat],[d.tLng,d.tLat]]},properties:{}});
  }
  if(map.getSource("heading-vectors"))map.getSource("heading-vectors").setData({type:"FeatureCollection",features:hf});
  if(map.getSource("assignments"))map.getSource("assignments").setData({type:"FeatureCollection",features:af});
}
function updateTrails(){
  if(!map.getSource("trails"))return;
  var fOld=[],fRecent=[];
  for(var i=0;i<drones.length;i++){
    if(drones[i].trailCoords.length<2)continue;
    var coords=drones[i].trailCoords;
    fOld.push({type:"Feature",geometry:{type:"LineString",coordinates:coords.slice()},properties:{}});
    if(coords.length>2)fRecent.push({type:"Feature",geometry:{type:"LineString",coordinates:coords.slice(Math.max(0,coords.length-20))},properties:{}});
  }
  map.getSource("trails").setData({type:"FeatureCollection",features:fOld});
  if(map.getSource("trails-recent"))map.getSource("trails-recent").setData({type:"FeatureCollection",features:fRecent});
}
function updateCamera(dt){
  if(trackCam){
    var lead=findTrackedDrone();trackedDrone=lead;
    if(lead)updateTrackCamera(lead,dt);
  }else{
    trackedDrone=null;
    document.getElementById("track-hud").style.display="none";
    document.getElementById("compass").style.display="none";
    camBearing+=0.04;map.easeTo({bearing:camBearing,duration:50,easing:function(t){return t;}});
  }
}
function findTrackedDrone(){
  if(selectedDroneIdx>=0&&drones[selectedDroneIdx].launched&&!drones[selectedDroneIdx].struck)return drones[selectedDroneIdx];
  for(var i=0;i<drones.length;i++){if(drones[i].launched&&!drones[i].struck&&drones[i].phase==="cruise")return drones[i];}
  for(var j=0;j<drones.length;j++){if(drones[j].launched&&!drones[j].struck)return drones[j];}
  return null;
}
function updateTrackCamera(lead,dt){
  var hr=lead.heading*Math.PI/180,lookAhead=60+Math.min(lead.groundSpeed*1.2,100);
  var laLng=Math.sin(hr)*(lookAhead/87000),laLat=Math.cos(hr)*(lookAhead/111000);
  camPosVelLng+=(lead.lng+laLng-(lead.lng+camPosVelLng*0.01))*5*dt;
  camPosVelLat+=(lead.lat+laLat-(lead.lat+camPosVelLat*0.01))*5*dt;
  camPosVelLng*=0.92;camPosVelLat*=0.92;
  var finalLng=lead.lng+camPosVelLng*0.1+laLng,finalLat=lead.lat+camPosVelLat*0.1+laLat;
  var bd=lead.heading-camBearing;while(bd>180)bd-=360;while(bd<-180)bd+=360;
  camBearingVel+=bd*(Math.abs(bd)>20?12:6)*dt;camBearingVel*=0.85;camBearing+=camBearingVel*dt;
  camPitch+=(50-camPitch)*Math.min(dt*2,1);
  var tZoom=Math.max(14.5,Math.min(17,17-(lead.alt/80)*2))-Math.min(lead.groundSpeed/60,1)*0.3;
  camZoomVel+=(tZoom-camZoom)*4*dt;camZoomVel*=0.92;camZoom+=camZoomVel*dt;
  map.easeTo({center:[safe(finalLng),safe(finalLat)],bearing:safe(camBearing),pitch:safe(camPitch),zoom:safe(camZoom),duration:50,easing:function(t){return t;}});
  document.getElementById("track-hud").style.display="block";document.getElementById("compass").style.display="block";
  document.getElementById("th-target").textContent=TARGETS[lead.targetIdx].name;
  if(lead.groundSpeed<200)document.getElementById("th-speed").textContent=lead.groundSpeed.toFixed(1);
  document.getElementById("th-alt").textContent=safe(lead.alt).toFixed(0);
  document.getElementById("th-hdg").textContent=((lead.heading%360+360)%360).toFixed(0);drawCompass(lead.heading);
}
function drawCompass(h){
  var ctx=document.getElementById("compass").getContext("2d");
  ctx.clearRect(0,0,36,36);ctx.strokeStyle="rgba(255,255,255,0.15)";ctx.lineWidth=1;
  ctx.beginPath();ctx.arc(18,18,15,0,Math.PI*2);ctx.stroke();ctx.save();ctx.translate(18,18);ctx.rotate(-h*Math.PI/180);
  ctx.fillStyle="rgba(255,80,80,0.7)";ctx.beginPath();ctx.moveTo(0,-12);ctx.lineTo(-3,-6);ctx.lineTo(3,-6);ctx.closePath();ctx.fill();
  ctx.fillStyle="rgba(255,255,255,0.2)";ctx.beginPath();ctx.moveTo(0,12);ctx.lineTo(-3,6);ctx.lineTo(3,6);ctx.closePath();ctx.fill();
  ctx.restore();ctx.fillStyle="rgba(68,170,255,0.6)";ctx.beginPath();ctx.arc(18,18,2,0,Math.PI*2);ctx.fill();
}
var hudTimer=0;
function updateHUD(){
  if(++hudTimer%5!==0)return;
  var inFlight=0;for(var i=0;i<TOTAL;i++){if(drones[i].launched&&!drones[i].struck)inFlight++;}
  document.getElementById("bft-status").textContent="BFT: "+TOTAL+" ASSETS | "+inFlight+" ACTIVE | "+TARGETS.length+" TARGETS | "+targetsHit+" NEUTRALIZED";
  var ts=Math.floor(simTime);
  document.getElementById("clock").textContent="T+"+String(Math.floor(ts/60)).padStart(2,"0")+":"+String(ts%60).padStart(2,"0");
  document.getElementById("timestamp").textContent=new Date().toISOString().replace(/\.\d+Z/,"Z");
  var center=map.getCenter();
  document.getElementById("coord-display").textContent=center.lat.toFixed(4)+"N "+Math.abs(center.lng).toFixed(4)+"W";
  document.getElementById("track-id").textContent=selectedDroneIdx>=0?"TRACKING: D-"+String(selectedDroneIdx+1).padStart(2,"0"):"";
  var status="DEPLOYED: "+deployed+"/"+TOTAL+" | STRIKES: "+strikes;
  if(missionEnded)status="STATUS: ALL ASSETS RTB";
  document.getElementById("mission-status").textContent=status;
}
var lastTime=performance.now();
function animate(){requestAnimationFrame(animate);var now=performance.now(),dt=Math.min((now-lastTime)/1000,0.05);lastTime=now;simStep(dt);}
map.on("click",function(ev){
  var clickLng=ev.lngLat.lng,clickLat=ev.lngLat.lat,bestIdx=-1,bestDist=0.0005;
  for(var i=0;i<drones.length;i++){
    if(!drones[i].launched||drones[i].struck)continue;
    var dx=drones[i].lng-clickLng,dy=drones[i].lat-clickLat,dist=Math.sqrt(dx*dx+dy*dy);
    if(dist<bestDist){bestDist=dist;bestIdx=i;}
  }
  selectedDroneIdx=bestIdx;
  if(bestIdx>=0){trackCam=true;document.getElementById("bt").className="on";}
  else{document.getElementById("asset-detail").style.display="none";}
});
document.getElementById("bp").onclick=function(){playing=!playing;this.textContent=playing?"PAUSE":"PLAY";this.className=playing?"on":"";};
document.getElementById("br").onclick=function(){
  for(var i=0;i<droneMarkers.length;i++){if(droneMarkers[i])droneMarkers[i].remove();}
  droneMarkers=[];drones=[];for(var n=0;n<TOTAL;n++)drones.push(spawnDrone(n));
  deployed=0;strikes=0;targetsHit=0;simTime=0;deployTimer=0;
  camBearingVel=0;camPosVelLng=0;camPosVelLat=0;camZoomVel=0;
  selectedDroneIdx=-1;missionEnded=false;trackedDrone=null;
  document.getElementById("asset-detail").style.display="none";
  TARGETS.forEach(function(t){t.hit=false;});
  TARGETS.forEach(function(t,idx){
    var img=document.getElementById("tgt-img-"+idx);if(img){img.src=makeHostileSymbol(false);img.style.filter="none";}
    var label=document.getElementById("tgt-label-"+idx);if(label){label.textContent=t.name;label.style.color="rgba(255,80,80,0.6)";}
  });
  ["trails","trails-recent","heading-vectors","assignments"].forEach(function(s){if(map.getSource(s))map.getSource(s).setData({type:"FeatureCollection",features:[]});});
  document.getElementById("mission-status").textContent="";
  camBearing=-20;camPitch=45;camZoom=14.8;
  if(trackCam){trackCam=false;document.getElementById("bt").className="";}
  map.easeTo({center:SF_CENTER,zoom:14.8,pitch:45,bearing:-20,duration:500});
};
document.getElementById("bt").onclick=function(){
  trackCam=!trackCam;this.className=trackCam?"on":"";
  if(!trackCam){selectedDroneIdx=-1;document.getElementById("asset-detail").style.display="none";map.easeTo({center:SF_CENTER,zoom:14.8,pitch:45,bearing:camBearing,duration:1000});}
};
</script>
