<script>

// Catmull-Rom spline interpolation
function catmullRom(p0, p1, p2, p3, t) {
  var t2 = t * t, t3 = t2 * t;
  return 0.5 * (
    (2 * p1) +
    (-p0 + p2) * t +
    (2 * p0 - 5 * p1 + 4 * p2 - p3) * t2 +
    (-p0 + 3 * p1 - 3 * p2 + p3) * t3
  );
}

// Generate multi-waypoint path for a drone
function generateWaypoints(startLng, startLat, tgtLng, tgtLat, variation) {
  var pts = [];
  pts.push([startLng, startLat]);

  var dLng = tgtLng - startLng;
  var dLat = tgtLat - startLat;
  var perpLng = -dLat;
  var perpLat = dLng;
  var perpLen = Math.sqrt(perpLng * perpLng + perpLat * perpLat);
  if (perpLen > 0) { perpLng /= perpLen; perpLat /= perpLen; }

  // 3-4 intermediate waypoints along a street-like path
  var numMid = 3 + Math.floor(Math.random() * 2);
  for (var i = 1; i <= numMid; i++) {
    var frac = i / (numMid + 1);
    var offset = (Math.random() - 0.5) * variation * 2;
    // Snap slightly to grid-like offsets
    var gridSnap = Math.round(offset * 1000) / 1000;
    pts.push([
      startLng + dLng * frac + perpLng * gridSnap,
      startLat + dLat * frac + perpLat * gridSnap
    ]);
  }

  pts.push([tgtLng, tgtLat]);
  return pts;
}

// Evaluate position along Catmull-Rom spline defined by waypoints
function evalSpline(waypoints, t) {
  var n = waypoints.length - 1;
  var scaledT = t * n;
  var seg = Math.min(Math.floor(scaledT), n - 1);
  var localT = scaledT - seg;

  var p0 = waypoints[Math.max(0, seg - 1)];
  var p1 = waypoints[seg];
  var p2 = waypoints[Math.min(n, seg + 1)];
  var p3 = waypoints[Math.min(n, seg + 2)];

  return [
    catmullRom(p0[0], p1[0], p2[0], p3[0], localT),
    catmullRom(p0[1], p1[1], p2[1], p3[1], localT)
  ];
}

// Altitude profile: rise 0-20%, cruise 20-85%, descend 85-100%
function altProfile(t, cruiseAlt, targetAlt) {
  if (t < 0.2) {
    // Rise phase: ease-in from 5m to cruise
    var rt = t / 0.2;
    var ease = rt * rt * (3 - 2 * rt); // smoothstep
    return 5 + (cruiseAlt - 5) * ease;
  } else if (t < 0.85) {
    return cruiseAlt;
  } else {
    // Descent phase
    var dt = (t - 0.85) / 0.15;
    var ease2 = dt * dt * (3 - 2 * dt);
    return cruiseAlt + (targetAlt - cruiseAlt) * ease2;
  }
}

// Speed easing: slow start, cruise, slow end
function speedEase(t) {
  // Trapezoidal speed profile
  if (t < 0.1) return 0.3 + 0.7 * (t / 0.1); // accelerate
  if (t > 0.9) return 0.3 + 0.7 * (1 - (t - 0.9) / 0.1); // decelerate
  return 1.0; // cruise
}

// Create drone SVG element
function createDroneSVG() {
  var wrapper = document.createElement("div");
  wrapper.className = "drone-wrapper";

  var glow = document.createElement("div");
  glow.className = "drone-glow";
  wrapper.appendChild(glow);

  var svg = document.createElementNS("http://www.w3.org/2000/svg", "svg");
  svg.setAttribute("width", "28");
  svg.setAttribute("height", "28");
  svg.setAttribute("viewBox", "0 0 32 32");
  svg.setAttribute("class", "drone-svg");

  // SVG filter for motion blur on rotors
  var defs = document.createElementNS("http://www.w3.org/2000/svg", "defs");
  var filter = document.createElementNS("http://www.w3.org/2000/svg", "filter");
  filter.setAttribute("id", "rotor-blur");
  var feGauss = document.createElementNS("http://www.w3.org/2000/svg", "feGaussianBlur");
  feGauss.setAttribute("stdDeviation", "0.4");
  filter.appendChild(feGauss);
  defs.appendChild(filter);
  svg.appendChild(defs);

  // Arms (diagonal, thin rectangles)
  var armData = [
    { x1: 12, y1: 12, x2: 5, y2: 5 },
    { x1: 20, y1: 12, x2: 27, y2: 5 },
    { x1: 12, y1: 20, x2: 5, y2: 27 },
    { x1: 20, y1: 20, x2: 27, y2: 27 }
  ];
  armData.forEach(function(arm) {
    var line = document.createElementNS("http://www.w3.org/2000/svg", "line");
    line.setAttribute("x1", arm.x1);
    line.setAttribute("y1", arm.y1);
    line.setAttribute("x2", arm.x2);
    line.setAttribute("y2", arm.y2);
    line.setAttribute("stroke", "#4a5a70");
    line.setAttribute("stroke-width", "1.8");
    line.setAttribute("stroke-linecap", "round");
    svg.appendChild(line);
  });

  // Motor pods (small filled circles at arm ends)
  var motors = [[5, 5], [27, 5], [5, 27], [27, 27]];
  motors.forEach(function(m) {
    var c = document.createElementNS("http://www.w3.org/2000/svg", "circle");
    c.setAttribute("cx", m[0]);
    c.setAttribute("cy", m[1]);
    c.setAttribute("r", "2.2");
    c.setAttribute("fill", "#3a4a60");
    c.setAttribute("stroke", "#5a7090");
    c.setAttribute("stroke-width", "0.5");
    svg.appendChild(c);
  });

  // Spinning rotors (larger semi-transparent circles with motion blur)
  motors.forEach(function(m, idx) {
    // Outer blur ring
    var r1 = document.createElementNS("http://www.w3.org/2000/svg", "circle");
    r1.setAttribute("cx", m[0]);
    r1.setAttribute("cy", m[1]);
    r1.setAttribute("r", "4.5");
    r1.setAttribute("fill", "rgba(68,170,255,0.12)");
    r1.setAttribute("filter", "url(#rotor-blur)");
    svg.appendChild(r1);

    // Rotor disc
    var r2 = document.createElementNS("http://www.w3.org/2000/svg", "circle");
    r2.setAttribute("cx", m[0]);
    r2.setAttribute("cy", m[1]);
    r2.setAttribute("r", "4");
    r2.setAttribute("fill", "rgba(68,170,255,0.25)");
    r2.setAttribute("stroke", "rgba(68,170,255,0.35)");
    r2.setAttribute("stroke-width", "0.3");
    svg.appendChild(r2);

    // Blade indicators (spinning lines)
    var g = document.createElementNS("http://www.w3.org/2000/svg", "g");
    g.setAttribute("class", "rotor");
    g.style.transformOrigin = m[0] + "px " + m[1] + "px";
    // Offset animation start for each rotor
    g.style.animationDelay = (idx * 37) + "ms";

    var blade1 = document.createElementNS("http://www.w3.org/2000/svg", "line");
    blade1.setAttribute("x1", m[0] - 3.5);
    blade1.setAttribute("y1", m[1]);
    blade1.setAttribute("x2", m[0] + 3.5);
    blade1.setAttribute("y2", m[1]);
    blade1.setAttribute("stroke", "rgba(68,170,255,0.5)");
    blade1.setAttribute("stroke-width", "0.7");
    blade1.setAttribute("stroke-linecap", "round");
    g.appendChild(blade1);

    var blade2 = document.createElementNS("http://www.w3.org/2000/svg", "line");
    blade2.setAttribute("x1", m[0]);
    blade2.setAttribute("y1", m[1] - 3.5);
    blade2.setAttribute("x2", m[0]);
    blade2.setAttribute("y2", m[1] + 3.5);
    blade2.setAttribute("stroke", "rgba(68,170,255,0.5)");
    blade2.setAttribute("stroke-width", "0.7");
    blade2.setAttribute("stroke-linecap", "round");
    g.appendChild(blade2);

    svg.appendChild(g);
  });

  // Center body (rounded rectangle)
  var body = document.createElementNS("http://www.w3.org/2000/svg", "rect");
  body.setAttribute("x", "12");
  body.setAttribute("y", "12");
  body.setAttribute("width", "8");
  body.setAttribute("height", "8");
  body.setAttribute("rx", "2");
  body.setAttribute("fill", "#2a3a55");
  body.setAttribute("stroke", "#4a6a90");
  body.setAttribute("stroke-width", "0.6");
  svg.appendChild(body);

  // Navigation lights: green front-left, red front-right
  // Front is bottom in top-down view (direction of travel)
  var navGreen = document.createElementNS("http://www.w3.org/2000/svg", "circle");
  navGreen.setAttribute("cx", "13");
  navGreen.setAttribute("cy", "21");
  navGreen.setAttribute("r", "1");
  navGreen.setAttribute("fill", "#44ff66");
  navGreen.setAttribute("opacity", "0.8");
  svg.appendChild(navGreen);

  var navRed = document.createElementNS("http://www.w3.org/2000/svg", "circle");
  navRed.setAttribute("cx", "19");
  navRed.setAttribute("cy", "21");
  navRed.setAttribute("r", "1");
  navRed.setAttribute("fill", "#ff4444");
  navRed.setAttribute("opacity", "0.8");
  svg.appendChild(navRed);

  // Camera/sensor dot (front center bottom)
  var cam = document.createElementNS("http://www.w3.org/2000/svg", "circle");
  cam.setAttribute("cx", "16");
  cam.setAttribute("cy", "22");
  cam.setAttribute("r", "0.8");
  cam.setAttribute("fill", "#ffffff");
  cam.setAttribute("opacity", "0.9");
  svg.appendChild(cam);

  wrapper.appendChild(svg);
  return wrapper;
}

// Drone data
function spawnDrone(idx) {
  var tgt = TARGETS[idx % 4];
  var startLng = VAN_POS[0], startLat = VAN_POS[1];
  var cruiseAlt = 40 + Math.random() * 40; // 40-80m
  var cruiseSpeed = 22 + Math.random() * 8; // 22-30 m/s
  var variation = 0.001 + Math.random() * 0.0015;

  // Generate multi-waypoint path
  var waypoints = generateWaypoints(startLng, startLat, tgt.lng, tgt.lat, variation);

  return {
    lng: startLng, lat: startLat, alt: 0,
    prevLng: startLng, prevLat: startLat,
    heading: 0, smoothHeading: 0,
    targetIdx: idx % 4,
    tLng: tgt.lng, tLat: tgt.lat, tAlt: tgt.alt,
    cruiseAlt: cruiseAlt,
    cruiseSpeed: cruiseSpeed,
    waypoints: waypoints,
    launched: false, struck: false, phase: "wait",
    marker: null, trailCoords: [],
    pathT: 0,
    // Total path time based on distance and speed
    pathDuration: 0,
    launchTime: 0,
    riseTime: 1.0, // 1 second vertical rise
    _flashTimeout: null
  };
}

// Calculate path distance for duration estimate
function pathDistance(waypoints) {
  var dist = 0;
  for (var i = 1; i < waypoints.length; i++) {
    var dLng = waypoints[i][0] - waypoints[i-1][0];
    var dLat = waypoints[i][1] - waypoints[i-1][1];
    // Rough meters conversion at SF latitude
    var dx = dLng * 87000; // degrees to meters at ~37.8N
    var dy = dLat * 111000;
    dist += Math.sqrt(dx * dx + dy * dy);
  }
  return dist;
}

for (var i = 0; i < TOTAL; i++) {
  var dr = spawnDrone(i);
  var dist = pathDistance(dr.waypoints);
  dr.pathDuration = dist / dr.cruiseSpeed;
  drones.push(dr);
}

var map_loaded = false;

map.on("load", function() {
  map_loaded = true;
  // Add trail sources/layers immediately
  map.addSource("trails", { type: "geojson", data: { type: "FeatureCollection", features: [] } });
  map.addLayer({ id: "trail-glow", type: "line", source: "trails", paint: { "line-color": "#2255aa", "line-opacity": 0.08, "line-width": 6, "line-blur": 4 } });
  map.addLayer({ id: "trail-lines", type: "line", source: "trails", paint: { "line-color": "#3388dd", "line-opacity": 0.3, "line-width": 2 } });
  animate();
});

function simStep(dt) {
  if (!playing) return;
  simTime += dt;
  deployTimer += dt;

  // Deploy one drone every 0.6 seconds
  if (deployTimer >= 0.6 && deployed < TOTAL) {
    var dr = drones[deployed];
    dr.launched = true;
    dr.phase = "rise";
    dr.launchTime = simTime;
    dr.pathT = 0;

    // Create drone marker
    var mEl = createDroneSVG();
    dr.marker = new mapboxgl.Marker({element: mEl, anchor: "center", rotationAlignment: "map"}).setLngLat([dr.lng, dr.lat]).addTo(map);

    // Van pulse effect while deploying
    vanEl.style.animation = "van-pulse 1s ease-in-out infinite";

    deployed++;
    deployTimer = 0;
    droneIcons[deployed - 1].className = "di active";
  }

  // Stop van pulse when all deployed
  if (deployed >= TOTAL) {
    vanEl.style.animation = "";
  }

  var activeCount = 0;

  for (var i = 0; i < drones.length; i++) {
    var d = drones[i];
    if (!d.launched || d.struck) continue;
    activeCount++;

    var elapsed = simTime - d.launchTime;

    if (d.phase === "rise") {
      // Vertical rise for 1 second
      var riseFrac = Math.min(elapsed / d.riseTime, 1);
      var eased = riseFrac * riseFrac * (3 - 2 * riseFrac);
      d.alt = eased * 15; // Rise to 15m before cruise begins
      d.lng = VAN_POS[0] + (Math.random() - 0.5) * 0.00001; // Tiny drift
      d.lat = VAN_POS[1] + (Math.random() - 0.5) * 0.00001;

      if (riseFrac >= 1) {
        d.phase = "cruise";
        d.launchTime = simTime; // Reset for cruise timing
      }
    } else if (d.phase === "cruise") {
      var cruiseElapsed = simTime - d.launchTime;
      // Raw t based on elapsed time vs path duration
      var rawT = cruiseElapsed / d.pathDuration;

      // Apply speed easing (acceleration/deceleration)
      // Integrate speed profile to get actual position
      // Simple approach: use adaptive step
      d.pathT = Math.min(rawT, 1);

      // Evaluate spline position
      var pos = evalSpline(d.waypoints, d.pathT);
      d.prevLng = d.lng;
      d.prevLat = d.lat;
      d.lng = pos[0];
      d.lat = pos[1];

      // Altitude profile
      d.alt = altProfile(d.pathT, d.cruiseAlt, d.tAlt);

      // Calculate heading from movement direction
      var dLng = d.lng - d.prevLng;
      var dLat = d.lat - d.prevLat;
      if (Math.abs(dLng) > 1e-9 || Math.abs(dLat) > 1e-9) {
        var targetHeading = Math.atan2(dLng, dLat) * 180 / Math.PI;
        // Smooth heading interpolation
        var hDiff = targetHeading - d.smoothHeading;
        // Normalize to -180..180
        while (hDiff > 180) hDiff -= 360;
        while (hDiff < -180) hDiff += 360;
        d.smoothHeading += hDiff * Math.min(dt * 4, 1);
        d.heading = d.smoothHeading;
      }

      // Strike check
      if (d.pathT >= 0.98) {
        var dx = d.lng - d.tLng, dy = d.lat - d.tLat;
        var distToTarget = Math.sqrt(dx * dx + dy * dy);
        if (distToTarget < 0.0003 || d.pathT >= 1.0) {
          d.struck = true;
          strikes++;
          if (d.marker) { d.marker.remove(); d.marker = null; }
          droneIcons[i].className = "di struck";

          var tgt = TARGETS[d.targetIdx];
          if (!tgt.hit) {
            tgt.hit = true;
            targetsHit++;
            // Flash target white then green
            var tEl = document.getElementById("tgt-marker-" + d.targetIdx);
            if (tEl) {
              tEl.innerHTML = '<svg width="28" height="28" viewBox="0 0 28 28"><circle cx="14" cy="14" r="13" fill="rgba(255,255,255,0.8)"/><circle cx="14" cy="14" r="11" fill="none" stroke="#ffffff" stroke-width="2"/></svg>';
              tEl.style.filter = "drop-shadow(0 0 16px rgba(255,255,255,0.9))";
              (function(el, idx) {
                setTimeout(function() {
                  el.innerHTML = '<svg width="28" height="28" viewBox="0 0 28 28"><circle cx="14" cy="14" r="11" fill="none" stroke="#44ff44" stroke-width="1.5" opacity="0.7"/><circle cx="14" cy="14" r="6" fill="none" stroke="#44ff44" stroke-width="1" opacity="0.5"/><circle cx="14" cy="14" r="2" fill="#44ff44" opacity="0.8"/><line x1="14" y1="0" x2="14" y2="6" stroke="#44ff44" stroke-width="0.5" opacity="0.5"/><line x1="14" y1="22" x2="14" y2="28" stroke="#44ff44" stroke-width="0.5" opacity="0.5"/><line x1="0" y1="14" x2="6" y2="14" stroke="#44ff44" stroke-width="0.5" opacity="0.5"/><line x1="22" y1="14" x2="28" y2="14" stroke="#44ff44" stroke-width="0.5" opacity="0.5"/></svg>';
                  el.style.filter = "drop-shadow(0 0 10px rgba(68,255,68,0.5))";
                }, 300);
              })(tEl, d.targetIdx);
            }
          }
          continue;
        }
      }
    }

    // Update marker position and rotation
    if (d.marker) {
      d.marker.setLngLat([d.lng, d.lat]);
      d.marker.setRotation(d.heading);
    }

    // Trail coordinates (store for rendering)
    d.trailCoords.push([d.lng, d.lat]);
    if (d.trailCoords.length > 80) d.trailCoords.shift();
  }

  // Update trails every 3 frames for performance
  if (frameCount % 3 === 0) {
    updateTrails();
  }

  // Camera
  updateCamera(dt);
  updateHUD();
  frameCount++;
}

function updateCamera(dt) {
  if (trackCam) {
    // Find lead drone to track
    var lead = null;
    for (var i = 0; i < drones.length; i++) {
      if (drones[i].launched && !drones[i].struck && drones[i].phase === "cruise") {
        lead = drones[i];
        break;
      }
    }
    if (!lead) {
      // Fall back to any launched drone
      for (var j = 0; j < drones.length; j++) {
        if (drones[j].launched && !drones[j].struck) { lead = drones[j]; break; }
      }
    }
    trackedDrone = lead;

    if (lead) {
      // Chase cam: 80m behind, 30m above along velocity vector
      var headingRad = lead.heading * Math.PI / 180;
      // Camera positioned behind the drone (opposite of heading)
      var offsetDist = 80; // meters behind
      var offsetLng = -Math.sin(headingRad) * (offsetDist / 87000);
      var offsetLat = -Math.cos(headingRad) * (offsetDist / 111000);

      var targetCenter = [lead.lng + offsetLng * 0.3, lead.lat + offsetLat * 0.3];

      // Bearing follows drone heading (smoothly)
      var targetBearing = lead.heading;
      var bDiff = targetBearing - camBearing;
      while (bDiff > 180) bDiff -= 360;
      while (bDiff < -180) bDiff += 360;
      camBearing += bDiff * Math.min(dt * 2.5, 1);

      // Pitch varies with phase
      var targetPitch = 55;
      if (lead.pathT > 0.85) {
        targetPitch = 55 + (lead.pathT - 0.85) / 0.15 * 15; // up to 70 when diving
      }
      camPitch += (targetPitch - camPitch) * Math.min(dt * 2, 1);

      // Zoom varies with altitude
      var targetZoom = 17 - (lead.alt / 80) * 2; // higher = more zoomed out
      targetZoom = Math.max(14.5, Math.min(17, targetZoom));
      camZoom += (targetZoom - camZoom) * Math.min(dt * 2, 1);

      map.easeTo({
        center: targetCenter,
        bearing: camBearing,
        pitch: camPitch,
        zoom: camZoom,
        duration: 100,
        easing: function(t) { return t; }
      });

      // Show tracking HUD
      document.getElementById("track-hud").style.display = "block";
      document.getElementById("compass").style.display = "block";
      document.getElementById("th-target").textContent = TARGETS[lead.targetIdx].name;

      // Speed calculation (m/s from coordinate delta)
      var dLng = lead.lng - lead.prevLng;
      var dLat = lead.lat - lead.prevLat;
      var speedMs = Math.sqrt((dLng * 87000) * (dLng * 87000) + (dLat * 111000) * (dLat * 111000)) / dt;
      if (isFinite(speedMs) && speedMs < 200) {
        document.getElementById("th-speed").textContent = speedMs.toFixed(1);
      }
      document.getElementById("th-alt").textContent = lead.alt.toFixed(0);
      document.getElementById("th-hdg").textContent = ((lead.heading % 360 + 360) % 360).toFixed(0);

      // Draw compass
      drawCompass(lead.heading);
    }
  } else {
    trackedDrone = null;
    document.getElementById("track-hud").style.display = "none";
    document.getElementById("compass").style.display = "none";

    // Slow auto-orbit when not tracking
    camBearing += 0.1;
    map.easeTo({
      bearing: camBearing,
      duration: 100,
      easing: function(t) { return t; }
    });
  }
}

function drawCompass(heading) {
  var canvas = document.getElementById("compass");
  var ctx = canvas.getContext("2d");
  ctx.clearRect(0, 0, 36, 36);

  ctx.strokeStyle = "rgba(255,255,255,0.15)";
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.arc(18, 18, 15, 0, Math.PI * 2);
  ctx.stroke();

  // N marker
  ctx.save();
  ctx.translate(18, 18);
  ctx.rotate(-heading * Math.PI / 180);

  // North indicator
  ctx.fillStyle = "rgba(255,80,80,0.7)";
  ctx.beginPath();
  ctx.moveTo(0, -12);
  ctx.lineTo(-3, -6);
  ctx.lineTo(3, -6);
  ctx.closePath();
  ctx.fill();

  // South indicator
  ctx.fillStyle = "rgba(255,255,255,0.2)";
  ctx.beginPath();
  ctx.moveTo(0, 12);
  ctx.lineTo(-3, 6);
  ctx.lineTo(3, 6);
  ctx.closePath();
  ctx.fill();

  ctx.restore();

  // Center dot
  ctx.fillStyle = "rgba(68,170,255,0.6)";
  ctx.beginPath();
  ctx.arc(18, 18, 2, 0, Math.PI * 2);
  ctx.fill();
}

function updateTrails() {
  if (!map_loaded || !map.getSource("trails")) return;
  var features = [];
  for (var i = 0; i < drones.length; i++) {
    if (drones[i].trailCoords.length < 2) continue;
    features.push({
      type: "Feature",
      geometry: { type: "LineString", coordinates: drones[i].trailCoords.slice() },
      properties: {}
    });
  }
  map.getSource("trails").setData({ type: "FeatureCollection", features: features });
}

var hudTimer = 0;
function updateHUD() {
  if (++hudTimer % 5 !== 0) return;
  var inFlight = 0;
  for (var i = 0; i < TOTAL; i++) {
    if (drones[i].launched && !drones[i].struck) inFlight++;
  }
  document.getElementById("sDep").textContent = deployed + "/" + TOTAL;
  document.getElementById("sFly").textContent = inFlight;
  document.getElementById("sHit").textContent = strikes;
  document.getElementById("sTH").textContent = targetsHit + " / " + TARGETS.length;

  var active = null;
  for (var j = 0; j < drones.length; j++) {
    if (drones[j].launched && !drones[j].struck) { active = drones[j]; break; }
  }
  if (active) document.getElementById("sTgt").textContent = TARGETS[active.targetIdx].name;

  var ts = Math.floor(simTime);
  document.getElementById("clock").textContent = String(Math.floor(ts / 60)).padStart(2, "0") + ":" + String(ts % 60).padStart(2, "0");
}

// Animation loop with delta time
var lastTime = performance.now();
function animate() {
  requestAnimationFrame(animate);
  var now = performance.now();
  var dt = Math.min((now - lastTime) / 1000, 0.05);
  lastTime = now;
  simStep(dt);
}

// Controls
document.getElementById("bp").onclick = function() {
  playing = !playing;
  this.textContent = playing ? "PAUSE" : "PLAY";
  this.className = playing ? "on" : "";
};

document.getElementById("br").onclick = function() {
  drones.forEach(function(d) { if (d.marker) d.marker.remove(); });
  drones = [];
  for (var i = 0; i < TOTAL; i++) {
    var dr = spawnDrone(i);
    var dist = pathDistance(dr.waypoints);
    dr.pathDuration = dist / dr.cruiseSpeed;
    drones.push(dr);
  }
  deployed = 0; strikes = 0; targetsHit = 0; simTime = 0; deployTimer = 0;
  TARGETS.forEach(function(t) { t.hit = false; });
  droneIcons.forEach(function(e) { e.className = "di"; });
  // Reset target markers
  TARGETS.forEach(function(t, idx) {
    var el = document.getElementById("tgt-marker-" + idx);
    if (el) {
      el.innerHTML = '<svg width="28" height="28" viewBox="0 0 28 28" style="animation:target-pulse 2.5s ease-in-out infinite;"><circle cx="14" cy="14" r="11" fill="none" stroke="#ff3333" stroke-width="1.5" opacity="0.6"/><circle cx="14" cy="14" r="6" fill="none" stroke="#ff3333" stroke-width="1" opacity="0.4"/><circle cx="14" cy="14" r="2" fill="#ff3333" opacity="0.7"/><line x1="14" y1="0" x2="14" y2="6" stroke="#ff3333" stroke-width="0.5" opacity="0.4"/><line x1="14" y1="22" x2="14" y2="28" stroke="#ff3333" stroke-width="0.5" opacity="0.4"/><line x1="0" y1="14" x2="6" y2="14" stroke="#ff3333" stroke-width="0.5" opacity="0.4"/><line x1="22" y1="14" x2="28" y2="14" stroke="#ff3333" stroke-width="0.5" opacity="0.4"/></svg>';
      el.style.filter = "drop-shadow(0 0 8px rgba(255,50,50,0.35))";
    }
  });
  if (map.getSource("trails")) map.getSource("trails").setData({type: "FeatureCollection", features: []});
  camBearing = -20; camPitch = 58; camZoom = 14.8;
  map.easeTo({ center: SF_CENTER, zoom: 14.8, pitch: 58, bearing: -20, duration: 500 });
};

document.getElementById("bt").onclick = function() {
  trackCam = !trackCam;
  this.className = trackCam ? "on" : "";
  if (!trackCam) {
    // Return to overview
    map.easeTo({ center: SF_CENTER, zoom: 14.8, pitch: 58, bearing: camBearing, duration: 1000 });
  }
};
</script>
