try {

  Cesium.Ion.defaultAccessToken = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJqdGkiOiJlOGY0MjBhYy0zZTFlLTRkNTItOGFmNS1mYmM0ZDE1ZmYxMGYiLCJpZCI6NDQ3NDY2LCJpc3MiOiJodHRwczovL2FwaS5jZXNpdW0uY29tIiwiYXVkIjoidW5kZWZpbmVkX2RlZmF1bHQiLCJpYXQiOjE3ODIxMTI4MjN9.uvbJwgTognrLcj79tpt-kn46yt5S288s2hWgRBIhct8";
  var viewer = new Cesium.Viewer("c", { timeline: false, animation: false });
  document.getElementById("status").textContent = "Cesium " + Cesium.VERSION + " WORKING! Flying to SF...";
  viewer.camera.flyTo({
    destination: Cesium.Cartesian3.fromDegrees(-122.4, 37.79, 3000),
