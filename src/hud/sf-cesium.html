function returnToOverview(){V.trackedEntity=undefined;tracking=false;document.getElementById("track-info").style.display="none";document.getElementById("crosshair").style.display="none";V.camera.flyTo({destination:OV.dest,orientation:OV.orient,duration:1.5})}
var handler=new Cesium.ScreenSpaceEventHandler(V.scene.canvas);
handler.setInputAction(function(click){var p=V.scene.pick(click.position);if(Cesium.defined(p)&&p.id&&p.id.id&&p.id.id.indexOf("drone-")===0){V.trackedEntity=p.id;tracking=true;document.getElementById("track-info").style.display="block";document.getElementById("crosshair").style.display="block";document.getElementById("track-callsign").textContent=p.id.name}else{returnToOverview()}},Cesium.ScreenSpaceEventType.LEFT_CLICK);

function orbitTick(){if(!tracking&&V.clock.shouldAnimate&&!missionDone){orbitAngle+=0.015;V.camera.setView({destination:Cesium.Cartesian3.fromDegrees(-122.401,37.796,1500),orientation:{heading:Cesium.Math.toRadians(orbitAngle),pitch:Cesium.Math.toRadians(-35),roll:0}})}}
function pad2(n){return n<10?"0"+n:""+n}

function updateHUD(){var el=Cesium.JulianDate.secondsDifference(V.clock.currentTime,T0),mn=Math.floor(Math.max(0,el)/60),sc=Math.floor(Math.max(0,el)%60),ts="T+"+pad2(mn)+":"+pad2(sc);
  document.getElementById("top-time").textContent=ts;document.getElementById("clock-display").textContent=ts;document.getElementById("speed-display").textContent=V.clock.multiplier+"X";
  if(el<1){bdaShown.fill(false);if(flashTimers.length)flashTimers.fill(0);missionDone=false}
  /* Recon */
  if(curScn==="recon"){var ac=0;for(var i=0;i<curTotal;i++){var de=V.entities.getById("drone-"+i);if(de&&de.position.getValue(V.clock.currentTime))ac++}document.getElementById("active").textContent=ac;document.getElementById("neutral").textContent="---";var h="";for(var a=0;a<RECON_A.length;a++)h+='<div class="tgt-row"><span>'+RECON_A[a].name+'</span><span class="st" style="color:rgba(80,200,255,0.7)">ORBITING</span></div>';document.getElementById("tgt-list").innerHTML=h;document.getElementById("mission-status").innerHTML='STATUS: <span class="val" style="color:rgba(80,200,255,0.9)">PATROL</span>';updateTrack();orbitTick();Cesium.requestAnimationFrame(updateHUD);return}
  /* Strike/Swarm */
  var ac=0;for(var i=0;i<arrivals.length;i++){var dd=curScn==="strike"?i*1.5:Math.max(0,arrivals[i].arrival-80);if(el>=dd&&el<arrivals[i].arrival+3)ac++}
  var neut=0,h="";for(var t=0;t<curTgts.length;t++){var cnt=0,need=curPer;for(var j=0;j<arrivals.length;j++)if(arrivals[j].ti===t&&el>=arrivals[j].arrival)cnt++;var done=cnt>=need;if(done)neut++;
    if(done&&!bdaShown[t]){bdaShown[t]=true;flashTimers[t]=el}
    var te=V.entities.getById("tgt-"+t);if(te&&te.point){if(flashTimers[t]>0&&el-flashTimers[t]<0.5){te.point.pixelSize=20;te.point.color=Cesium.Color.WHITE.withAlpha(0.95);te.point.outlineColor=Cesium.Color.WHITE.withAlpha(0.5)}else if(done){te.point.pixelSize=8;te.point.color=Cesium.Color.fromCssColorString("rgba(80,255,130,0.9)");te.point.outlineColor=Cesium.Color.fromCssColorString("rgba(80,255,130,0.25)");if(te.label)te.label.fillColor=Cesium.Color.fromCssColorString("rgba(80,255,130,0.9)")}}
    h+='<div class="tgt-row '+(done?"tgt-done":"tgt-pending")+'"><span>'+curTgts[t].name+'</span><span class="st">'+(done?"BDA CONFIRM":cnt+"/"+need+" INBOUND")+'</span></div>'}
  document.getElementById("active").textContent=ac;document.getElementById("neutral").textContent=neut;document.getElementById("tgt-list").innerHTML=h;
  var sEl=document.getElementById("mission-status");if(neut>=curTgts.length)sEl.innerHTML='STATUS: <span class="val" style="color:rgba(80,255,130,0.95)">COMPLETE</span>';else if(ac>0)sEl.innerHTML='STATUS: <span class="val" style="color:rgba(255,200,80,0.9)">ACTIVE</span>';else sEl.innerHTML='STATUS: <span class="val">STAGING</span>';
  if(neut>=curTgts.length&&!missionDone){missionDone=true;tracking=false;V.trackedEntity=undefined;document.getElementById("track-info").style.display="none";document.getElementById("crosshair").style.display="none";V.camera.flyTo({destination:Cesium.Cartesian3.fromDegrees(-122.400,37.798,2200),orientation:{heading:0,pitch:Cesium.Math.toRadians(-50),roll:0},duration:3})}
  updateTrack();orbitTick();Cesium.requestAnimationFrame(updateHUD)}

function updateTrack(){if(!tracking)return;var te=V.trackedEntity;if(te&&te.position){var c=te.position.getValue(V.clock.currentTime);if(c){var cr=Cesium.Cartographic.fromCartesian(c);document.getElementById("track-detail").textContent=Math.round(cr.height)+"m AGL | "+Cesium.Math.toDegrees(cr.latitude).toFixed(4)+"N "+Math.abs(Cesium.Math.toDegrees(cr.longitude)).toFixed(4)+"W"}}}
Cesium.requestAnimationFrame(updateHUD);

document.addEventListener("keydown",function(e){if(e.key===" "){V.clock.shouldAnimate=!V.clock.shouldAnimate;e.preventDefault()}if(e.key>="1"&&e.key<="5")V.clock.multiplier=[1,3,5,10,20][parseInt(e.key)-1];if(e.key==="Escape")returnToOverview();if(e.key==="r"||e.key==="R"){clearScenario();loadScenario(curScn);orbitAngle=15}});
</script></body></html>
