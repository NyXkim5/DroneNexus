/* Path builder */
function buildPath(tgt,di,ti,ppt){
  var dx=tgt.lon-LAUNCH.lon,dy=tgt.lat-LAUNCH.lat,d=Math.sqrt(dx*dx+dy*dy),px=-dy/d,py=dx/d;
  var cA=270+ti*12+di*5,s=(di%2===1)?1:-1,r=Math.ceil(di/2);
  var fL=di>0?s*r*50:0,fB=di>0?r*30:0;
  var f1=(fL/85000)*px,f2=(fL/111000)*py,b1=-(fB/85000)*(dx/d),b2=-(fB/111000)*(dy/d);
  var lO=(di-2.5)*0.0002,aA=(di/ppt)*Math.PI*2,aLn=Math.cos(aA)*0.001,aLt=Math.sin(aA)*0.00077;
  var pts=[],N=24;
  for(var i=0;i<=N;i++){var t=i/N,bias=Math.sin(t*Math.PI)*0.12;
    var ln=(LAUNCH.lon+dx*t)*(1-bias)+MKT.lon*bias,lt=(LAUNCH.lat+dy*t)*(1-bias)+MKT.lat*bias;
    var lB=0,fBl=0,aBl=0;
    if(t<=0.15)lB=1;else if(t<=0.20){var p=(t-0.15)/0.05;lB=1-p;fBl=p}
    else if(t<=0.65)fBl=1;else if(t<=0.70){var p2=(t-0.65)/0.05;fBl=1-p2;aBl=p2}else aBl=1;
    ln+=lB*lO*px+fBl*(f1+b1)+aBl*aLn; lt+=lB*lO*py+fBl*(f2+b2)+aBl*aLt;
    var al=t<0.10?20+(cA-20)*(t/0.10):t>0.88?cA+(tgt.alt-cA)*((t-0.88)/0.12):cA+Math.sin(t*Math.PI*2)*1.5;
    pts.push({lon:ln,lat:lt,alt:al})}
  pts[0]={lon:LAUNCH.lon+lO*0.3,lat:LAUNCH.lat+lO*0.3,alt:20};pts[N]={lon:tgt.lon,lat:tgt.lat,alt:tgt.alt};
  return pts;
}

  for(var ti=0;ti<4;ti++)addTgtMarker(ti,curTgts[ti].name,curTgts[ti].lon,curTgts[ti].lat,curTgts[ti].alt,
    "rgba(255,60,60,0.9)","rgba(255,60,60,0.3)","rgba(255,100,100,0.9)");
  for(var ti=0;ti<4;ti++)for(var di=0;di<6;di++){

      pos.addSample(st,Cesium.Cartesian3.fromDegrees(pts[si].lon,pts[si].lat,pts[si].alt))}
    pos.setInterpolationOptions({interpolationDegree:3,interpolationAlgorithm:Cesium.HermitePolynomialApproximation});
    addDrone(idx,lbl,pos,Cesium.JulianDate.addSeconds(T0,delay,new Cesium.JulianDate()),ICONS[IK[ti]],CC[ti],25)}
  for(var ti=0;ti<4;ti++)for(var di=1;di<6;di++){var lI=ti*6,wI=ti*6+di;
    (function(lI,wI,ti,di){V.entities.add({id:"fline-"+ti+"-"+di,polyline:{positions:new Cesium.CallbackProperty(function(){
      var now=V.clock.currentTime,el=Cesium.JulianDate.secondsDifference(now,T0),ld=lI*1.5;
      var dur=arrivals[lI]?arrivals[lI].arrival-ld:70,t=dur>0?(el-ld)/dur:0;
      if(t<0.20||t>0.65)return[Cesium.Cartesian3.ZERO,Cesium.Cartesian3.ZERO];
      var le=V.entities.getById("drone-"+lI),we=V.entities.getById("drone-"+wI);
      if(!le||!we)return[Cesium.Cartesian3.ZERO,Cesium.Cartesian3.ZERO];
      var p1=le.position.getValue(now),p2=we.position.getValue(now);
      return(p1&&p2)?[p1,p2]:[Cesium.Cartesian3.ZERO,Cesium.Cartesian3.ZERO]},false),
      width:0.5,material:CC[ti].withAlpha(0.08),disableDepthTestDistance:Number.POSITIVE_INFINITY}})})(lI,wI,ti,di)}
}

function loadRecon(){
  curTgts=[];curTotal=8;curPer=0;bdaShown=[];flashTimers=[];addBoundaryRing();
  var cy=Cesium.Color.fromCssColorString("rgba(80,200,255,0.7)");
  for(var ai=0;ai<4;ai++){var a=RECON_A[ai];
    V.entities.add({id:"tgt-"+ai,position:Cesium.Cartesian3.fromDegrees(a.lon,a.lat,a.alt+5),
      point:{pixelSize:6,color:Cesium.Color.fromCssColorString("rgba(80,200,255,0.5)"),
        outlineColor:Cesium.Color.fromCssColorString("rgba(80,200,255,0.15)"),outlineWidth:4,
        disableDepthTestDistance:Number.POSITIVE_INFINITY},
      label:{text:a.name+" AO",font:"bold 8px monospace",fillColor:Cesium.Color.fromCssColorString("rgba(80,200,255,0.6)"),
        showBackground:true,backgroundColor:new Cesium.Color(0,0.02,0.05,0.55),backgroundPadding:new Cesium.Cartesian2(4,2),
        pixelOffset:new Cesium.Cartesian2(0,-14),scale:0.7,disableDepthTestDistance:Number.POSITIVE_INFINITY}});
    for(var di=0;di<2;di++){var idx=ai*2+di,lbl="SCOUT-"+String(idx+1).padStart(2,"0");
      var pos=new Cesium.SampledPositionProperty(),ph=di*Math.PI;
      for(var si=0;si<=60;si++){var t=si/60,ang=t*Math.PI*2+ph;
        pos.addSample(Cesium.JulianDate.addSeconds(T0,t*300,new Cesium.JulianDate()),
          Cesium.Cartesian3.fromDegrees(a.lon+Math.cos(ang)*a.r,a.lat+Math.sin(ang)*a.r,a.alt+Math.sin(ang*3)*5))}
      pos.setInterpolationOptions({interpolationDegree:3,interpolationAlgorithm:Cesium.HermitePolynomialApproximation});
      addDrone(idx,lbl,pos,null,ICONS.cyan,cy,40)}}
}

function loadSwarm(){
  curTgts=[SWARM_T];curTotal=40;curPer=40;bdaShown=[false];flashTimers=[0];
  addTgtMarker(0,SWARM_T.name,SWARM_T.lon,SWARM_T.lat,SWARM_T.alt,"rgba(255,60,60,0.95)","rgba(255,60,60,0.4)","rgba(255,100,100,0.95)");
  addOpsArea(SWARM_T.lon,SWARM_T.lat,"red");addBoundaryRing();
  var rc=Cesium.Color.fromCssColorString("rgba(255,70,70,0.7)");
  for(var oi=0;oi<4;oi++){var orig=SWARM_O[oi];for(var di=0;di<10;di++){
    var idx=oi*10+di,lbl="BOGEY-"+String(idx+1).padStart(2,"0"),delay=di*0.8+oi*2;
    var dx=SWARM_T.lon-orig.lon,dy=SWARM_T.lat-orig.lat,d=Math.sqrt(dx*dx+dy*dy),px=-dy/d,py=dx/d,sp=(di-4.5)*0.0006;
    var pos=new Cesium.SampledPositionProperty(),dur=60+Math.random()*20;
    for(var si=0;si<=20;si++){var t=si/20;
      pos.addSample(Cesium.JulianDate.addSeconds(T0,delay+t*dur,new Cesium.JulianDate()),
        Cesium.Cartesian3.fromDegrees(orig.lon+dx*t+sp*px*(1-t),orig.lat+dy*t+sp*py*(1-t),180+Math.random()*60+t*SWARM_T.alt*0.4))}
    pos.setInterpolationOptions({interpolationDegree:3,interpolationAlgorithm:Cesium.HermitePolynomialApproximation});
    arrivals.push({ti:0,arrival:delay+dur,label:lbl});
    addDrone(idx,lbl,pos,Cesium.JulianDate.addSeconds(T0,delay,new Cesium.JulianDate()),ICONS.red,rc,15)}}
}

function loadScenario(name){curScn=name;var ss=name==="recon"?300:240;
  TE=Cesium.JulianDate.addSeconds(T0,ss,new Cesium.JulianDate());V.clock.stopTime=TE.clone();
  if(name==="strike")loadStrike();else if(name==="recon")loadRecon();else loadSwarm();
  document.getElementById("scenario-label").textContent=name==="strike"?"COORDINATED STRIKE":name==="recon"?"ISR PATROL":"SATURATION";
  document.getElementById("bft-count").textContent=curTotal;
  document.getElementById("tgt-count").textContent=curTgts.length||RECON_A.length;
  V.camera.setView({destination:OV.dest,orientation:OV.orient});
}

/* Cinematic intro */
var cinRunning=false;
function showCinText(t){var e=document.getElementById("cin-text");e.className="";e.textContent=t;void e.offsetWidth;e.className="visible"}
function hideCinText(){document.getElementById("cin-text").className=""}

function runCinematic(){
  if(cinRunning)return;cinRunning=true;clearScenario();loadScenario(curScn);V.clock.shouldAnimate=false;
  showCinText("OVERWATCH C2");
  V.camera.flyTo({destination:Cesium.Cartesian3.fromDegrees(-122.38,37.78,50000),
    orientation:{heading:0,pitch:Cesium.Math.toRadians(-90),roll:0},duration:0.01,
    complete:function(){
      setTimeout(function(){
        hideCinText();setTimeout(function(){showCinText("SAN FRANCISCO THEATER")},400);
        V.camera.flyTo({destination:Cesium.Cartesian3.fromDegrees(-122.399,37.794,2000),
          orientation:{heading:Cesium.Math.toRadians(10),pitch:Cesium.Math.toRadians(-60),roll:0},duration:3,
          complete:function(){
            var ml=curScn==="strike"?"MISSION: COORDINATED STRIKE":curScn==="recon"?"MISSION: ISR PATROL":"MISSION: SATURATION ATTACK";
            hideCinText();setTimeout(function(){showCinText(ml)},400);
            V.camera.flyTo({destination:Cesium.Cartesian3.fromDegrees(-122.397,37.791,400),
              orientation:{heading:Cesium.Math.toRadians(45),pitch:Cesium.Math.toRadians(-30),roll:0},duration:2,
              complete:function(){
                hideCinText();setTimeout(function(){showCinText(curTotal+" UAS ASSETS STAGED")},400);
                V.camera.flyTo({destination:Cesium.Cartesian3.fromDegrees(LAUNCH.lon,LAUNCH.lat,100),
                  orientation:{heading:Cesium.Math.toRadians(30),pitch:Cesium.Math.toRadians(-25),roll:0},duration:1,
                  complete:function(){
                    hideCinText();cinRunning=false;V.clock.shouldAnimate=true;
                    setTimeout(function(){var f=V.entities.getById("drone-0");if(f){V.trackedEntity=f;tracking=true;
                      document.getElementById("track-info").style.display="block";document.getElementById("crosshair").style.display="block";
                      document.getElementById("track-callsign").textContent=f.name;
                      setTimeout(function(){returnToOverview()},10000)}},5000);
                  }});
              }});
          }});
      },2000);
    }});
}

/* Tracking and orbit */
var tracking=false,orbitAngle=15;
function returnToOverview(){V.trackedEntity=undefined;tracking=false;
  document.getElementById("track-info").style.display="none";document.getElementById("crosshair").style.display="none";
  V.camera.flyTo({destination:OV.dest,orientation:OV.orient,duration:1.5})}

var handler=new Cesium.ScreenSpaceEventHandler(V.scene.canvas);
handler.setInputAction(function(click){var p=V.scene.pick(click.position);
  if(Cesium.defined(p)&&p.id&&p.id.id&&p.id.id.indexOf("drone-")===0){
    V.trackedEntity=p.id;tracking=true;document.getElementById("track-info").style.display="block";
    document.getElementById("crosshair").style.display="block";document.getElementById("track-callsign").textContent=p.id.name}
  else{returnToOverview()}},Cesium.ScreenSpaceEventType.LEFT_CLICK);

function orbitTick(){if(!tracking&&V.clock.shouldAnimate&&!missionDone){orbitAngle+=0.015;
  var el=Cesium.JulianDate.secondsDifference(V.clock.currentTime,T0);
  var pitchDeg=-35+10*Math.sin(el*Math.PI*2/30); /* -25 to -45 over 30s period */
  var altM=1500+300*Math.sin(el*Math.PI*2/45);   /* 1200 to 1800 over 45s period */
  V.camera.setView({destination:Cesium.Cartesian3.fromDegrees(-122.401,37.796,altM),
    orientation:{heading:Cesium.Math.toRadians(orbitAngle),pitch:Cesium.Math.toRadians(pitchDeg),roll:0}})}}

/* Engagement pulse ring */
var engRingIdx=0;
function spawnEngagementRing(tgt,arrTime){
  var tPos=Cesium.Cartesian3.fromDegrees(tgt.lon,tgt.lat,tgt.alt);
  var ring=V.entities.add({id:"ering-"+(engRingIdx++),position:tPos,ellipse:{
    semiMajorAxis:new Cesium.CallbackProperty(function(){
      var el=Cesium.JulianDate.secondsDifference(V.clock.currentTime,T0),t=(el-arrTime)/2;
      return 50+Math.min(1,Math.max(0,t))*450},false),
    semiMinorAxis:new Cesium.CallbackProperty(function(){
      var el=Cesium.JulianDate.secondsDifference(V.clock.currentTime,T0),t=(el-arrTime)/2;
      return 50+Math.min(1,Math.max(0,t))*450},false),
    height:tgt.alt,material:Cesium.Color.fromCssColorString("rgba(80,255,130,0.15)"),
    outline:true,outlineColor:Cesium.Color.fromCssColorString("rgba(80,255,130,0.4)"),outlineWidth:1}});
  setTimeout(function(){V.entities.remove(ring)},3000);
}

/* Threat detection overlay (strike scenario only) */
function spawnThreat(lon,lat,alt,id,detectTime){
  var tId="threat-"+id;threatIds.push(tId);
  var threatPos=Cesium.Cartesian3.fromDegrees(lon,lat,alt);
  V.entities.add({id:tId,
    position:threatPos,
    billboard:{image:THREAT_ICON,width:16,height:16,
      color:new Cesium.CallbackProperty(function(){
        var el=Cesium.JulianDate.secondsDifference(V.clock.currentTime,T0);
        if(el<detectTime)return Cesium.Color.TRANSPARENT;
        if(el<detectTime+5)return Cesium.Color.RED;
        if(el<detectTime+8)return Cesium.Color.ORANGE;
        if(el<detectTime+10)return new Cesium.Color(0.3,1.0,0.3,0.9);
        return new Cesium.Color(0.5,0.5,0.5,0.35);
      },false),
      disableDepthTestDistance:Number.POSITIVE_INFINITY,
      eyeOffset:new Cesium.Cartesian3(0,0,-60)},
    label:{text:new Cesium.CallbackProperty(function(){
        var el=Cesium.JulianDate.secondsDifference(V.clock.currentTime,T0);
        if(el<detectTime)return "";
        if(el<detectTime+5)return "HOSTILE-"+String(id).padStart(3,"0");
        if(el<detectTime+8)return "UAS SWARM - HOSTILE";
        if(el<detectTime+10)return "ENGAGEMENT AUTH";
        return "NEUTRALIZED";
      },false),
      font:"bold 7px monospace",
      fillColor:new Cesium.CallbackProperty(function(){
        var el=Cesium.JulianDate.secondsDifference(V.clock.currentTime,T0);
        if(el<detectTime)return Cesium.Color.TRANSPARENT;
        if(el<detectTime+5)return Cesium.Color.fromCssColorString("rgba(255,80,80,0.95)");
        if(el<detectTime+8)return Cesium.Color.fromCssColorString("rgba(255,180,60,0.95)");
        if(el<detectTime+10)return Cesium.Color.fromCssColorString("rgba(80,255,130,0.95)");
        return Cesium.Color.fromCssColorString("rgba(160,160,160,0.5)");
      },false),
      showBackground:true,
      backgroundColor:new Cesium.CallbackProperty(function(){
        var el=Cesium.JulianDate.secondsDifference(V.clock.currentTime,T0);
        if(el<detectTime)return Cesium.Color.TRANSPARENT;
        return new Cesium.Color(0.02,0,0,0.75);
      },false),
      backgroundPadding:new Cesium.Cartesian2(4,2),
      pixelOffset:new Cesium.Cartesian2(0,-16),scale:0.75,
      disableDepthTestDistance:Number.POSITIVE_INFINITY}
  });
  /* Engagement line from nearest drone to threat */
  var engId="engline-"+id;threatIds.push(engId);
  V.entities.add({id:engId,polyline:{
    positions:new Cesium.CallbackProperty(function(){
      var el=Cesium.JulianDate.secondsDifference(V.clock.currentTime,T0);
      if(el<detectTime+8||el>=detectTime+10)return[Cesium.Cartesian3.ZERO,Cesium.Cartesian3.ZERO];
      var best=null,bestD=Infinity,now=V.clock.currentTime;
      for(var i=0;i<curTotal;i++){var de=V.entities.getById("drone-"+i);
        if(!de||!de.position)continue;var dp=de.position.getValue(now);if(!dp)continue;
        var dd=Cesium.Cartesian3.distance(dp,threatPos);if(dd<bestD){bestD=dd;best=dp}}
      return best?[best,threatPos]:[Cesium.Cartesian3.ZERO,Cesium.Cartesian3.ZERO];
    },false),
    width:1.5,
    material:Cesium.Color.fromCssColorString("rgba(80,255,130,0.6)"),
    disableDepthTestDistance:Number.POSITIVE_INFINITY}});
}

function spawnThreats(){
  if(threatsSpawned||curScn!=="strike")return;
  threatsSpawned=true;var tid=1;
  for(var ti=0;ti<curTgts.length;ti++){
    var tgt=curTgts[ti],offsets=[
      {dlon:0.0012,dlat:0.0008},{dlon:-0.0010,dlat:0.0006},
      {dlon:0.0005,dlat:-0.0010},{dlon:-0.0008,dlat:-0.0005}];
    var baseDetect=30+ti*3;
    for(var oi=0;oi<offsets.length;oi++){
      spawnThreat(tgt.lon+offsets[oi].dlon,tgt.lat+offsets[oi].dlat,tgt.alt+20+oi*10,
        tid,baseDetect+oi*2);tid++}}
}

function countActiveThreats(){
  var cnt=0;
  for(var i=0;i<threatIds.length;i++){
    var eid=threatIds[i];if(eid.indexOf("engline-")===0)continue;
    var te=V.entities.getById(eid);if(!te||!te.billboard)continue;
    var col=te.billboard.color.getValue(V.clock.currentTime);
    if(col&&col.alpha>0.1&&!(col.red<0.6&&col.green<0.6&&col.blue<0.6))cnt++}
  return cnt;
}

/* Timer: T+01:23.5 */
function fmtTime(el){var s=Math.max(0,el),mn=Math.floor(s/60),sc=Math.floor(s%60),ds=Math.floor((s%1)*10);
  return "T+"+String(mn).padStart(2,"0")+":"+String(sc).padStart(2,"0")+"."+ds}

/* Replay event log */
var loggedEvents=new Set();
function fmtLogTime(el){var s=Math.max(0,el),mn=Math.floor(s/60),sc=Math.floor(s%60);
  return "T+"+String(mn).padStart(2,"0")+":"+String(sc).padStart(2,"0")}
function logEvent(key,text){
  if(loggedEvents.has(key))return;loggedEvents.add(key);
  var log=document.getElementById("event-log"),div=document.createElement("div");
  div.textContent=text;log.appendChild(div);log.scrollTop=log.scrollHeight;
}
function clearEventLog(){document.getElementById("event-log").innerHTML="";loggedEvents.clear()}

/* Replay bar seek */
document.getElementById("replay-bar").addEventListener("click",function(e){
  var rect=this.getBoundingClientRect();
  var pct=(e.clientX-rect.left)/rect.width;
  var totalDur=Cesium.JulianDate.secondsDifference(TE,T0);
  var newTime=Cesium.JulianDate.addSeconds(T0,pct*totalDur,new Cesium.JulianDate());
  V.clock.currentTime=newTime;
});

/* Track info with target and ETA */
function updateTrack(){if(!tracking)return;var te=V.trackedEntity;if(!te||!te.position)return;
  var now=V.clock.currentTime,c=te.position.getValue(now);if(!c)return;
  var cr=Cesium.Cartographic.fromCartesian(c);
  document.getElementById("track-detail").textContent=Math.round(cr.height)+"m AGL | "+
    Cesium.Math.toDegrees(cr.latitude).toFixed(4)+"N "+Math.abs(Cesium.Math.toDegrees(cr.longitude)).toFixed(4)+"W";
  var extra="";
  if(te.id&&te.id.indexOf("drone-")===0){var dIdx=parseInt(te.id.replace("drone-",""));var aI=arrivals[dIdx];
    if(aI&&curTgts[aI.ti]){var el=Cesium.JulianDate.secondsDifference(now,T0),eta=aI.arrival-el;
      extra="TGT: "+curTgts[aI.ti].name+(eta>0?" | ETA "+eta.toFixed(1)+"s":" | ON STATION")}}
  document.getElementById("track-extra").textContent=extra;
}

/* HUD update loop */
function updateHUD(){
  var el=Cesium.JulianDate.secondsDifference(V.clock.currentTime,T0),ts=fmtTime(el);
  document.getElementById("top-time").textContent=ts;document.getElementById("clock-display").textContent=ts;
  document.getElementById("speed-display").textContent=V.clock.multiplier+"X";
  var totalDuration=Cesium.JulianDate.secondsDifference(TE,T0);
  var rpct=Math.min(100,Math.max(0,(el/totalDuration)*100));
  document.getElementById("replay-progress").style.width=rpct+"%";
  if(el<1){bdaShown.fill(false);if(flashTimers.length)flashTimers.fill(0);missionDone=false;clearEventLog();
    if(threatsSpawned){for(var ti2=0;ti2<threatIds.length;ti2++){var te2=V.entities.getById(threatIds[ti2]);if(te2)V.entities.remove(te2)}
      threatIds=[];threatsSpawned=false;threatCount=0}}
  if(curScn==="strike"&&el>=30&&!threatsSpawned)spawnThreats();
  if(curScn==="strike"&&threatsSpawned){threatCount=countActiveThreats();document.getElementById("threat-count").textContent=threatCount}
  else{document.getElementById("threat-count").textContent="0"}
  if(curScn==="recon"){var ac=0;
    for(var i=0;i<curTotal;i++){var de=V.entities.getById("drone-"+i);if(de&&de.position.getValue(V.clock.currentTime))ac++;
      if(de&&el>=0)logEvent("recon-deploy-"+i,fmtLogTime(0)+" SCOUT-"+String(i+1).padStart(2,"0")+" DEPLOYED")}
    if(el>=5)for(var ri=0;ri<RECON_A.length;ri++)logEvent("recon-orbit-"+ri,fmtLogTime(5)+" "+RECON_A[ri].name+" AO: ON STATION");
    document.getElementById("active").textContent=ac;document.getElementById("neutral").textContent="---";
    var h="";for(var a=0;a<RECON_A.length;a++)h+='<div class="tgt-row"><span>'+RECON_A[a].name+'</span><span class="st" style="color:rgba(80,200,255,0.7)">ORBITING</span></div>';
    document.getElementById("tgt-list").innerHTML=h;
    document.getElementById("mission-status").innerHTML='STATUS: <span class="val" style="color:rgba(80,200,255,0.9)">PATROL</span>';
    updateTrack();orbitTick();requestAnimationFrame(updateHUD);return}
  var ac=0;for(var i=0;i<arrivals.length;i++){var dd=curScn==="strike"?i*1.5:Math.max(0,arrivals[i].arrival-80);
    if(el>=dd&&el<arrivals[i].arrival+3)ac++;
    if(el>=dd)logEvent("deploy-"+i,fmtLogTime(dd)+" "+arrivals[i].label+" DEPLOYED");
    if(el>=arrivals[i].arrival)logEvent("station-"+i,fmtLogTime(arrivals[i].arrival)+" "+arrivals[i].label+" ON STATION")}
  var neut=0,h="";
  for(var t=0;t<curTgts.length;t++){var cnt=0,need=curPer;
    for(var j=0;j<arrivals.length;j++)if(arrivals[j].ti===t&&el>=arrivals[j].arrival)cnt++;
    var done=cnt>=need;if(done)neut++;if(done&&!bdaShown[t]){bdaShown[t]=true;flashTimers[t]=el;spawnEngagementRing(curTgts[t],el);
      logEvent("bda-"+t,fmtLogTime(el)+" "+curTgts[t].name+": BDA CONFIRM")}
    var te=V.entities.getById("tgt-"+t);
    if(te&&te.point){if(flashTimers[t]>0&&el-flashTimers[t]<0.5){te.point.pixelSize=20;te.point.color=Cesium.Color.WHITE.withAlpha(0.95);
      te.point.outlineColor=Cesium.Color.WHITE.withAlpha(0.5)}else if(done){te.point.pixelSize=8;
      te.point.color=Cesium.Color.fromCssColorString("rgba(80,255,130,0.9)");te.point.outlineColor=Cesium.Color.fromCssColorString("rgba(80,255,130,0.25)");
      if(te.label)te.label.fillColor=Cesium.Color.fromCssColorString("rgba(80,255,130,0.9)")}}
    h+='<div class="tgt-row '+(done?"tgt-done":"tgt-pending")+'"><span>'+curTgts[t].name+'</span><span class="st">'+(done?"BDA CONFIRM":cnt+"/"+need+" INBOUND")+'</span></div>'}
  document.getElementById("active").textContent=ac;document.getElementById("neutral").textContent=neut;
  document.getElementById("tgt-list").innerHTML=h;
  var sEl=document.getElementById("mission-status");
  if(neut>=curTgts.length)sEl.innerHTML='STATUS: <span class="val" style="color:rgba(80,255,130,0.95)">MISSION COMPLETE</span>';
  else if(ac>0)sEl.innerHTML='STATUS: <span class="val" style="color:rgba(255,200,80,0.9)">ACTIVE</span>';
  else sEl.innerHTML='STATUS: <span class="val">STAGING</span>';
  if(neut>=curTgts.length&&!missionDone){missionDone=true;logEvent("complete",fmtLogTime(el)+" MISSION COMPLETE");
    tracking=false;V.trackedEntity=undefined;
    document.getElementById("track-info").style.display="none";document.getElementById("crosshair").style.display="none";
    V.camera.flyTo({destination:Cesium.Cartesian3.fromDegrees(-122.400,37.796,3000),
      orientation:{heading:0,pitch:Cesium.Math.toRadians(-80),roll:0},duration:3});
    sEl.innerHTML='STATUS: <span class="val" style="color:rgba(80,255,130,0.95)">MISSION COMPLETE</span>'}
  updateTrack();orbitTick();requestAnimationFrame(updateHUD);
}

/* Init */
loadScenario("strike");
requestAnimationFrame(updateHUD);
setTimeout(runCinematic,300);

/* Keyboard hints auto-hide after 5s */
var keysVisible=true;
setTimeout(function(){document.getElementById("keys").style.opacity="0";keysVisible=false},5000);

document.getElementById("scenario").addEventListener("change",function(){clearScenario();loadScenario(this.value)});
document.addEventListener("keydown",function(e){
  if(e.key===" "){V.clock.shouldAnimate=!V.clock.shouldAnimate;e.preventDefault()}
  if(e.key>="1"&&e.key<="5")V.clock.multiplier=[1,3,5,10,20][parseInt(e.key)-1];
  if(e.key==="Escape")returnToOverview();
  if(e.key==="r"||e.key==="R"){clearScenario();loadScenario(curScn);orbitAngle=15}
  if(e.key==="d"||e.key==="D"){clearScenario();loadScenario(curScn);runCinematic()}
  if(e.key==="h"||e.key==="H"){keysVisible=!keysVisible;document.getElementById("keys").style.opacity=keysVisible?"1":"0"}
  if(e.key==="p"||e.key==="P"){document.body.classList.toggle("screenshot")}
});
