<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>OVERWATCH C2 - SF Drone Swarm</title>
<script src="cesium/Cesium.js"></script>
<link href="cesium/Widgets/widgets.css" rel="stylesheet">
<script>window.CESIUM_BASE_URL = "cesium/";</script>
<style>
html,body,#c{margin:0;width:100%;height:100%;overflow:hidden}
#hud{position:absolute;top:0;left:0;right:0;z-index:10;pointer-events:none;font-family:'JetBrains Mono',monospace}
#top-bar{padding:6px 14px;font-size:8px;color:rgba(150,200,255,0.7);letter-spacing:2.5px;background:rgba(0,0,0,0.5);border-bottom:1px solid rgba(68,170,255,0.15);text-transform:uppercase}
#tgt-panel{position:absolute;top:34px;right:10px;font-size:8px;color:rgba(150,200,255,0.6);letter-spacing:1.5px;background:rgba(0,0,0,0.5);padding:6px 10px;border:1px solid rgba(68,170,255,0.1);line-height:1.8}
.tgt-pending{color:rgba(255,80,80,0.8)}.tgt-done{color:rgba(80,255,120,0.8)}
#bottom-bar{position:absolute;bottom:32px;left:0;right:0;padding:4px 14px;font-size:7px;color:rgba(150,200,255,0.4);letter-spacing:2px;background:rgba(0,0,0,0.4);border-top:1px solid rgba(68,170,255,0.08);display:flex;justify-content:space-between;text-transform:uppercase}
#keys{position:absolute;bottom:60px;left:10px;font-size:7px;color:rgba(255,255,255,0.2);letter-spacing:1px;line-height:1.8}
</style>
</head>
<body>
<div id="c"></div>
<div id="hud">
  <div id="top-bar">OVERWATCH C2 | BFT: 24 ASSETS | ACTIVE: <span id="active">0</span> | TARGETS: 4 | NEUTRALIZED: <span id="neutral">0</span></div>
  <div id="tgt-panel"></div>
  <div id="bottom-bar"><span>37.7897N 122.3972W</span><span id="speed-display">1X</span><span>UNCLASSIFIED // FOUO</span></div>
  <div id="keys">SPACE: pause | 1-5: speed | R: reset | click drone: track</div>
</div>

<script>
Cesium.Ion.defaultAccessToken = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJqdGkiOiJlOGY0MjBhYy0zZTFlLTRkNTItOGFmNS1mYmM0ZDE1ZmYxMGYiLCJpZCI6NDQ3NDY2LCJpc3MiOiJodHRwczovL2FwaS5jZXNpdW0uY29tIiwiYXVkIjoidW5kZWZpbmVkX2RlZmF1bHQiLCJpYXQiOjE3ODIxMTI4MjN9.uvbJwgTognrLcj79tpt-kn46yt5S288s2hWgRBIhct8";

var viewer = new Cesium.Viewer("c", {
  timeline: true, animation: true, shouldAnimate: true,
  homeButton: false, sceneModePicker: false, baseLayerPicker: false,
  navigationHelpButton: false, geocoder: false, fullscreenButton: false
});

// Try Cesium World Terrain for 3D terrain
Cesium.createWorldTerrainAsync().then(function(terrain) {
  viewer.scene.terrainProvider = terrain;
});

// Try Cesium OSM Buildings for 3D buildings
Cesium.createOsmBuildingsAsync().then(function(tileset) {
  viewer.scene.primitives.add(tileset);
}).catch(function(e) { console.warn("OSM buildings failed:", e); });

var LAUNCH = { lon: -122.3948, lat: 37.7878 };
var TARGETS = [
  { name: "EMBARCADERO", lon: -122.3936, lat: 37.7956, alt: 80 },
  { name: "PIER 39",     lon: -122.4093, lat: 37.8087, alt: 40 },
  { name: "SALESFORCE",  lon: -122.3972, lat: 37.7897, alt: 300 },
  { name: "GHIRARDELLI", lon: -122.4194, lat: 37.8080, alt: 80 }
];
var TOTAL = 24, PER_TGT = 6;
var TRAIL_COLORS = [Cesium.Color.CYAN, Cesium.Color.ORANGE, Cesium.Color.HOTPINK, Cesium.Color.LIME];

var startTime = Cesium.JulianDate.fromIso8601("2026-06-22T00:00:00Z");
var stopTime = Cesium.JulianDate.addSeconds(startTime, 240, new Cesium.JulianDate());

viewer.clock.startTime = startTime.clone();
viewer.clock.stopTime = stopTime.clone();
viewer.clock.currentTime = startTime.clone();
viewer.clock.clockRange = Cesium.ClockRange.LOOP_STOP;
viewer.clock.multiplier = 1;
viewer.timeline.zoomTo(startTime, stopTime);

// Generate waypoints for a drone
function buildPath(tgt, droneIdx) {
  var pts = [];
  var dx = tgt.lon - LAUNCH.lon, dy = tgt.lat - LAUNCH.lat;
  var dist = Math.sqrt(dx * dx + dy * dy);
  var perpX = -dy / dist, perpY = dx / dist;
  var offset = (droneIdx - 2.5) * 0.0002;
  var cruiseAlt = 35 + Math.random() * 30;
  var steps = 8 + Math.floor(Math.random() * 4);

  for (var i = 0; i <= steps; i++) {
    var t = i / steps;
    var jx = (Math.random() - 0.5) * 0.0006;
    var jy = (Math.random() - 0.5) * 0.0006;
    // Curve toward Market St corridor
    var bias = Math.sin(t * Math.PI) * 0.25;
    var marketLon = -122.400, marketLat = 37.790;
    var bLon = LAUNCH.lon + dx * t, bLat = LAUNCH.lat + dy * t;
    var lon = bLon * (1 - bias) + marketLon * bias + jx + offset * perpX;
    var lat = bLat * (1 - bias) + marketLat * bias + jy + offset * perpY;

    var alt;
    if (t < 0.12) alt = 5 + cruiseAlt * (t / 0.12);
    else if (t > 0.88) alt = cruiseAlt + (tgt.alt - cruiseAlt) * ((t - 0.88) / 0.12);
    else alt = cruiseAlt + (Math.random() - 0.5) * 5;

    pts.push({ lon: lon, lat: lat, alt: alt });
  }
  pts[0] = { lon: LAUNCH.lon + offset * 0.3, lat: LAUNCH.lat + offset * 0.3, alt: 5 };
  pts[pts.length - 1] = { lon: tgt.lon, lat: tgt.lat, alt: tgt.alt };
  return pts;
}

// Create all 24 drones
var droneArrivals = [];

for (var ti = 0; ti < TARGETS.length; ti++) {
  var tgt = TARGETS[ti];

  // Target marker
  viewer.entities.add({
    position: Cesium.Cartesian3.fromDegrees(tgt.lon, tgt.lat, tgt.alt + 5),
    point: { pixelSize: 10, color: Cesium.Color.RED.withAlpha(0.85), outlineColor: Cesium.Color.WHITE, outlineWidth: 1 },
    label: {
      text: tgt.name, font: "10pt monospace",
      fillColor: Cesium.Color.fromAlpha(Cesium.Color.RED, 0.8),
      showBackground: true, backgroundColor: new Cesium.Color(0, 0, 0, 0.6),
      pixelOffset: new Cesium.Cartesian2(0, -20), scale: 0.7
    }
  });

  for (var di = 0; di < PER_TGT; di++) {
    var idx = ti * PER_TGT + di;
    var label = "D-" + String(idx + 1).padStart(2, "0");
    var launchDelay = idx * 2;
    var pts = buildPath(tgt, di);
    var flightDist = 0;
    for (var pi = 1; pi < pts.length; pi++) {
      var ddx = (pts[pi].lon - pts[pi-1].lon) * 85000;
      var ddy = (pts[pi].lat - pts[pi-1].lat) * 111000;
      flightDist += Math.sqrt(ddx * ddx + ddy * ddy);
    }
    var flightDur = Math.max(50, Math.min(110, flightDist / 14));
    var totalDur = launchDelay + flightDur;
    droneArrivals.push({ ti: ti, arrival: totalDur });

    // Build position samples
    var positionProperty = new Cesium.SampledPositionProperty();
    for (var si = 0; si < pts.length; si++) {
      var sampleTime = Cesium.JulianDate.addSeconds(startTime, launchDelay + (si / (pts.length - 1)) * flightDur, new Cesium.JulianDate());
      positionProperty.addSample(sampleTime, Cesium.Cartesian3.fromDegrees(pts[si].lon, pts[si].lat, pts[si].alt));
    }
    positionProperty.setInterpolationOptions({
      interpolationDegree: 3,
      interpolationAlgorithm: Cesium.HermitePolynomialApproximation
    });

    var droneStart = Cesium.JulianDate.addSeconds(startTime, launchDelay, new Cesium.JulianDate());
    var droneEnd = Cesium.JulianDate.addSeconds(startTime, totalDur, new Cesium.JulianDate());

    viewer.entities.add({
      id: "drone-" + idx,
      name: label,
      availability: new Cesium.TimeIntervalCollection([new Cesium.TimeInterval({ start: droneStart, stop: stopTime })]),
      position: positionProperty,
      orientation: new Cesium.VelocityOrientationProperty(positionProperty),
      model: {
        uri: "models/CesiumDrone.glb",
        minimumPixelSize: 48,
        scale: 4.0,
        color: TRAIL_COLORS[ti].withAlpha(0.9),
        colorBlendMode: Cesium.ColorBlendMode.MIX,
        colorBlendAmount: 0.3
      },
      path: {
        resolution: 1,
        material: new Cesium.PolylineGlowMaterialProperty({
          glowPower: 0.15,
          color: TRAIL_COLORS[ti].withAlpha(0.5)
        }),
        width: 2.5,
        leadTime: 0,
        trailTime: 25
      },
      label: {
        text: label,
        font: "9pt monospace",
        fillColor: Cesium.Color.WHITE.withAlpha(0.7),
        showBackground: true,
        backgroundColor: new Cesium.Color(0, 0, 0, 0.5),
        pixelOffset: new Cesium.Cartesian2(0, -28),
        scale: 0.55,
        distanceDisplayCondition: new Cesium.DistanceDisplayCondition(0, 3000)
      }
    });
  }
}

// Launch marker
viewer.entities.add({
  position: Cesium.Cartesian3.fromDegrees(LAUNCH.lon, LAUNCH.lat, 3),
  point: { pixelSize: 8, color: Cesium.Color.WHITE.withAlpha(0.8) },
  label: {
    text: "LAUNCH / VAN-01", font: "8pt monospace",
    fillColor: Cesium.Color.WHITE.withAlpha(0.6),
    showBackground: true, backgroundColor: new Cesium.Color(0, 0, 0, 0.5),
    pixelOffset: new Cesium.Cartesian2(0, -16), scale: 0.5
  }
});

// Fly to SF
viewer.camera.flyTo({
  destination: Cesium.Cartesian3.fromDegrees(-122.400, 37.793, 600),
  orientation: { heading: Cesium.Math.toRadians(20), pitch: Cesium.Math.toRadians(-25), roll: 0 },
  duration: 3
});

// HUD update
function updateHUD() {
  var elapsed = Cesium.JulianDate.secondsDifference(viewer.clock.currentTime, startTime);
  var active = 0, neutralized = 0;
  for (var i = 0; i < TOTAL; i++) {
    var launch = i * 2;
    if (elapsed >= launch && elapsed < droneArrivals[i].arrival + 3) active++;
  }
  var tgtHtml = "";
  for (var t = 0; t < TARGETS.length; t++) {
    var arrived = droneArrivals.filter(function(d) { return d.ti === t && elapsed >= d.arrival; }).length;
    var done = arrived >= PER_TGT;
    if (done) neutralized++;
    tgtHtml += '<div class="' + (done ? "tgt-done" : "tgt-pending") + '">' +
      TARGETS[t].name + " [" + (done ? "NEUTRALIZED" : arrived + "/" + PER_TGT) + "]</div>";
  }
  document.getElementById("active").textContent = active;
  document.getElementById("neutral").textContent = neutralized;
  document.getElementById("tgt-panel").innerHTML = tgtHtml;
  document.getElementById("speed-display").textContent = viewer.clock.multiplier + "X";
  Cesium.requestAnimationFrame(updateHUD);
}
Cesium.requestAnimationFrame(updateHUD);

// Keyboard controls
document.addEventListener("keydown", function(e) {
  if (e.key === " ") { viewer.clock.shouldAnimate = !viewer.clock.shouldAnimate; e.preventDefault(); }
  if (e.key === "1") viewer.clock.multiplier = 1;
  if (e.key === "2") viewer.clock.multiplier = 3;
  if (e.key === "3") viewer.clock.multiplier = 5;
  if (e.key === "4") viewer.clock.multiplier = 10;
  if (e.key === "5") viewer.clock.multiplier = 20;
  if (e.key === "r" || e.key === "R") {
    viewer.clock.currentTime = startTime.clone();
    viewer.trackedEntity = undefined;
  }
});
</script>
</body>
</html>
