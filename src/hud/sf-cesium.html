<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>OVERWATCH C2 - SF Coordinated Strike</title>
<script>window.CESIUM_BASE_URL = "cesium/";</script>
<script src="cesium/Cesium.js"></script>
<link href="cesium/Widgets/widgets.css" rel="stylesheet">
<style>
html,body,#c{margin:0;width:100%;height:100%;overflow:hidden}
.cesium-viewer-bottom{display:none!important}
.cesium-viewer .cesium-widget-credits{display:none!important}
#hud{position:absolute;top:0;left:0;right:0;z-index:10;pointer-events:none;font-family:'JetBrains Mono','Consolas',monospace}
#top-bar{padding:6px 14px;font-size:8px;color:rgba(150,200,255,0.7);letter-spacing:2.5px;background:rgba(0,0,0,0.55);border-bottom:1px solid rgba(68,170,255,0.15);text-transform:uppercase}
#tgt-panel{position:absolute;top:34px;right:10px;font-size:8px;color:rgba(150,200,255,0.6);letter-spacing:1.5px;background:rgba(0,0,0,0.55);padding:6px 10px;border:1px solid rgba(68,170,255,0.1);line-height:1.8}
.tgt-pending{color:rgba(255,80,80,0.8)}.tgt-done{color:rgba(80,255,120,0.8)}
#bottom-bar{position:fixed;bottom:26px;left:0;right:0;padding:4px 14px;font-size:7px;color:rgba(150,200,255,0.4);letter-spacing:2px;background:rgba(0,0,0,0.45);border-top:1px solid rgba(68,170,255,0.08);display:flex;justify-content:space-between;text-transform:uppercase;z-index:10}
#keys{position:absolute;top:34px;left:10px;font-size:7px;color:rgba(255,255,255,0.2);letter-spacing:1px;line-height:1.8}
</style>
</head>
<body>
<div id="c"></div>
<div id="hud">
  <div id="top-bar">OVERWATCH C2 | COORDINATED STRIKE | BFT: 24 ASSETS | ACTIVE: <span id="active">0</span> | TARGETS: 4 | NEUTRALIZED: <span id="neutral">0</span></div>
  <div id="tgt-panel"></div>
  <div id="keys">SPACE: pause | 1-5: speed | R: reset | click drone: track</div>
</div>
<div id="bottom-bar"><span>37.7897N 122.3972W</span><span id="speed-display">1X</span><span>UNCLASSIFIED // FOUO</span></div>

<script>
Cesium.Ion.defaultAccessToken = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJqdGkiOiJlOGY0MjBhYy0zZTFlLTRkNTItOGFmNS1mYmM0ZDE1ZmYxMGYiLCJpZCI6NDQ3NDY2LCJpc3MiOiJodHRwczovL2FwaS5jZXNpdW0uY29tIiwiYXVkIjoidW5kZWZpbmVkX2RlZmF1bHQiLCJpYXQiOjE3ODIxMTI4MjN9.uvbJwgTognrLcj79tpt-kn46yt5S288s2hWgRBIhct8";

var viewer = new Cesium.Viewer("c", {
  timeline: true, animation: true, shouldAnimate: false, globe: false,
  baseLayerPicker: false, geocoder: false, sceneModePicker: false,
  homeButton: false, navigationHelpButton: false, fullscreenButton: false,
  infoBox: false, selectionIndicator: false
});

(async function() {
  try {
    viewer.scene.primitives.add(await Cesium.createGooglePhotorealistic3DTileset());
  } catch(e) {
    viewer.scene.globe = new Cesium.Globe();
    try { viewer.scene.primitives.add(await Cesium.createOsmBuildingsAsync()); } catch(e2) {}
  }
})();

var LAUNCH = { lon: -122.3948, lat: 37.7878 };
var TARGETS = [
  { name: "EMBARCADERO", lon: -122.3936, lat: 37.7956, alt: 80 },
  { name: "PIER 39",     lon: -122.4093, lat: 37.8087, alt: 40 },
  { name: "SALESFORCE",  lon: -122.3972, lat: 37.7897, alt: 300 },
  { name: "GHIRARDELLI", lon: -122.4194, lat: 37.8080, alt: 80 }
];
var TOTAL = 24, PER_TGT = 6;
var COLORS = [Cesium.Color.CYAN, Cesium.Color.ORANGE, Cesium.Color.HOTPINK, Cesium.Color.LIME];
var MKT = { lon: -122.400, lat: 37.790 };
var startTime = Cesium.JulianDate.fromIso8601("2026-06-22T00:00:00Z");
var stopTime = Cesium.JulianDate.addSeconds(startTime, 240, new Cesium.JulianDate());
var arrivals = [], exploded = new Array(TOTAL).fill(false);
var bdaShown = new Array(TARGETS.length).fill(false), missionDone = false;

viewer.clock.startTime = startTime.clone();
viewer.clock.stopTime = stopTime.clone();
viewer.clock.currentTime = startTime.clone();
viewer.clock.clockRange = Cesium.ClockRange.LOOP_STOP;
viewer.clock.multiplier = 1;
viewer.timeline.zoomTo(startTime, stopTime);

function buildPath(tgt, di, ti) {
  var dx = tgt.lon - LAUNCH.lon, dy = tgt.lat - LAUNCH.lat;
  var d = Math.sqrt(dx * dx + dy * dy), px = -dy / d, py = dx / d;
  var cAlt = 35 + ti * 7 + di * 2, fLat = 0, fBeh = 0;
  if (di > 0) {
    var side = (di % 2 === 1) ? 1 : -1, rank = Math.ceil(di / 2);
    fLat = side * rank * 50; fBeh = rank * 30;
  }
  var fLon1 = (fLat / 85000) * px, fLat1 = (fLat / 111000) * py;
  var bLon1 = -(fBeh / 85000) * (dx / d), bLat1 = -(fBeh / 111000) * (dy / d);
  var lOff = (di - 2.5) * 0.0002, aAng = (di / PER_TGT) * Math.PI * 2;
  var aLon = Math.cos(aAng) * 0.0012, aLat = Math.sin(aAng) * 0.0012 * 0.77;
  var pts = [], steps = 20;
  for (var i = 0; i <= steps; i++) {
    var t = i / steps, bias = Math.sin(t * Math.PI) * 0.15;
    var lon = (LAUNCH.lon + dx * t) * (1 - bias) + MKT.lon * bias;
    var lat = (LAUNCH.lat + dy * t) * (1 - bias) + MKT.lat * bias;
    var lB = 0, fB = 0, aB = 0;
    if (t <= 0.15) lB = 1;
    else if (t <= 0.20) { var p = (t - 0.15) / 0.05; lB = 1 - p; fB = p; }
    else if (t <= 0.65) fB = 1;
    else if (t <= 0.70) { var p2 = (t - 0.65) / 0.05; fB = 1 - p2; aB = p2; }
    else aB = 1;
    lon += lB * lOff * px + fB * (fLon1 + bLon1) + aB * aLon;
    lat += lB * lOff * py + fB * (fLat1 + bLat1) + aB * aLat;
    var alt = t < 0.12 ? 5 + cAlt * (t / 0.12)
            : t > 0.85 ? cAlt + (tgt.alt - cAlt) * ((t - 0.85) / 0.15)
            : cAlt + Math.sin(t * Math.PI * 2) * 2;
    pts.push({ lon: lon, lat: lat, alt: alt });
  }
  pts[0] = { lon: LAUNCH.lon + lOff * 0.3, lat: LAUNCH.lat + lOff * 0.3, alt: 5 };
  pts[pts.length - 1] = { lon: tgt.lon, lat: tgt.lat, alt: tgt.alt };
  return pts;
}

// Target markers
for (var ti = 0; ti < TARGETS.length; ti++) {
  var tg = TARGETS[ti];
  viewer.entities.add({
    id: "tgt-" + ti,
    position: Cesium.Cartesian3.fromDegrees(tg.lon, tg.lat, tg.alt + 5),
    point: { pixelSize: 10, color: Cesium.Color.RED.withAlpha(0.85), outlineColor: Cesium.Color.WHITE, outlineWidth: 1 },
    label: { text: tg.name, font: "10pt monospace", fillColor: Cesium.Color.RED.withAlpha(0.8),
      showBackground: true, backgroundColor: new Cesium.Color(0,0,0,0.6),
      pixelOffset: new Cesium.Cartesian2(0,-20), scale: 0.7, disableDepthTestDistance: Number.POSITIVE_INFINITY }
  });
}

// Launch marker
viewer.entities.add({
  position: Cesium.Cartesian3.fromDegrees(LAUNCH.lon, LAUNCH.lat, 3),
  point: { pixelSize: 8, color: Cesium.Color.WHITE.withAlpha(0.8) },
  label: { text: "LAUNCH / VAN-01", font: "8pt monospace", fillColor: Cesium.Color.WHITE.withAlpha(0.6),
    showBackground: true, backgroundColor: new Cesium.Color(0,0,0,0.5),
    pixelOffset: new Cesium.Cartesian2(0,-16), scale: 0.5, disableDepthTestDistance: Number.POSITIVE_INFINITY }
});

// Create 24 drones
for (var ti = 0; ti < TARGETS.length; ti++) {
  for (var di = 0; di < PER_TGT; di++) {
    var idx = ti * PER_TGT + di, lbl = "D-" + String(idx + 1).padStart(2, "0");
    var delay = idx * 2, pts = buildPath(TARGETS[ti], di, ti);
    var dist = 0;
    for (var pi = 1; pi < pts.length; pi++) {
      var ddx = (pts[pi].lon - pts[pi-1].lon) * 85000, ddy = (pts[pi].lat - pts[pi-1].lat) * 111000;
      dist += Math.sqrt(ddx * ddx + ddy * ddy);
    }
    var dur = Math.max(50, Math.min(110, dist / 14));
    arrivals.push({ ti: ti, arrival: delay + dur });
    var pos = new Cesium.SampledPositionProperty();
    for (var si = 0; si < pts.length; si++) {
      var st = Cesium.JulianDate.addSeconds(startTime, delay + (si / (pts.length - 1)) * dur, new Cesium.JulianDate());
      pos.addSample(st, Cesium.Cartesian3.fromDegrees(pts[si].lon, pts[si].lat, pts[si].alt));
    }
    pos.setInterpolationOptions({ interpolationDegree: 3, interpolationAlgorithm: Cesium.HermitePolynomialApproximation });
    var ds = Cesium.JulianDate.addSeconds(startTime, delay, new Cesium.JulianDate()), c = COLORS[ti];
    viewer.entities.add({
      id: "drone-" + idx, name: lbl,
      availability: new Cesium.TimeIntervalCollection([new Cesium.TimeInterval({ start: ds, stop: stopTime })]),
      position: pos, orientation: new Cesium.VelocityOrientationProperty(pos),
      model: { uri: "models/CesiumDrone.glb", minimumPixelSize: 28, scale: 1.5 },
      path: { resolution: 1, width: 1.2, leadTime: 0, trailTime: 20,
        material: new Cesium.PolylineGlowMaterialProperty({ glowPower: 0.08, color: c.withAlpha(0.35) }) },
      point: { pixelSize: 4, color: c, outlineColor: Cesium.Color.BLACK, outlineWidth: 1,
        disableDepthTestDistance: Number.POSITIVE_INFINITY },
      label: { text: lbl, font: "8pt monospace", fillColor: Cesium.Color.WHITE.withAlpha(0.5),
        showBackground: true, backgroundColor: new Cesium.Color(0,0,0,0.4),
        pixelOffset: new Cesium.Cartesian2(0,-18), scale: 0.45,
        distanceDisplayCondition: new Cesium.DistanceDisplayCondition(0, 2000),
        disableDepthTestDistance: Number.POSITIVE_INFINITY }
    });
  }
}

// Initial camera
viewer.camera.setView({
  destination: Cesium.Cartesian3.fromDegrees(-122.400, 37.795, 1200),
  orientation: { heading: Cesium.Math.toRadians(20), pitch: Cesium.Math.toRadians(-30), roll: 0 }
});

// Click to track
var handler = new Cesium.ScreenSpaceEventHandler(viewer.scene.canvas);
handler.setInputAction(function(click) {
  var picked = viewer.scene.pick(click.position);
  if (Cesium.defined(picked) && picked.id && picked.id.id && picked.id.id.startsWith("drone-"))
    viewer.trackedEntity = picked.id;
  else viewer.trackedEntity = undefined;
}, Cesium.ScreenSpaceEventType.LEFT_CLICK);

// HUD update loop
function updateHUD() {
  var elapsed = Cesium.JulianDate.secondsDifference(viewer.clock.currentTime, startTime);
  document.getElementById("speed-display").textContent = viewer.clock.multiplier + "X";
  if (elapsed < 1) { exploded.fill(false); bdaShown.fill(false); missionDone = false; }
  var active = 0, neutralized = 0;
  for (var i = 0; i < TOTAL; i++) {
    if (elapsed >= i * 2 && elapsed < arrivals[i].arrival + 3) active++;
    if (elapsed >= arrivals[i].arrival && !exploded[i]) exploded[i] = true;
  }
  var html = "";
  for (var t = 0; t < TARGETS.length; t++) {
    var count = 0;
    for (var j = 0; j < arrivals.length; j++)
      if (arrivals[j].ti === t && elapsed >= arrivals[j].arrival) count++;
    var done = count >= PER_TGT;
    if (done) neutralized++;
    if (done && !bdaShown[t]) {
      bdaShown[t] = true;
      var te = viewer.entities.getById("tgt-" + t);
      if (te) { te.point.color = Cesium.Color.LIME.withAlpha(0.85); te.label.fillColor = Cesium.Color.LIME.withAlpha(0.8); }
    }
    html += '<div class="' + (done ? "tgt-done" : "tgt-pending") + '">' +
      TARGETS[t].name + " [" + (done ? "NEUTRALIZED" : count + "/" + PER_TGT) + "]</div>";
  }
  document.getElementById("active").textContent = active;
  document.getElementById("neutral").textContent = neutralized;
  document.getElementById("tgt-panel").innerHTML = html;
  if (neutralized >= TARGETS.length && !missionDone) {
    missionDone = true; viewer.trackedEntity = undefined;
    viewer.camera.flyTo({
      destination: Cesium.Cartesian3.fromDegrees(-122.400, 37.798, 2500),
      orientation: { heading: 0, pitch: Cesium.Math.toRadians(-55), roll: 0 }, duration: 3
    });
  }
  Cesium.requestAnimationFrame(updateHUD);
}
Cesium.requestAnimationFrame(updateHUD);

// Keyboard controls
document.addEventListener("keydown", function(e) {
  if (e.key === " ") { viewer.clock.shouldAnimate = !viewer.clock.shouldAnimate; e.preventDefault(); }
  if (e.key >= "1" && e.key <= "5") viewer.clock.multiplier = [1,3,5,10,20][e.key - 1];
  if (e.key === "r" || e.key === "R") {
    viewer.clock.currentTime = startTime.clone();
    viewer.trackedEntity = undefined;
    exploded.fill(false); bdaShown.fill(false); missionDone = false;
    for (var i = 0; i < TARGETS.length; i++) {
      var ent = viewer.entities.getById("tgt-" + i);
      if (ent) { ent.point.color = Cesium.Color.RED.withAlpha(0.85); ent.label.fillColor = Cesium.Color.RED.withAlpha(0.8); }
    }
  }
});
</script>
</body>
</html>
