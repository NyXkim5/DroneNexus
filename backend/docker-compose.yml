version: "3.8"

services:
  overwatch-platform:
    build: .
    ports:
      - "8765:8765"
    volumes:
      - overwatch-data:/data
    environment:
      - OVERWATCH_SIMULATION_MODE=true
      - OVERWATCH_TELEMETRY_RATE_HZ=10
      - OVERWATCH_SITL_DRONE_COUNT=6
    restart: unless-stopped

volumes:
  overwatch-data:
