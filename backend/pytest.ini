[pytest]
# Markers. Heavy end-to-end scenario tests run full wargames and dominate suite
# time. Mark them slow so a fast inner loop can deselect them:
#   pytest -m "not slow"     fast unit and component tests only
#   pytest                   everything, the full gate used in CI
markers =
    slow: full end-to-end scenario wargames; deselect with -m "not slow"

# Pin the asyncio fixture loop scope so the suite does not emit the pending
# pytest-asyncio deprecation warning on every run.
asyncio_default_fixture_loop_scope = function
